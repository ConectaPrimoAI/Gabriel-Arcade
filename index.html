<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PlayWorld</title>

<style>

/* =========================
   BASE
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
  -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:system-ui;
  background:#f1f4f8;
}

/* =========================
   SCANNER
========================= */

#scanner{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.box{
  width:300px;
  height:300px;
  border-radius:28px;
  background:rgba(255,255,255,.85);
  border:1px solid rgba(0,0,0,.06);
  box-shadow:0 25px 60px rgba(0,0,0,.12);
  position:relative;
  overflow:hidden;
}

canvas{
  position:absolute;
  inset:0;
  z-index:1;
}

/* fingerprint centralizada */
.fp{
  width:110px;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:3;
}

#hold{
  position:absolute;
  inset:0;
  z-index:9999;
  touch-action:none;
}

#txt{
  margin-top:18px;
  font-size:14px;
  color:#444;
}

/* =========================
   APP
========================= */

#app{
  position:fixed;
  inset:0;
  display:none;
  overflow:auto;
  padding:16px;
}

.title{
  font-size:18px;
  font-weight:800;
  margin-bottom:14px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

/* =========================
   GLASS CARDS 3D (NOVO)
========================= */

.card{
  position:relative;

  background:rgba(255,255,255,.55);
  border-radius:22px;

  padding:14px;

  border:1px solid rgba(255,255,255,.35);

  box-shadow:
    0 10px 25px rgba(0,0,0,.10),
    0 20px 60px rgba(0,0,0,.08);

  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);

  display:flex;
  flex-direction:column;
  align-items:center;

  transition:transform .25s ease, box-shadow .25s ease;
  transform-style:preserve-3d;
}

/* brilho interno */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:22px;

  background:
    radial-gradient(circle at 25% 20%, rgba(255,255,255,.9), transparent 45%),
    radial-gradient(circle at 80% 90%, rgba(255,255,255,.25), transparent 55%);

  pointer-events:none;
  opacity:.7;
}

/* reflexo animado */
.card::after{
  content:"";
  position:absolute;
  inset:-50%;

  background:linear-gradient(
    120deg,
    transparent 40%,
    rgba(255,255,255,.22),
    transparent 60%
  );

  transform:rotate(25deg);
  animation:shine 6s infinite linear;

  pointer-events:none;
}

@keyframes shine{
  0%{transform:translateX(-50%) rotate(25deg);}
  100%{transform:translateX(50%) rotate(25deg);}
}

/* interação 3D */
.card:active{
  transform:translateY(-6px) scale(.97) rotateX(6deg);
  box-shadow:
    0 15px 35px rgba(0,0,0,.12),
    0 35px 90px rgba(0,0,0,.12);
}

/* conteúdo */
.icon{
  font-size:52px;
  filter:drop-shadow(0 10px 15px rgba(0,0,0,.15));
}

.name{
  font-weight:900;
  margin-top:6px;
  text-align:center;
  color:#111;
}

.desc{
  font-size:11px;
  opacity:.6;
  text-align:center;
  margin-top:3px;
}

.btn{
  margin-top:12px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:14px;
  background:#1f2937;
  color:#fff;
  font-weight:700;
}

/* melhora mobile */
@media (min-width:600px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

</style>
</head>

<body>

<!-- SCANNER -->
<div id="scanner">

  <div class="box" id="box">

    <canvas id="particles"></canvas>

    <img class="fp" src="https://files.catbox.moe/jar7fm.png">

    <div id="hold"></div>

  </div>

  <div id="txt">Segure por 3 segundos</div>

</div>

<!-- APP -->
<div id="app">
  <div class="title">PlayWorld</div>
  <div class="grid" id="grid"></div>
</div>

<script>

/* =========================
   ELEMENTOS
========================= */

const hold = document.getElementById("hold");
const scanner = document.getElementById("scanner");
const app = document.getElementById("app");

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = 300;
canvas.height = 300;

/* =========================
   PARTICLES
========================= */

let particles = [];
let holding = false;
let startTime = 0;

for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*300,
    y:Math.random()*300,
    vx:(Math.random()-0.5)*1.2,
    vy:(Math.random()-0.5)*1.2,
    tx:150,
    ty:150
  });
}

/* =========================
   LOOP
========================= */

function loop(){

  ctx.clearRect(0,0,300,300);

  for(let p of particles){

    let dx = p.tx - p.x;
    let dy = p.ty - p.y;

    let dist = Math.sqrt(dx*dx + dy*dy) || 1;

    let force = holding ? 0.12 : -0.01;

    p.vx += (Math.random()-0.5) * (holding ? 0.2 : 0.6);
    p.vy += (Math.random()-0.5) * (holding ? 0.2 : 0.6);

    p.vx += dx / dist * force;
    p.vy += dy / dist * force;

    p.vx *= 0.90;
    p.vy *= 0.90;

    p.x += p.vx;
    p.y += p.vy;

    if(p.x<0) p.x=300;
    if(p.x>300) p.x=0;
    if(p.y<0) p.y=300;
    if(p.y>300) p.y=0;

    ctx.fillStyle = holding
      ? "rgba(74,144,226,.9)"
      : "rgba(0,0,0,.35)";

    ctx.beginPath();
    ctx.arc(p.x,p.y,2.2,0,Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(loop);
}

loop();

/* =========================
   HOLD 3s
========================= */

function start(e){
  e.preventDefault();

  holding = true;
  startTime = Date.now();

  document.getElementById("txt").innerText = "Analisando...";

  const interval = setInterval(()=>{

    if(!holding){
      clearInterval(interval);
      return;
    }

    if(Date.now() - startTime >= 3000){

      clearInterval(interval);

      holding = false;

      scanner.style.opacity = "0";

      setTimeout(()=>{
        scanner.style.display="none";
        app.style.display="block";
        loadGames();
      },300);
    }

  },50);
}

function end(){
  holding = false;
  document.getElementById("txt").innerText = "Segure por 3 segundos";
}

hold.addEventListener("touchstart",start,{passive:false});
hold.addEventListener("touchend",end);
hold.addEventListener("touchcancel",end);

/* =========================
   LOAD GAMES
========================= */

async function loadGames(){

  const res = await fetch("./games.json",{cache:"no-store"});
  const data = await res.json();

  const grid = document.getElementById("grid");
  grid.innerHTML="";

  data.games.forEach(g=>{

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="icon">${g.ic}</div>
      <div class="name">${g.nm}</div>
      <div class="desc">${g.bd}</div>
      <button class="btn">Jogar</button>
    `;

    card.querySelector("button").onclick=()=>{
      location.href="games/"+g.id+".html";
    };

    grid.appendChild(card);

  });

}

</script>

</body>
</html>
