<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>PlayWorld</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE KIDS 3D
========================= */

:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --shadow:0 10px 30px rgba(0,0,0,.12);

  --text:#2b2b2b;

  --blue:#7cc7ff;
  --yellow:#ffd36e;
  --pink:#ff9ecb;
  --green:#8de8c5;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body,html{
  width:100%;
  height:100%;
  font-family:'Fredoka',sans-serif;
  background:linear-gradient(180deg,#f6f7fb,#eef2ff);
  overflow:hidden;
}

/* =========================
   BIOMETRIA (PORTA MÁGICA)
========================= */

#stage-scanner{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at 50% 40%, #ffffff, #eef2ff);
}

.scan-wrap{
  width:300px;
  height:300px;
  background:var(--card);
  border-radius:40px;
  box-shadow:var(--shadow);

  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;

  transform:rotateX(12deg);
  perspective:800px;
}

/* touch */
#touch-zone{
  position:absolute;
  inset:0;
}

/* fingerprint */
.fp-img{
  width:130px;
  opacity:.9;
  filter:drop-shadow(0 10px 10px rgba(0,0,0,.15));
  transition:.3s;
}

.active-scan .fp-img{
  transform:scale(.92) rotate(-2deg);
}

/* scan wave (suave, não neon) */
.scan-ring{
  position:absolute;
  inset:20px;
  border-radius:40px;
  border:2px dashed rgba(0,0,0,.08);
  opacity:0;
}

.active-scan .scan-ring{
  opacity:1;
  animation:spin 1.2s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.laser{
  position:absolute;
  width:80%;
  height:3px;
  background:rgba(0,0,0,.05);
  opacity:0;
  border-radius:999px;
}

.active-scan .laser{
  opacity:1;
  animation:scan 1.2s infinite ease-in-out;
}

@keyframes scan{
  0%{transform:translateY(-90px);}
  50%{transform:translateY(90px);}
  100%{transform:translateY(-90px);}
}

#scan-txt{
  margin-top:20px;
  font-size:1rem;
  color:#333;
}

.scan-hint{
  margin-top:8px;
  font-size:.7rem;
  color:#888;
}

/* =========================
   APP WORLD (MENU 3D)
========================= */

#main-ui{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  padding:18px;
  overflow:auto;

  background:linear-gradient(180deg,#f6f7fb,#eef2ff);
}

/* HEADER */
#bot-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-bottom:16px;
}

#biel-bot{
  font-size:60px;
  filter:drop-shadow(0 10px 10px rgba(0,0,0,.1));
}

#bot-speech{
  margin-top:10px;
  background:#fff;
  padding:10px 14px;
  border-radius:18px;
  box-shadow:var(--shadow);
  display:none;
  color:#333;
}

/* FRAME */
.game-frame{
  max-width:640px;
  margin:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

/* =========================
   3D TOY CARD
========================= */

.card{
  background:#fff;
  border-radius:22px;
  padding:14px;

  box-shadow:
    0 14px 30px rgba(0,0,0,.12),
    0 4px 0 rgba(0,0,0,.05);

  transform:translateY(0);
  transition:.2s ease;
  position:relative;
}

/* 3D press */
.card:active{
  transform:translateY(6px);
  box-shadow:
    0 6px 18px rgba(0,0,0,.15);
}

/* color accent per card feel (soft, not neon) */
.card:nth-child(4n+1){background:#fff;}
.card:nth-child(4n+2){background:#fff7e8;}
.card:nth-child(4n+3){background:#f0f9ff;}
.card:nth-child(4n+4){background:#f3fff7;}

.icon{
  font-size:2rem;
  transform:translateY(2px);
}

.name{
  margin-top:8px;
  font-weight:700;
  color:#2b2b2b;
  font-size:.85rem;
}

.desc{
  margin-top:2px;
  font-size:.65rem;
  color:#777;
}

/* =========================
   FLOAT FEEL (micro 3D)
========================= */

.card:hover{
  transform:translateY(-2px) scale(1.01);
}

</style>

</head>

<body>

<!-- SCANNER -->
<div id="stage-scanner">
  <div class="scan-wrap" id="scanner-box">

    <div id="touch-zone"></div>

    <div class="scan-ring"></div>
    <div class="laser"></div>

    <img class="fp-img" src="https://files.catbox.moe/jar7fm.png">

  </div>

  <div id="scan-txt">Segure para entrar</div>
  <div class="scan-hint">PlayWorld Access</div>
</div>

<!-- MENU -->
<div id="main-ui">

  <div id="bot-wrap">
    <div id="biel-bot">🧸</div>
    <div id="bot-speech"></div>
  </div>

  <div class="game-frame">
    <div class="grid" id="ggrid"></div>
  </div>

</div>

<script>

/* =========================
   SCANNER
========================= */

const touch = document.getElementById("touch-zone");
const box = document.getElementById("scanner-box");
const scanner = document.getElementById("stage-scanner");
const app = document.getElementById("main-ui");

let t;

touch.addEventListener("touchstart", ()=>{
  box.classList.add("active-scan");

  t = setTimeout(()=>{
    scanner.style.display="none";
    app.style.display="flex";
    loadGames();
  },1500);
});

touch.addEventListener("touchend", ()=>{
  box.classList.remove("active-scan");
  clearTimeout(t);
});

/* =========================
   GAMES (DINÂMICO)
========================= */

function loadGames(){
  fetch("games.json")
    .then(r=>r.json())
    .then(data=>{
      const grid = document.getElementById("ggrid");

      data.games.forEach(g=>{
        const c=document.createElement("div");
        c.className="card";

        c.innerHTML=`
          <div class="icon">${g.ic}</div>
          <div class="name">${g.nm}</div>
          <div class="desc">${g.bd}</div>
        `;

        c.onclick=()=>{
          window.location.href = "games/"+g.id+".html";
        };

        grid.appendChild(c);
      });
    });
}

</script>

</body>
</html>
