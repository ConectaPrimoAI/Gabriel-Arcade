<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>GABRIEL V20 — ARCADE SUPREMO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">

<meta name="theme-color" content="#02020a">
<link rel="manifest" href="manifest.json">
</head>
<body>

<!-- ══ ETAPA 1: SCANNER ══ -->
<div id="stage-scanner">
  <div class="scan-wrap" id="scanner-box">
    <div id="touch-zone"></div>
    <div class="scan-ring"></div>
    <div class="laser"></div>
    <img src="https://files.catbox.moe/jar7fm.png" class="fp-img" alt="Digital" onerror="this.style.fontSize='80px';this.style.display='block';this.outerHTML='<span style=\'font-size:80px\'>👆</span>'">
  </div>
  <p id="scan-txt">SEGURE PARA IDENTIFICAR</p>
  <p class="scan-hint">GABRIEL V20 • ARCADE SUPREMO</p>
</div>

<!-- ══ ETAPA 2: CADEADO ══ -->
<div id="stage-lock">
  <div class="lock-icon" id="lock-obj">🔒</div>
  <p class="lock-label">GABRIEL RECONHECIDO</p>
</div>

<!-- ══ ETAPA 3: MENU ══ -->
<div id="main-ui">
  <div id="bot-wrap">
    <div id="biel-bot">🤖</div>
    <div id="bot-speech"></div>
  </div>
  <div class="game-frame" id="frame">
    <p class="frame-title">⚡ ESCOLHA SEU JOGO</p>
    <div class="grid" id="ggrid"></div>
  </div>
</div>

<!-- ══ ETAPA 4: ARCADE ══ -->
<div id="gs">
  <canvas id="gc"></canvas>
  <button id="menubtn">☰</button>
  <div id="hud"></div>
  <div id="hbar"></div>

  <div id="ctrl">
    <div class="dpad">
      <div class="cb" id="cup">▲</div>
      <div class="cb" id="cleft">◀</div>
      <div class="cb" id="cdown">▼</div>
      <div class="cb" id="cright">▶</div>
    </div>
    <div class="ag">
      <div class="ab" id="abB">B</div>
      <div class="ab" id="abA">A</div>
    </div>
  </div>

  <div id="mcsel">
    <h2>⛏️ MINECRAFT — MUNDOS</h2>
    <p>TOQUE PARA JOGAR • 🗑 PARA APAGAR</p>
    <div id="mcwlist" style="display:flex;flex-direction:column;gap:8px;max-height:55vh;overflow-y:auto;width:100%;align-items:center;"></div>
    <button class="obtn s" onclick="toMenu()">← VOLTAR</button>
  </div>

  <div class="ov" id="gov">
    <h2 style="color:#ff3366">GAME OVER</h2>
    <div class="pts" id="gov-pts"></div>
    <div>
      <button class="obtn p" id="gbtn-re">↺ DE NOVO</button>
      <button class="obtn s" onclick="toMenu()">⌂ MENU</button>
    </div>
  </div>
  <div class="ov" id="gwin">
    <h2 style="color:#00ff88">🏆 VOCÊ GANHOU!</h2>
    <div class="pts" id="gwin-pts"></div>
    <div>
      <button class="obtn p" id="wbtn-re">↺ DE NOVO</button>
      <button class="obtn s" onclick="toMenu()">⌂ MENU</button>
    </div>
  </div>

  <div id="gload">
    <span id="gload-txt">CARREGANDO…</span>
    <div class="lbar"><div class="lfill" id="lfill" style="width:0%"></div></div>
  </div>
</div>

<script src="scripts/app.js"></script>
<script src="scripts/core.js"></script>
</body>
</html>
