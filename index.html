<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ARC HUB</title>

<style>

/* =========================
   BASE (SEM NEON, TOM REALISTA)
========================= */

:root{
  --bg:#0b0f14;
  --panel:#121923;
  --panel2:#0f151e;
  --stroke:rgba(255,255,255,.08);
  --text:#e8eef7;
  --muted:rgba(255,255,255,.55);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* =========================
   BIOMETRIA (BOOT CONSOLE)
========================= */

#stage-scanner{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at center, #141b25, #0b0f14);
}

.scan-wrap{
  width:300px;
  height:300px;
  border-radius:22px;
  background:linear-gradient(145deg,var(--panel),var(--panel2));
  border:1px solid var(--stroke);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 30px 80px rgba(0,0,0,.5);
}

#touch-zone{
  position:absolute;
  inset:0;
}

.fp-img{
  width:120px;
  opacity:.85;
  filter:contrast(1.1);
}

.scan-bar{
  position:absolute;
  width:80%;
  height:2px;
  background:rgba(255,255,255,.15);
  opacity:0;
}

.active .scan-bar{
  opacity:1;
  animation:scan 1.3s infinite ease-in-out;
}

@keyframes scan{
  0%{transform:translateY(-90px);}
  50%{transform:translateY(90px);}
  100%{transform:translateY(-90px);}
}

#scan-txt{
  margin-top:18px;
  font-size:.75rem;
  opacity:.6;
}

/* =========================
   HUB PRINCIPAL (ROBLOX STYLE)
========================= */

#main-ui{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  padding:14px;
  overflow:auto;
}

/* HEADER */
.header{
  padding:10px 6px;
  margin-bottom:10px;
}

.header h1{
  font-size:1rem;
  font-weight:600;
}

.header p{
  font-size:.65rem;
  opacity:.5;
}

/* CATEGORIES */
.categories{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:6px 0 12px;
}

.cat{
  padding:6px 10px;
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:12px;
  font-size:.65rem;
  white-space:nowrap;
}

/* GRID 3D */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  perspective:800px;
}

/* CARD 3D */
.card{
  background:linear-gradient(145deg,var(--panel),var(--panel2));
  border:1px solid var(--stroke);
  border-radius:16px;
  padding:12px;
  transform:translateZ(0);
  transition:.25s;
  position:relative;
}

.card:active{
  transform:scale(.97);
}

.icon{
  font-size:1.6rem;
  margin-bottom:6px;
}

.name{
  font-size:.75rem;
  font-weight:600;
}

.desc{
  font-size:.6rem;
  opacity:.5;
  margin-top:2px;
}

/* =========================
   PAINEL DO JOGO (CATÁLOGO)
========================= */

#panel{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  backdrop-filter:blur(10px);
  display:none;
  justify-content:center;
  align-items:flex-end;
}

.panel-box{
  width:100%;
  max-width:500px;
  background:var(--panel);
  border-radius:18px 18px 0 0;
  padding:16px;
  animation:up .25s ease;
}

@keyframes up{
  from{transform:translateY(40px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.panel-icon{
  font-size:2rem;
}

.panel-title{
  font-size:.9rem;
  margin-top:6px;
}

.panel-desc{
  font-size:.65rem;
  opacity:.6;
  margin-top:4px;
}

.play-btn{
  margin-top:12px;
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1f2a3a;
  color:white;
}

</style>
</head>

<body>

<!-- BIOMETRIA -->
<div id="stage-scanner">
  <div class="scan-wrap" id="scanner">

    <div id="touch-zone"></div>
    <div class="scan-bar"></div>

    <img class="fp-img" src="https://files.catbox.moe/jar7fm.png">

  </div>

  <div id="scan-txt">SEGURE PARA INICIAR SISTEMA</div>
</div>

<!-- HUB -->
<div id="main-ui">

  <div class="header">
    <h1>ARC HUB</h1>
    <p>Game Console Interface</p>
  </div>

  <div class="categories">
    <div class="cat">Todos</div>
    <div class="cat">Aventura</div>
    <div class="cat">Arcade</div>
    <div class="cat">Kids</div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<!-- PANEL -->
<div id="panel">
  <div class="panel-box">
    <div class="panel-icon" id="picon"></div>
    <div class="panel-title" id="ptitle"></div>
    <div class="panel-desc" id="pdesc"></div>
    <button class="play-btn" id="play">JOGAR</button>
  </div>
</div>

<script>

/* =========================
   BIOMETRIA
========================= */

const touch = document.getElementById("touch-zone");
const scanner = document.getElementById("stage-scanner");
const app = document.getElementById("main-ui");

let t;

touch.addEventListener("touchstart", ()=>{
  document.getElementById("scanner").classList.add("active");

  t = setTimeout(()=>{
    scanner.style.display="none";
    app.style.display="flex";
    loadGames();
  },1400);
});

touch.addEventListener("touchend", ()=>{
  document.getElementById("scanner").classList.remove("active");
  clearTimeout(t);
});

/* =========================
   GAMES (mantém JSON depois)
========================= */

let games = [];

async function loadGames(){
  const res = await fetch("games.json");
  const data = await res.json();
  games = data.games || [];

  const grid = document.getElementById("grid");

  games.forEach(g=>{
    const el = document.createElement("div");
    el.className="card";

    el.innerHTML=`
      <div class="icon">${g.ic}</div>
      <div class="name">${g.nm}</div>
      <div class="desc">${g.bd}</div>
    `;

    el.onclick=()=>openPanel(g);

    grid.appendChild(el);
  });
}

/* =========================
   PANEL (CATÁLOGO DO JOGO)
========================= */

let selected=null;

function openPanel(g){
  selected=g;

  document.getElementById("panel").style.display="flex";
  document.getElementById("picon").innerText=g.ic;
  document.getElementById("ptitle").innerText=g.nm;
  document.getElementById("pdesc").innerText=g.bd;
}

document.getElementById("play").onclick=()=>{
  if(selected) launchGame(selected.id);
};

document.getElementById("panel").onclick=(e)=>{
  if(e.target.id==="panel")
    document.getElementById("panel").style.display="none";
};

/* =========================
   GAME LAUNCH (SEU SISTEMA)
========================= */

function launchGame(id){
  window.location.href = "games/"+id+".html";
}

</script>

</body>
</html>
