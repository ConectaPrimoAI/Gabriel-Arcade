<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>PlayWorld</title>

<style>

/* =========================
   BASE FIX MOBILE
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;

  -webkit-user-select:none;
  user-select:none;

  -webkit-touch-callout:none;
  -webkit-tap-highlight-color:transparent;
}

img{
  pointer-events:none;
  -webkit-user-drag:none;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:system-ui, sans-serif;
  background:#f5f6f8;
}

/* =========================
   SCANNER
========================= */

#scanner{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.box{
  width:280px;
  height:280px;
  border-radius:26px;
  background:#fff;
  box-shadow:0 20px 50px rgba(0,0,0,.12);
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 🔥 FIX REAL TOUCH */
#hold{
  position:absolute;
  inset:0;
  z-index:99999;
  touch-action:none;
}

/* fingerprint */
.fp{
  width:120px;
}

/* scan animation */
.line{
  position:absolute;
  width:70%;
  height:3px;
  background:#4a90e2;
  opacity:0;
}

.active .line{
  opacity:1;
  animation:scan 1.2s infinite;
}

@keyframes scan{
  0%{transform:translateY(-90px);}
  50%{transform:translateY(90px);}
  100%{transform:translateY(-90px);}
}

#txt{
  margin-top:18px;
  font-size:14px;
  color:#444;
}

/* =========================
   APP
========================= */

#app{
  position:fixed;
  inset:0;
  display:none;
  overflow:auto;
  padding:16px;
  background:#f5f6f8;
}

/* header */
.title{
  font-size:18px;
  font-weight:700;
  margin-bottom:14px;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

/* card */
.card{
  background:#fff;
  border-radius:16px;
  padding:12px;
  box-shadow:0 12px 30px rgba(0,0,0,.10);
  transition:.15s;
}

.card:active{
  transform:scale(.97);
}

.tag{
  width:100%;
  height:4px;
  border-radius:6px;
  margin-bottom:8px;
}

.blue{background:#4a90e2;}
.red{background:#e25c5c;}
.yellow{background:#e2c44a;}
.green{background:#4ecb8f;}

.icon{font-size:24px;}
.name{font-weight:700;margin-top:6px;}
.desc{font-size:11px;opacity:.6;margin-top:2px;}

.btn{
  margin-top:10px;
  width:100%;
  padding:8px;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
}

</style>

</head>
<body>

<!-- SCANNER -->
<div id="scanner">

  <div class="box" id="box">

    <!-- HOLD FIX REAL -->
    <div id="hold"></div>

    <div class="line"></div>

    <img class="fp" src="https://files.catbox.moe/jar7fm.png">

  </div>

  <div id="txt">Segure para entrar</div>

</div>

<!-- APP -->
<div id="app">

  <div class="title">PlayWorld</div>

  <div class="grid" id="grid"></div>

</div>

<script>

/* =========================
   SCANNER FIX
========================= */

const hold = document.getElementById("hold");
const box = document.getElementById("box");
const scanner = document.getElementById("scanner");
const app = document.getElementById("app");

let timer;

hold.addEventListener("touchstart",(e)=>{
  e.preventDefault();

  box.classList.add("active");

  timer = setTimeout(()=>{
    scanner.style.display="none";
    app.style.display="block";
    loadGames();
  },1400);

},{passive:false});

hold.addEventListener("touchend",()=>{
  box.classList.remove("active");
  clearTimeout(timer);
});

/* =========================
   LOAD GAMES (FIXED JSON)
========================= */

async function loadGames(){

  try{
    const res = await fetch("./games.json",{cache:"no-store"});

    if(!res.ok) throw new Error("JSON não carregou");

    const data = await res.json();

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const colors = ["blue","red","yellow","green"];

    data.games.forEach((g,i)=>{

      const card = document.createElement("div");
      card.className="card";

      card.innerHTML=`
        <div class="tag ${colors[i % 4]}"></div>
        <div class="icon">${g.ic}</div>
        <div class="name">${g.nm}</div>
        <div class="desc">${g.bd}</div>
        <button class="btn">Jogar</button>
      `;

      card.querySelector("button").onclick=()=>{
        location.href="games/"+g.id+".html";
      };

      grid.appendChild(card);

    });

  }catch(e){
    console.error("ERRO JSON:",e);
  }

}

</script>

</body>
</html>
