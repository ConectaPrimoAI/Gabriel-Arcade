<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>GABRIEL V20</title>

<meta name="theme-color" content="#05060a">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */

:root{
  --bg:#05060a;
  --glass:rgba(255,255,255,.06);
  --stroke:rgba(255,255,255,.08);
  --primary:#00f2ff;
  --accent:#00ff88;
  --text:#e9f2ff;
  --muted:rgba(255,255,255,.5);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  background:var(--bg);
  font-family:system-ui;
  overflow:hidden;
}

/* =========================
   BIOMETRIA
========================= */

#stage-scanner{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at center, rgba(0,242,255,.06), transparent 60%), var(--bg);
}

.scan-wrap{
  width:290px;
  height:290px;
  border-radius:50%;
  position:relative;
  background:var(--glass);
  border:1px solid var(--stroke);
  backdrop-filter:blur(18px);
  display:flex;
  justify-content:center;
  align-items:center;
}

#touch-zone{
  position:absolute;
  inset:0;
  z-index:10;
}

.fp-img{
  width:135px;
  filter:drop-shadow(0 0 20px rgba(0,242,255,.4));
  transition:.25s;
}

.active-scan .fp-img{
  transform:scale(.92);
}

.scan-ring{
  position:absolute;
  inset:10px;
  border-radius:50%;
  border:1px solid rgba(0,242,255,.2);
  border-top:2px solid var(--primary);
  opacity:0;
}

.active-scan .scan-ring{
  opacity:1;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

.laser{
  position:absolute;
  width:80%;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--primary),var(--accent),transparent);
  opacity:0;
}

.active-scan .laser{
  opacity:1;
  animation:scan 1.1s infinite;
}

@keyframes scan{
  0%{transform:translateY(-85px);}
  50%{transform:translateY(85px);}
  100%{transform:translateY(-85px);}
}

#scan-txt{
  margin-top:24px;
  color:var(--primary);
  font-family:Orbitron;
  letter-spacing:3px;
  font-size:.75rem;
}

.scan-hint{
  margin-top:10px;
  color:var(--muted);
  font-size:.55rem;
}

/* =========================
   MENU
========================= */

#main-ui{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  padding:18px;
  overflow:auto;
}

#bot-wrap{
  text-align:center;
  margin-bottom:16px;
}

#biel-bot{
  font-size:60px;
}

#bot-speech{
  margin-top:10px;
  padding:10px;
  background:var(--glass);
  border:1px solid var(--stroke);
  border-radius:12px;
  display:none;
  color:var(--text);
}

/* FRAME */
.game-frame{
  background:var(--glass);
  border:1px solid var(--stroke);
  border-radius:18px;
  padding:14px;
  max-width:620px;
  margin:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

/* CARD */
.card{
  padding:14px;
  border-radius:16px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--stroke);
  transition:.15s;
}

.card:active{
  transform:scale(.97);
}

.ci{font-size:2rem;}
.cn{color:var(--text);font-size:.7rem;margin-top:6px;}
.cb2{color:var(--muted);font-size:.55rem;}

</style>

</head>

<body>

<!-- SCANNER -->
<div id="stage-scanner">
  <div class="scan-wrap" id="scanner-box">

    <div id="touch-zone"></div>

    <div class="scan-ring"></div>
    <div class="laser"></div>

    <img class="fp-img" src="https://files.catbox.moe/jar7fm.png">

  </div>

  <div id="scan-txt">SEGURE PARA IDENTIFICAR</div>
  <div class="scan-hint">SISTEMA V20</div>
</div>

<!-- MENU -->
<div id="main-ui">

  <div id="bot-wrap">
    <div id="biel-bot">🤖</div>
    <div id="bot-speech"></div>
  </div>

  <div class="game-frame">
    <div class="grid" id="ggrid"></div>
  </div>

</div>

<script src="scripts/app.js"></script>
<script src="scripts/core.js"></script>

</body>
</html>
