<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>PlayWorld</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:'Fredoka',system-ui;
  background:#f4f6f8;
  color:#1e1e1e;
}

/* =========================
   PALETA (SEM NEON, SEM GRADIENTE)
========================= */

:root{
  --blue:#4a90e2;
  --red:#e25c5c;
  --yellow:#e2c44a;
  --green:#4ecb8f;

  --card:#ffffff;
  --glass:rgba(255,255,255,.55);
  --stroke:rgba(0,0,0,.08);
  --shadow:0 18px 40px rgba(0,0,0,.12);
}

/* =========================
   SCANNER (PORTA SIMPLES)
========================= */

#stage-scanner{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#f4f6f8;
}

.scan-wrap{
  width:300px;
  height:300px;
  border-radius:28px;
  background:var(--glass);
  border:1px solid var(--stroke);
  box-shadow:var(--shadow);

  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

#hold-zone{
  position:absolute;
  inset:0;
}

/* fingerprint */
.fp-img{
  width:120px;
  filter:drop-shadow(0 10px 10px rgba(0,0,0,.08));
}

/* scan indicator simples */
.scan-bar{
  position:absolute;
  width:70%;
  height:3px;
  background:#4a90e2;
  opacity:0;
}

.active .scan-bar{
  opacity:1;
  animation:scan 1.1s infinite;
}

@keyframes scan{
  0%{transform:translateY(-85px);}
  50%{transform:translateY(85px);}
  100%{transform:translateY(-85px);}
}

#txt{
  margin-top:18px;
  font-size:.95rem;
  color:#444;
}

/* =========================
   APP
========================= */

#app{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  padding:18px;
  overflow:auto;
  background:#f4f6f8;
}

/* HEADER */
.header{
  margin-bottom:16px;
}

.title{
  font-size:1.2rem;
  font-weight:700;
}

.sub{
  font-size:.7rem;
  opacity:.6;
}

/* =========================
   GRID CARDS (VIDRO + 3D)
========================= */

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

/* CARD PRINCIPAL */
.card{
  background:var(--card);
  border-radius:18px;
  box-shadow:var(--shadow);
  border:1px solid var(--stroke);

  padding:14px;
  transform:translateY(0);
  transition:.18s ease;
}

/* efeito 3D leve */
.card:active{
  transform:translateY(6px);
  box-shadow:0 10px 20px rgba(0,0,0,.12);
}

/* topo cor simples (sem neon, só identidade) */
.tag{
  width:100%;
  height:4px;
  border-radius:4px;
  margin-bottom:10px;
}

.blue{background:var(--blue);}
.red{background:var(--red);}
.yellow{background:var(--yellow);}
.green{background:var(--green);}

/* conteúdo */
.icon{
  font-size:2rem;
}

.name{
  margin-top:6px;
  font-weight:700;
}

.desc{
  font-size:.65rem;
  opacity:.6;
  margin-top:2px;
}

/* botão jogar */
.btn{
  margin-top:10px;
  padding:8px 10px;
  font-size:.7rem;
  border-radius:10px;
  border:none;
  background:#1e1e1e;
  color:#fff;
}

/* =========================
   DETALHE (CATÁLOGO EXPANDIDO FUTURO)
========================= */

</style>

</head>

<body>

<!-- SCANNER -->
<div id="stage-scanner">

  <div class="scan-wrap" id="box">

    <div id="hold-zone"></div>

    <div class="scan-bar"></div>

    <img class="fp-img" src="https://files.catbox.moe/jar7fm.png">

  </div>

  <div id="txt">Segure para entrar</div>

</div>

<!-- APP -->
<div id="app">

  <div class="header">
    <div class="title">PlayWorld</div>
    <div class="sub">Escolha seu jogo</div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<script>

/* =========================
   SCANNER
========================= */

const hold = document.getElementById("hold-zone");
const box = document.getElementById("box");
const scan = document.getElementById("stage-scanner");
const app = document.getElementById("app");

let t;

hold.addEventListener("touchstart",(e)=>{
  e.preventDefault();

  box.classList.add("active");

  t = setTimeout(()=>{
    scan.style.display="none";
    app.style.display="flex";
    load();
  },1400);

},{passive:false});

hold.addEventListener("touchend",()=>{
  box.classList.remove("active");
  clearTimeout(t);
});

/* =========================
   GAMES
========================= */

function load(){

  const games=[
    {id:"pacman",icon:"👾",name:"Pac Core",desc:"Clássico arcade",color:"blue"},
    {id:"snake",icon:"🐍",name:"Snake",desc:"Cresça e sobreviva",color:"green"},
    {id:"tetris",icon:"🧱",name:"Blocos",desc:"Quebra-cabeça",color:"yellow"},
    {id:"space",icon:"🚀",name:"Space",desc:"Aventura espacial",color:"red"}
  ];

  const grid=document.getElementById("grid");

  games.forEach(g=>{
    const c=document.createElement("div");
    c.className="card";

    c.innerHTML=`
      <div class="tag ${g.color}"></div>
      <div class="icon">${g.icon}</div>
      <div class="name">${g.name}</div>
      <div class="desc">${g.desc}</div>
      <button class="btn">Jogar</button>
    `;

    c.querySelector(".btn").onclick=()=>{
      window.location.href=g.id+".html";
    };

    grid.appendChild(c);
  });

}

</script>

</body>
</html>
