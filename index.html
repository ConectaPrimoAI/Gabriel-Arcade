<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>PlayWorld</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
}

img{
  -webkit-user-drag:none;
  user-select:none;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:'Fredoka',system-ui;
  background:#f6f7fb;
}

/* =========================
   SCANNER
========================= */

#stage-scanner{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(180deg,#f6f7fb,#eef2ff);
}

.scan-wrap{
  width:300px;
  height:300px;
  border-radius:40px;
  background:#fff;
  box-shadow:0 20px 60px rgba(0,0,0,.12);
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
  overflow:hidden;
}

/* 🔥 ÁREA DE SEGURAR (FIX PRINCIPAL) */
#hold-zone{
  position:absolute;
  inset:0;
  z-index:9999;
  background:transparent;
  touch-action:none;
}

/* fingerprint */
.fp-img{
  width:130px;
  pointer-events:none;
  filter:drop-shadow(0 10px 15px rgba(0,0,0,.15));
}

/* scan ring */
.scan-ring{
  position:absolute;
  inset:18px;
  border-radius:40px;
  border:2px dashed rgba(0,0,0,.08);
  opacity:0;
}

.active-scan .scan-ring{
  opacity:1;
  animation:spin 1.2s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* scan line */
.laser{
  position:absolute;
  width:80%;
  height:3px;
  background:rgba(0,0,0,.05);
  opacity:0;
}

.active-scan .laser{
  opacity:1;
  animation:scan 1.2s ease-in-out infinite;
}

@keyframes scan{
  0%{transform:translateY(-90px);}
  50%{transform:translateY(90px);}
  100%{transform:translateY(-90px);}
}

/* textos */
#scan-txt{
  margin-top:20px;
  font-size:1rem;
  color:#333;
}

.scan-hint{
  margin-top:6px;
  font-size:.7rem;
  color:#888;
}

/* =========================
   APP
========================= */

#main-ui{
  position:fixed;
  inset:0;
  display:none;
  flex-direction:column;
  padding:16px;
  overflow:auto;
  background:#f6f7fb;
}

#bot-wrap{
  text-align:center;
  margin-bottom:14px;
}

#biel-bot{
  font-size:58px;
}

#bot-speech{
  margin-top:10px;
  padding:10px 14px;
  background:#fff;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  display:none;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

/* card */
.card{
  background:#fff;
  border-radius:18px;
  padding:14px;
  box-shadow:0 12px 25px rgba(0,0,0,.08);
  transition:.15s;
}

.card:active{
  transform:scale(.97);
}

.icon{font-size:2rem;}
.name{font-size:.8rem;font-weight:600;margin-top:6px;}
.desc{font-size:.6rem;color:#777;margin-top:2px;}

</style>

</head>

<body>

<!-- SCANNER -->
<div id="stage-scanner">

  <div class="scan-wrap" id="scanner-box">

    <!-- 🔥 HOLD FIX -->
    <div id="hold-zone"></div>

    <div class="scan-ring"></div>
    <div class="laser"></div>

    <img class="fp-img" src="https://files.catbox.moe/jar7fm.png">

  </div>

  <div id="scan-txt">Segure para entrar</div>
  <div class="scan-hint">PlayWorld</div>

</div>

<!-- APP -->
<div id="main-ui">

  <div id="bot-wrap">
    <div id="biel-bot">🧸</div>
    <div id="bot-speech"></div>
  </div>

  <div class="grid" id="ggrid"></div>

</div>

<script>

/* =========================
   SCANNER FIXED
========================= */

const hold = document.getElementById("hold-zone");
const box = document.getElementById("scanner-box");
const scanner = document.getElementById("stage-scanner");
const app = document.getElementById("main-ui");

let t;

hold.addEventListener("touchstart", (e)=>{
  e.preventDefault();

  box.classList.add("active-scan");

  t = setTimeout(()=>{
    scanner.style.display="none";
    app.style.display="flex";
    loadGames();
  },1500);

}, {passive:false});

hold.addEventListener("touchend", ()=>{
  box.classList.remove("active-scan");
  clearTimeout(t);
});

/* =========================
   GAMES (JSON EXTERNO)
========================= */

function loadGames(){
  fetch("games.json")
    .then(r=>r.json())
    .then(data=>{

      const grid = document.getElementById("ggrid");

      data.games.forEach(g=>{
        const c=document.createElement("div");
        c.className="card";

        c.innerHTML=`
          <div class="icon">${g.ic}</div>
          <div class="name">${g.nm}</div>
          <div class="desc">${g.bd}</div>
        `;

        c.onclick=()=>{
          window.location.href="games/"+g.id+".html";
        };

        grid.appendChild(c);
      });

    });
}

</script>

</body>
</html>
