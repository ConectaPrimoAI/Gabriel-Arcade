<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Jump Hero - Arcade Supremo</title>
    <link rel='stylesheet' href='../assets/style.css'>
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        canvas { display: block; width: 100%; height: 100%; }
        .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px 20px;
            background: rgba(0, 242, 255, 0.2);
            color: #00f2ff;
            border: 1px solid #00f2ff;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <a href='../index.html' class='back-btn'>⬅ VOLTAR</a>
    <div id='game-container'>
        <canvas id='gameCanvas'></canvas>
    </div>
    <script src='../scripts/core.js'></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let W = window.innerWidth;
        let H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;

        // Mock de funções globais necessárias
        window.gameActive = true;
        window.score = 0;
        window.rafId = null;
        
        function gPlatform(){showCtrl('PULAR','ATACAR');document.getElementById('abA').textContent='⬆';document.getElementById('abA').style.fontSize='1.3rem';document.getElementById('abB').textContent='⚔';document.getElementById('abB').style.fontSize='1.2rem';const P={x:120,y:400,w:28,h:44,vx:0,vy:0,onG:false,hp:5,mhp:5,dir:1,att:0,coins:0,inv:0};let camX=0,pts2=[],enemies=[],coins_=[],pforms=[],lvl=1,fr=0;function gen(){enemies=[];coins_=[];pforms=[{x:0,y:H-44,w:W*4,h:28,col:'#2a5a1a',ground:true}];let lx=280;for(let i=0;i<16+lvl*3;i++){lx+=rnd(70,155);const pw=rnd(90,160),py=H*.18+rnd(0,H*.55);if(py>H-80)continue;pforms.push({x:lx,y:py,w:pw,h:14,col:`hsl(${100+rnd(0,80)},45%,${25+rnd(0,20)}%)`});for(let c=0;c<rndI(0,3);c++)coins_.push({x:lx+c*36+20,y:py-24,alive:true,t:rnd(0,6)});if(Math.random()<.38)enemies.push({x:lx+40,y:py-32,w:30,h:30,hp:lvl,mhp:lvl,vx:1.5,p:pforms[pforms.length-1],dir:1,f:0,ft:0});}pforms.push({x:lx+200,y:H*.22,w:90,h:16,col:'#ddaa00',goal:true});P.x=120;P.y=400;P.vy=0;P.onG=false;}gen();function loop(){rafId=requestAnimationFrame(loop);if(!gameActive)return;fr++;const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,`hsl(${200+lvl*8},60%,${14+lvl*2}%)`);sky.addColorStop(1,`hsl(${140+lvl*5},40%,${10+lvl*2}%)`);ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);for(let i=0;i<4;i++){ctx.fillStyle='rgba(0,0,0,.08)';const mx2=((i*200-camX*.15)%(W+400)-100);ctx.beginPath();ctx.moveTo(mx2,H);ctx.lineTo(mx2+120,H*.38);ctx.lineTo(mx2+240,H);ctx.fill();}camX=lerp(camX,P.x-W*.36,.1);camX=Math.max(0,camX);if(K.lt){P.vx=-5.5;P.dir=-1;}else if(K.rt){P.vx=5.5;P.dir=1;}else P.vx*=.7;if((K.up||TAP.a)&&P.onG){P.vy=-15;P.onG=false;}if(TAP.b&&P.att===0){P.att=22;enemies.forEach(e=>{if(Math.abs(e.x-P.x)<85&&Math.abs(e.y-P.y)<58){e.hp--;if(e.hp<=0){addPts(50+lvl*10);mkP(pts2,e.x-camX,e.y,10,['#ff8800','#ffcc00'],8);enemies.splice(enemies.indexOf(e),1);}}});}clrT();if(P.att>0)P.att--;if(P.inv>0)P.inv--;P.vy=Math.min(P.vy+.58,17);P.x+=P.vx;P.y+=P.vy;P.onG=false;pforms.forEach(pl=>{if(P.x+P.w>pl.x&&P.x<pl.x+pl.w&&P.vy>=0&&P.y+P.h>=pl.y&&P.y+P.h<=pl.y+pl.h+P.vy+2){P.y=pl.y-P.h;P.vy=0;P.onG=true;if(pl.goal&&!pl.done){pl.done=true;addPts(1000+lvl*200);lvl++;gen();}}});if(P.y>H+150){P.hp--;P.inv=100;if(P.hp<=0){goOver();return;}P.x=120;P.y=300;P.vy=0;}P.x=Math.max(-50,P.x);pforms.forEach(pl=>{const px=pl.x-camX;if(px>W+200||px<-200)return;ctx.fillStyle=pl.col;ctx.fillRect(px,pl.y,pl.w,pl.h);ctx.fillStyle='rgba(255,255,255,.1)';ctx.fillRect(px,pl.y,pl.w,4);if(pl.goal){ctx.fillStyle='rgba(255,215,0,.25)';ctx.fillRect(px,pl.y,pl.w,pl.h);ctx.font='18px sans-serif';ctx.textAlign='center';ctx.fillText('🚩',px+pl.w/2,pl.y-4);}});coins_.forEach(c=>{if(!c.alive)return;c.t+=.06;ctx.font='15px sans-serif';ctx.textAlign='center';ctx.fillText('🪙',c.x-camX,c.y+Math.sin(c.t)*4);if(Math.hypot(c.x-P.x,c.y-P.y)<28){c.alive=false;P.coins++;addPts(20);mkP(pts2,c.x-camX,c.y,4,['#ffd700'],4);}});enemies.forEach(e=>{e.x+=e.vx;e.ft++;if(e.ft>8){e.f=1-e.f;e.ft=0;}if(e.x<e.p.x+4||e.x+e.w>e.p.x+e.p.w-4)e.vx*=-1;const epx=e.x-camX;ctx.font='26px sans-serif';ctx.textAlign='center';ctx.fillText(e.f?'👹':'😈',epx,e.y);ctx.fillStyle='#400';ctx.fillRect(epx-14,e.y-e.h-4,34,4);ctx.fillStyle='#f44';ctx.fillRect(epx-14,e.y-e.h-4,34*e.hp/e.mhp,4);if(!P.inv&&P.att===0&&Math.abs(e.x-P.x)<32&&Math.abs(e.y-P.y)<40){P.hp--;P.inv=100;P.vy=-9;mkP(pts2,P.x-camX,P.y,5,['#ff3366'],5);if(P.hp<=0){goOver();return;}}});if(P.att>10){ctx.strokeStyle='#ffee00';ctx.lineWidth=5;ctx.shadowBlur=16;ctx.shadowColor='#ffdd00';ctx.beginPath();ctx.arc(P.x-camX+P.dir*52,P.y+8,25,0,Math.PI);ctx.stroke();ctx.shadowBlur=0;}if(P.inv&&Math.floor(fr/7)%2===0){pts2=tickP(pts2);return;}const hx=P.x-camX,hy=P.y;const wa2=P.onG?Math.sin(fr*.2)*9:0;ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(hx+P.w/2,hy+P.h+3,P.w*.38,4,0,0,7);ctx.fill();ctx.fillStyle='#990000';ctx.beginPath();ctx.moveTo(hx+4,hy+10);ctx.lineTo(hx-9,hy+P.h*.65);ctx.lineTo(hx+9,hy+P.h*.52);ctx.closePath();ctx.fill();ctx.fillStyle='#1a2266';ctx.fillRect(hx+3,hy+P.h*.78+wa2,11,P.h*.22-Math.max(0,wa2));ctx.fillRect(hx+P.w-14,hy+P.h*.78-wa2,11,P.h*.22+Math.min(0,wa2));ctx.fillStyle='#111';ctx.fillRect(hx+2,hy+P.h-8+wa2,12,8);ctx.fillRect(hx+P.w-14,hy+P.h-8-wa2,12,8);ctx.fillStyle='#2244aa';ctx.beginPath();ctx.roundRect(hx+2,hy+P.h*.26,P.w-4,P.h*.54,4);ctx.fill();ctx.fillStyle='#ffd700';ctx.fillRect(hx+2,hy+P.h*.56,P.w-4,4);ctx.fillStyle='#2244aa';ctx.fillRect(hx-5,hy+P.h*.28+wa2*.4,8,P.h*.28);ctx.fillRect(hx+P.w-3,hy+P.h*.28-wa2*.4,8,P.h*.28);ctx.fillStyle='#f0b870';ctx.beginPath();ctx.roundRect(hx+3,hy+1,P.w-6,P.h*.28,6);ctx.fill();ctx.fillStyle='#2244aa';ctx.fillRect(hx+3,hy+1,P.w-6,P.h*.1);ctx.fillStyle='#222';ctx.fillRect(hx+7,hy+P.h*.12,3,4);ctx.fillRect(hx+P.w-10,hy+P.h*.12,3,4);pts2=tickP(pts2);for(let i=0;i<P.mhp;i++){ctx.fillStyle=i<P.hp?'#ff3366':'#333';ctx.beginPath();ctx.arc(20+i*22,20,7,0,7);ctx.fill();}setHUD(`⭐ ${score} 🪙 ${P.coins} LVL ${lvl}`);}requestAnimationFrame(loop);}

        // Iniciar o jogo
        gPlatform();
    </script>
</body>
</html>
