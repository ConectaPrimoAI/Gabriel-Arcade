`
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Ultra Hero  🛡️</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #050510;
  --accent: #ffcc00;
  --danger: #ff4444;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
body { 
    height: 100dvh; width: 100vw; overflow: hidden; 
    background: var(--sky); font-family: 'Press Start 2P', cursive;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
}

#game-container {
    position: relative;
    width: 98vw;
    height: 65dvh;
    max-width: 850px;
    background: linear-gradient(to bottom, #020205, #101025);
    border: 4px solid #333;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.9);
}
canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

#hud {
  position: absolute; top: 15px; left: 0; width: 100%; padding: 0 20px;
  display: flex; justify-content: space-between; pointer-events: none; z-index: 100;
  color: #fff; font-size: 10px; text-shadow: 2px 2px #000;
}

#controller-panel {
    width: 100%; max-width: 850px; flex: 1;
    display: flex; align-items: center; justify-content: space-around;
    padding: 10px; background: #151515; border-top: 4px solid #222;
}

.dpad { position: relative; width: 160px; height: 160px; }
.dbtn {
    position: absolute; width: 60px; height: 60px;
    background: #252525; border: 3px solid #444; color: #fff;
    display: flex; align-items: center; justify-content: center;
    border-radius: 12px; font-size: 24px; box-shadow: 0 4px 0 #000;
}
.dbtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; background: #333; }
#btn-lt { top: 50px; left: 0; }
#btn-rt { top: 50px; right: 0; }

.action-group { display: flex; gap: 20px; }
.abtn {
    width: 85px; height: 85px; border-radius: 50%;
    border: 4px solid #444; font-family: 'Press Start 2P';
    font-size: 10px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; text-shadow: 1px 1px #000; box-shadow: 0 5px 0 #000;
}
#btn-atk { background: #b91c1c; color: #fff; }
#btn-jump { background: #1e40af; color: #fff; }
.abtn:active { transform: translateY(4px); box-shadow: 0 1px 0 #000; }

.overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.9); 
  display: none; flex-direction: column; align-items: center; justify-content: center;
  z-index: 10000; text-align: center; color: #fff; padding: 20px;
}
.btn-main {
  background: var(--accent); color: #000; border: none; padding: 18px 36px;
  font-family: 'Press Start 2P'; font-size: 12px; margin-top: 20px; cursor: pointer;
  box-shadow: 0 4px 0 #b45309; border-radius: 4px;
}
.btn-main:active { transform: translateY(2px); box-shadow: 0 2px 0 #b45309; }

#start-screen { display: flex; }
</style>
</head>
<body>

<div id="game-container">
  <canvas id="gc"></canvas>
  <div id="hud">
    <div>VIDA:<span id="hp-val">3</span></div>
    <div>🪙:<span id="coins-val">0</span></div>
    <div>PTS:<span id="score-val">0</span></div>
  </div>

  <div id="start-screen" class="overlay">
    <h1 style="color: var(--accent); font-size: 24px; margin-bottom: 20px; text-shadow: 4px 4px #451a03;">ULTRA HERO</h1>
    <p style="font-size: 10px; line-height: 1.5;">USE A ESPADA PARA VENCER OS MONSTROS!</p>
    <button class="btn-main" onclick="startGame()">INICIAR AVENTURA</button>
  </div>

  <div id="game-over" class="overlay">
    <h2 style="color: var(--danger);">VOCÊ CAIU!</h2>
    <p id="final-stats" style="margin: 15px 0; font-size: 10px;"></p>
    <button class="btn-main" onclick="location.reload()">TENTAR NOVAMENTE</button>
  </div>

  <div id="prize-screen" class="overlay">
    <h2 style="color: #fbbf24;">VITÓRIA TOTAL!</h2>
    <p id="prize-text" style="margin: 20px 0; font-size: 12px; line-height: 1.8;"></p>
    <button class="btn-main" onclick="startGame()">PRÓXIMA FASE</button>
  </div>
</div>

<div id="controller-panel">
    <div class="dpad">
        <div class="dbtn" id="btn-lt">◀</div>
        <div class="dbtn" id="btn-rt">▶</div>
    </div>
    <div class="action-group">
        <div class="abtn" id="btn-atk">ATAQUE</div>
        <div class="abtn" id="btn-jump">PULO</div>
    </div>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
let W, H, dpr;

let gameActive = false;
let score = 0, coins = 0, frame = 0, shaking = 0;
let camX = 0;

const GRAVITY = 0.55;
const JUMP_FORCE = -13;
const WALK_SPEED = 4.8;

const ENEMY_EMOJIS = ['👽', '👹', '💀', '👿', '😡'];

class Hero {
    constructor() { this.reset(); }
    reset() {
        this.x = 80; this.y = 100;
        this.w = 48; this.h = 64;
        this.vx = 0; this.vy = 0;
        this.onG = false;
        this.hp = 3;
        this.dir = 1;
        this.invinc = 0;
        this.att = 0;
        this.anim = 0;
    }
    update() {
        if (this.invinc > 0) this.invinc--;
        if (this.att > 0) this.att--;
        this.vy += GRAVITY;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.82;

        if (this.x < 0) this.x = 0;
        if (this.y > H + 100) this.die();
        if (Math.abs(this.vx) > 0.5) this.anim += 0.25;
    }
    jump() {
        if (this.onG) {
            this.vy = JUMP_FORCE;
            this.onG = false;
        }
    }
    damage() {
        if (this.invinc > 0) return;
        this.hp--;
        this.invinc = 60;
        shaking = 15;
        updateHUD();
        if (this.hp <= 0) endGame();
    }
    die() { this.hp = 0; updateHUD(); endGame(); }
    
    draw() {
        ctx.save();
        ctx.translate(this.x - camX + this.w/2, this.y + this.h/2);
        if (this.dir === -1) ctx.scale(-1, 1);
        if (this.invinc % 4 > 1) ctx.globalAlpha = 0.5;

        // --- DESENHO DO HERÓI ORGANIZADO E TEXTURIZADO ---
        
        // Sombra Projetada Pequena
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(-15, 25, 30, 5);

        // Capa com movimento
        let capeFlow = Math.sin(this.anim) * 5;
        ctx.fillStyle = '#7f1d1d'; // Sombra da capa
        ctx.fillRect(-26, -20, 15, 35);
        ctx.fillStyle = '#b91c1c'; // Cor principal
        ctx.fillRect(-24 + capeFlow, -20, 15, 32);

        // Armadura (Corpo) - Gradiente metálico
        let bodyGrad = ctx.createLinearGradient(-15, -20, 15, 15);
        bodyGrad.addColorStop(0, '#4b5563');
        bodyGrad.addColorStop(0.5, '#1f2937');
        bodyGrad.addColorStop(1, '#111827');
        ctx.fillStyle = bodyGrad;
        ctx.fillRect(-15, -20, 30, 38);
        
        // Detalhe de Textura (Brilho na Armadura)
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(-12, -18, 5, 30);

        // Capacete Organizado
        ctx.fillStyle = '#9ca3af'; // Metal claro
        ctx.fillRect(-14, -48, 28, 28);
        ctx.fillStyle = '#111827'; // Viseira escura
        ctx.fillRect(0, -40, 14, 6);
        ctx.fillStyle = '#6b7280'; // Topo do capacete
        ctx.fillRect(-14, -48, 28, 4);

        // Pernas com Textura
        ctx.fillStyle = '#111827';
        let legX = Math.sin(this.anim) * 10;
        if (!this.onG) legX = 8;
        ctx.fillRect(-14, 18, 12, 12 + (this.onG ? legX : 5));
        ctx.fillRect(2, 18, 12, 12 + (this.onG ? -legX : 5));

        // BRAÇO E ESPADA NA MÃO
        if (this.att > 0) {
            ctx.save();
            ctx.rotate(-0.4); 
            // Braço Armadura
            ctx.fillStyle = '#374151';
            ctx.fillRect(12, -12, 22, 10);
            
            // ESPADA DETALHADA
            ctx.translate(32, -8);
            ctx.rotate(0.9);
            // Cabo e Pommel
            ctx.fillStyle = '#451a03';
            ctx.fillRect(0, 0, 6, 15);
            ctx.fillStyle = '#fbbf24';
            ctx.fillRect(-2, 15, 10, 4); // Guarda
            // Lâmina com textura e corte
            let bladeGrad = ctx.createLinearGradient(0, 19, 6, 60);
            bladeGrad.addColorStop(0, '#e5e7eb');
            bladeGrad.addColorStop(1, '#9ca3af');
            ctx.fillStyle = bladeGrad;
            ctx.beginPath();
            ctx.moveTo(-1, 19);
            ctx.lineTo(7, 19);
            ctx.lineTo(3, 65); // Lâmina grande
            ctx.closePath();
            ctx.fill();
            // Fio da Espada (Brilho)
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        } else {
            // Braço repouso
            ctx.fillStyle = '#374151';
            ctx.fillRect(6, -8, 10, 22);
        }

        ctx.restore();
    }
}

class Platform {
    constructor(x, y, w, type = 'normal') {
        this.x = x; this.y = y; this.w = w; this.h = 28;
        this.type = type; // normal, breakable, fan
        this.active = true;
        this.breakTimer = 0;
        this.fanAngle = 0;
    }
    update(hero) {
        if (!this.active) return;
        
        // Lógica de Ventilador
        if (this.type === 'fan') {
            this.fanAngle += 0.2;
            if (hero.x + hero.w > this.x && hero.x < this.x + this.w &&
                hero.y < this.y && hero.y > this.y - 250) {
                hero.vy -= 1.2; // Empuxo para cima
            }
        }

        // Colisão de Pulo
        if (hero.vy >= 0 && hero.x + hero.w*0.8 > this.x && hero.x + hero.w*0.2 < this.x + this.w &&
            hero.y + hero.h > this.y && hero.y + hero.h < this.y + this.h + hero.vy) {
            
            if (this.type === 'breakable') {
                this.breakTimer++;
                if (this.breakTimer > 20) this.active = false;
            } else {
                hero.y = this.y - hero.h;
                hero.vy = 0;
                hero.onG = true;
            }
        }
    }
    draw() {
        if (!this.active) return;
        ctx.save();
        
        if (this.type === 'normal') {
            ctx.fillStyle = '#1e3a8a';
            ctx.fillRect(this.x - camX, this.y, this.w, this.h);
            ctx.fillStyle = '#3b82f6';
            ctx.fillRect(this.x - camX, this.y, this.w, 8);
        } else if (this.type === 'breakable') {
            ctx.fillStyle = '#78350f';
            ctx.fillRect(this.x - camX, this.y, this.w, this.h);
            ctx.strokeStyle = '#451a03';
            ctx.strokeRect(this.x - camX + 5, this.y + 5, this.w - 10, this.h - 10);
            if (this.breakTimer > 0) {
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(this.x - camX, this.y, this.w, this.h);
            }
        } else if (this.type === 'fan') {
            // Base do ventilador
            ctx.fillStyle = '#064e3b';
            ctx.fillRect(this.x - camX, this.y, this.w, this.h);
            // Hélice
            ctx.translate(this.x + this.w/2 - camX, this.y + this.h/2);
            ctx.rotate(this.fanAngle);
            ctx.fillStyle = '#10b981';
            for(let i=0; i<4; i++) {
                ctx.rotate(Math.PI/2);
                ctx.fillRect(-2, -this.w/2 + 5, 4, this.w/2 - 5);
            }
            // Vento visual
            ctx.restore();
            if (frame % 5 === 0) {
                createParticle(this.x + Math.random()*this.w, this.y, '#10b981', -5);
            }
        }
        ctx.restore();
    }
}

class Entity {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type;
        this.alive = true;
        this.emoji = ENEMY_EMOJIS[Math.floor(Math.random() * ENEMY_EMOJIS.length)];
        this.t = Math.random() * 10;
    }
    update(hero) {
        if (!this.alive) return;
        this.t += 0.06;
        const dist = Math.hypot(this.x - (hero.x + 24), this.y - (hero.y + 32));
        if (dist < 45) {
            if (this.type === 'coin') { this.alive = false; coins++; score += 50; updateHUD(); }
            if (this.type === 'enemy') {
                if (hero.att > 0 || hero.vy > 3) { 
                    this.alive = false; score += 250; 
                    shaking = 5;
                } else hero.damage();
            }
            if (this.type === 'chest') openChest();
        }
    }
    draw() {
        if (!this.alive) return;
        ctx.save();
        ctx.translate(this.x - camX, this.y + Math.sin(this.t)*8);
        if (this.type === 'coin') {
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial'; ctx.textAlign='center'; ctx.fillText('$', 0, 5);
        } else if (this.type === 'enemy') {
            ctx.font = '36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(this.emoji, 0, 12);
        } else if (this.type === 'chest') {
            ctx.font = '48px Arial'; ctx.textAlign = 'center'; ctx.fillText('🎁', 0, 15);
        }
        ctx.restore();
    }
}

let particles = [];
function createParticle(x, y, color, vy) {
    particles.push({x, y, vx:(Math.random()-0.5)*2, vy: vy || (Math.random()-0.5)*5, life:1, color});
}

let hero = new Hero();
let platforms = [];
let entities = [];

function generateLevel() {
    platforms = [new Platform(0, H - 80, 300, 'normal')];
    entities = [];
    let lastX = 0;
    let lastY = H - 80;

    for (let i = 0; i < 25; i++) {
        let type = 'normal';
        let r = Math.random();
        if (r > 0.8) type = 'fan';
        else if (r > 0.6) type = 'breakable';

        let gap = 120 + Math.random() * 150;
        let nextW = 140 + Math.random() * 100;
        let nextX = lastX + 200 + gap;
        let nextY = Math.max(200, Math.min(H - 120, lastY + (Math.random() - 0.5) * 220));

        platforms.push(new Platform(nextX, nextY, nextW, type));
        if (Math.random() > 0.3) entities.push(new Entity(nextX + nextW/2, nextY - 50, 'coin'));
        if (Math.random() > 0.6) entities.push(new Entity(nextX + Math.random()*nextW, nextY - 60, 'enemy'));

        lastX = nextX; lastY = nextY;
    }
    const finalP = platforms[platforms.length - 1];
    entities.push(new Entity(finalP.x + finalP.w - 60, finalP.y - 30, 'chest'));
}

function updateHUD() {
    document.getElementById('hp-val').textContent = hero.hp;
    document.getElementById('coins-val').textContent = coins;
    document.getElementById('score-val').textContent = score;
}

function drawBackground() {
    ctx.fillStyle = '#020208';
    ctx.fillRect(0,0,W,H);
    // Skyline Noturno
    ctx.fillStyle = '#0a0a20';
    for(let i=0; i<12; i++) {
        let bx = (i * 250) - (camX * 0.1) % 3000;
        ctx.fillRect(bx, H - 400, 150, 400);
        // Janelas
        ctx.fillStyle = '#1e3a8a';
        for(let j=0; j<5; j++) ctx.fillRect(bx+20+j*25, H-380, 10, 10);
        ctx.fillStyle = '#0a0a20';
    }
}

function loop() {
    if (!gameActive) return;
    frame++;
    drawBackground();
    
    let targetCamX = hero.x - W * 0.35;
    camX += (targetCamX - camX) * 0.08;
    if (camX < 0) camX = 0;

    ctx.save();
    if (shaking > 0) { ctx.translate((Math.random()-0.5)*shaking, (Math.random()-0.5)*shaking); shaking *= 0.85; }

    hero.onG = false;
    platforms.forEach(p => { p.update(hero); p.draw(); });
    entities.forEach(e => { e.update(hero); e.draw(); });
    
    particles = particles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
        ctx.fillRect(p.x - camX, p.y, 4, 4);
        return p.life > 0;
    });
    ctx.globalAlpha = 1;

    hero.update(); hero.draw();
    ctx.restore();

    if (keys.lt) { hero.vx = -WALK_SPEED; hero.dir = -1; }
    if (keys.rt) { hero.vx = WALK_SPEED; hero.dir = 1; }
    requestAnimationFrame(loop);
}

const keys = { lt: false, rt: false };
function setupControls() {
    const bind = (id, action) => {
        const el = document.getElementById(id);
        el.onpointerdown = (e) => {
            e.preventDefault();
            if (action === 'jump') hero.jump();
            else if (action === 'atk') hero.att = 15;
            else keys[action] = true;
        };
        el.onpointerup = () => { if (action !== 'jump' && action !== 'atk') keys[action] = false; };
    };
    bind('btn-lt', 'lt'); bind('btn-rt', 'rt');
    bind('btn-jump', 'jump'); bind('btn-atk', 'atk');
}

function startGame() {
    document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
    gameActive = true; hero.reset(); camX = 0; particles = [];
    generateLevel(); updateHUD();
    requestAnimationFrame(loop);
}

function openChest() {
    gameActive = false;
    const prizes = ["ESPADA SAGRADA!", "DRAGÃO DE ESTIMAÇÃO!", "ARMADURA DE DIAMANTE!", "REINO CONQUISTADO!"];
    const prize = prizes[Math.floor(Math.random() * prizes.length)];
    document.getElementById('prize-text').innerHTML = `PONTOS: ${score}<br>MOEDAS: ${coins}<br><br><span style="color:white">VOCÊ GANHOU:</span><br>${prize}`;
    document.getElementById('prize-screen').style.display = 'flex';
}

function endGame() { 
    gameActive = false; 
    document.getElementById('final-stats').innerHTML = `SCORE: ${score} | MOEDAS: ${coins}`;
    document.getElementById('game-over').style.display = 'flex'; 
}

function resize() {
    dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.scale(dpr, dpr);
}

window.onload = () => { resize(); setupControls(); };
window.onresize = resize;
</script>
</body>
</html>
