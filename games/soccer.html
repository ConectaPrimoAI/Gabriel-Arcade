
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Futebol ⚽</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --p1: #4cc9f0;
    --bot: #f72585;
    --gk: #ffbe0b;
    --ball: #fee440;
    --grass: #38b000;
}

* {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent; user-select: none;
}

body {
    height: 100dvh; width: 100vw; overflow: hidden;
    background: #1a1a1a; font-family: 'Fredoka', sans-serif;
    display: flex; flex-direction: column;
}

/* --- PLACAR --- */
#ui {
    position: absolute; top: 20px; width: 100%;
    display: flex; justify-content: center; z-index: 100; pointer-events: none;
}

.scoreboard {
    background: #fff; padding: 10px 30px; border-radius: 25px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.2);
    display: flex; align-items: center; gap: 20px; border: 4px solid #333;
}

.score-num { font-size: 36px; font-weight: 700; color: #333; min-width: 40px; text-align: center; }
.vs-label { font-size: 14px; font-weight: 700; color: #999; }

/* --- CONTROLES --- */
#controls {
    position: absolute; bottom: 30px; width: 100%;
    display: flex; justify-content: space-between; padding: 0 30px;
    z-index: 1000; pointer-events: none;
}

.joystick-area {
    width: 130px; height: 130px; background: rgba(255,255,255,0.1);
    border-radius: 50%; position: relative; pointer-events: all;
    border: 3px solid rgba(255,255,255,0.2);
}

.stick {
    width: 60px; height: 60px; background: #fff; border-radius: 50%;
    position: absolute; top: 35px; left: 35px;
    box-shadow: 0 6px 0 #bbb; border: 3px solid #333;
}

.actions { display: flex; gap: 15px; pointer-events: all; }
.btn {
    width: 90px; height: 90px; border-radius: 50%;
    border: 4px solid #333; display: flex; flex-direction: column;
    align-items: center; justify-content: center; font-weight: 700;
    font-size: 14px; transition: 0.1s;
}

.btn-dash { background: var(--p1); box-shadow: 0 6px 0 #008eb8; color: #fff; }
.btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #333; }

/* --- TELAS --- */
.screen {
    position: fixed; inset: 0; background: #fff;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 5000;
}

.play-btn {
    margin-top: 30px; padding: 15px 60px; font-size: 28px;
    background: var(--grass); color: #fff; border-radius: 40px;
    border: 4px solid #333; font-weight: 700; box-shadow: 0 8px 0 #226b00;
    cursor: pointer;
}

#msg {
    position: fixed; top: 30%; width: 100%; text-align: center;
    font-size: 70px; font-weight: 900; color: #fff;
    -webkit-text-stroke: 3px #333; pointer-events: none;
    z-index: 4000; display: none;
}
</style>
</head>
<body>

<div id="ui">
    <div class="scoreboard">
        <div class="score-num" id="s1">0</div>
        <div class="vs-label">X</div>
        <div class="score-num" id="s2">0</div>
    </div>
</div>

<div id="msg">GOOOOOL!</div>

<div id="controls">
    <div class="joystick-area" id="j-base"><div class="stick" id="j-stick"></div></div>
    <div class="actions">
        <div class="btn btn-dash" id="b-dash">⚡<br>CORRER</div>
    </div>
</div>

<div class="screen" id="start-screen">
    <h1 style="color:#333; font-size: 50px;">SLIME SOCCER</h1>
    <p style="margin-top:10px; color:#666;">Gabriel vs Robô Atrapalhado</p>
    <button class="play-btn" onclick="start()">JOGAR!</button>
</div>

<canvas id="stage"></canvas>

<script>
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W, H, active = false;

const input = { x: 0, y: 0, dash: false };
const world = { w: 800, h: 500, ballFric: 0.98, playFric: 0.92 };

class Entity {
    constructor(x, y, r, color, type) {
        this.x = x; this.y = y; this.r = r; this.color = color;
        this.vx = 0; this.vy = 0; this.type = type; // 'player', 'bot', 'gk-pro', 'gk-noob'
    }
    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath(); ctx.ellipse(0, this.r, this.r, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = this.color; ctx.strokeStyle = '#333'; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(0, 0, this.r, 0, 7); ctx.fill(); ctx.stroke();
        
        // Rostinhos diferentes
        ctx.fillStyle = '#333';
        if(this.type === 'gk-noob') {
            // Olhos de tonto
            ctx.beginPath(); ctx.arc(-7, -4, 3, 0, 7); ctx.arc(7, -4, 3, 0, 7); ctx.fill();
            ctx.beginPath(); ctx.arc(0, 5, 4, 0, Math.PI); ctx.stroke();
        } else if(this.type === 'gk-pro') {
            // Olhos brabos
            ctx.fillRect(-10, -8, 8, 3); ctx.fillRect(2, -8, 8, 3);
            ctx.beginPath(); ctx.arc(-6, -2, 3, 0, 7); ctx.arc(6, -2, 3, 0, 7); ctx.fill();
        } else {
            ctx.beginPath(); ctx.arc(-7, -4, 3, 0, 7); ctx.arc(7, -4, 3, 0, 7); ctx.fill();
        }
        ctx.restore();
    }
}

let p1 = new Entity(180, 250, 25, '#4cc9f0', 'player');
let bot = new Entity(620, 250, 25, '#f72585', 'bot');
let gkPro = new Entity(40, 250, 22, '#ffbe0b', 'gk-pro'); // Seu goleiro (Lenda)
let gkNoob = new Entity(760, 250, 22, '#ffbe0b', 'gk-noob'); // Goleiro deles (Burro)
let ball = { x: 400, y: 250, vx: 0, vy: 0, r: 16 };
let score = { p1: 0, bot: 0 };

// --- JOYSTICK ---
const jBase = document.getElementById('j-base');
const jStick = document.getElementById('j-stick');
let jDown = false;

function handleJ(e) {
    if(!jDown) return;
    const r = jBase.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    let dx = t.clientX - (r.left + r.width/2);
    let dy = t.clientY - (r.top + r.height/2);
    const d = Math.min(Math.hypot(dx, dy), 45);
    const ang = Math.atan2(dy, dx);
    input.x = (Math.cos(ang) * d) / 45;
    input.y = (Math.sin(ang) * d) / 45;
    jStick.style.transform = `translate(${input.x*35}px, ${input.y*35}px)`;
}

jBase.addEventListener('touchstart', (e) => { jDown = true; handleJ(e); });
window.addEventListener('touchmove', handleJ);
window.addEventListener('touchend', () => { jDown = false; input.x = 0; input.y = 0; jStick.style.transform = `translate(0,0)`; });
document.getElementById('b-dash').addEventListener('touchstart', () => { input.dash = true; setTimeout(()=>input.dash=false, 200); });

function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W; canvas.height = H;
}

function reset() {
    active = false;
    document.getElementById('msg').style.display = 'block';
    setTimeout(() => {
        document.getElementById('msg').style.display = 'none';
        ball.x = 400; ball.y = 250; ball.vx = 0; ball.vy = 0;
        p1.x = 180; p1.y = 250; bot.x = 620; bot.y = 250;
        gkPro.y = 250; gkNoob.y = 250;
        active = true;
    }, 1000);
}

function update() {
    if(!active) return;

    // Movimento Player
    const pSpeed = input.dash ? 10 : 6;
    p1.vx = input.x * pSpeed; p1.vy = input.y * pSpeed;
    p1.x += p1.vx; p1.y += p1.vy;

    // IA Robô Atrapalhado
    const botSpeed = 3.5;
    const dx = ball.x - bot.x;
    const dy = ball.y - bot.y;
    const dist = Math.hypot(dx, dy);
    // Robô só persegue se a bola estiver no campo dele e ele for lento
    if(ball.x > world.w/2) {
        bot.vx = (dx/dist) * botSpeed;
        bot.vy = (dy/dist) * botSpeed;
    } else {
        bot.vx = ( (world.w - 150) - bot.x) * 0.05;
        bot.vy = ( (world.h/2) - bot.y) * 0.05;
    }
    bot.x += bot.vx; bot.y += bot.vy;

    // Goleiro PRO (Seu) - Segue a bola perfeitamente
    gkPro.y += (ball.y - gkPro.y) * 0.15;
    gkPro.y = Math.max(180, Math.min(320, gkPro.y));

    // Goleiro NOOB (Deles) - Muito lento e erra o tempo
    gkNoob.y += (ball.y - gkNoob.y) * 0.02; // Super lento
    gkNoob.y = Math.max(180, Math.min(320, gkNoob.y));

    // Limites de Campo
    [p1, bot].forEach(e => {
        e.x = Math.max(e.r, Math.min(world.w - e.r, e.x));
        e.y = Math.max(e.r, Math.min(world.h - e.r, e.y));
    });

    // Bola Física
    ball.x += ball.vx; ball.y += ball.vy;
    ball.vx *= world.ballFric; ball.vy *= world.ballFric;
    if(ball.y < ball.r || ball.y > world.h - ball.r) ball.vy *= -1;

    // Gols (Traves)
    const gY = [180, 320];
    if(ball.x < 0) {
        if(ball.y > gY[0] && ball.y < gY[1]) { score.bot++; reset(); }
        else { ball.vx *= -1; ball.x = ball.r; }
    }
    if(ball.x > world.w) {
        if(ball.y > gY[0] && ball.y < gY[1]) { score.p1++; reset(); }
        else { ball.vx *= -1; ball.x = world.w - ball.r; }
    }

    // Colisões (Chute automático ao encostar)
    [p1, bot, gkPro, gkNoob].forEach(s => {
        const d = Math.hypot(ball.x - s.x, ball.y - s.y);
        if(d < s.r + ball.r) {
            const ang = Math.atan2(ball.y - s.y, ball.x - s.x);
            // Se for o Gabriel chutando, a bola vai com MUITA força
            const force = (s === p1) ? 16 : 8;
            ball.vx = Math.cos(ang) * force;
            ball.vy = Math.sin(ang) * force;
            // Reposiciona a bola para não bugar
            ball.x = s.x + Math.cos(ang) * (s.r + ball.r + 2);
            ball.y = s.y + Math.sin(ang) * (s.r + ball.r + 2);
        }
    });

    document.getElementById('s1').innerText = score.p1;
    document.getElementById('s2').innerText = score.bot;
}

function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.save();
    const sc = Math.min(W/world.w, H/world.h) * 0.85;
    ctx.translate(W/2, H/2); ctx.scale(sc, sc); ctx.translate(-world.w/2, -world.h/2);

    // Gramado
    ctx.fillStyle = '#38b000'; ctx.beginPath();
    ctx.roundRect(-20, -20, world.w+40, world.h+40, 30); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 5;
    ctx.strokeRect(0, 0, world.w, world.h);
    ctx.beginPath(); ctx.moveTo(world.w/2, 0); ctx.lineTo(world.w/2, world.h); ctx.stroke();
    ctx.beginPath(); ctx.arc(world.w/2, world.h/2, 60, 0, 7); ctx.stroke();

    // Redes
    ctx.fillStyle = '#333';
    ctx.fillRect(-25, 180, 25, 140);
    ctx.fillRect(world.w, 180, 25, 140);

    gkPro.draw();
    gkNoob.draw();
    p1.draw();
    bot.draw();

    // Bola
    ctx.save(); ctx.translate(ball.x, ball.y);
    ctx.fillStyle = '#fee440'; ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, ball.r, 0, 7); ctx.fill(); ctx.stroke();
    ctx.restore();

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}

function start() {
    document.getElementById('start-screen').style.display = 'none';
    active = true;
    resize();
    draw();
}

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
