<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Futebol - Arcade Supremo</title>
    <link rel='stylesheet' href='../assets/style.css'>
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        canvas { display: block; width: 100%; height: 100%; }
        .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px 20px;
            background: rgba(0, 242, 255, 0.2);
            color: #00f2ff;
            border: 1px solid #00f2ff;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <a href='../index.html' class='back-btn'>⬅ VOLTAR</a>
    <div id='game-container'>
        <canvas id='gameCanvas'></canvas>
    </div>
    <script src='../scripts/core.js'></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let W = window.innerWidth;
        let H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;

        // Mock de funções globais necessárias
        window.gameActive = true;
        window.score = 0;
        window.rafId = null;
        
        function gSoccer(){showCtrl('CHUTAR','SPRINT');document.getElementById('abA').textContent='⚽';document.getElementById('abA').style.fontSize='1.1rem';document.getElementById('abB').textContent='💨';document.getElementById('abB').style.fontSize='1.1rem';const FW=Math.min(W*.9,420),FH=Math.min(H*.72,330),FX=(W-FW)/2,FY=(H-FH)/2+14;const GH=FH*.5,GW=32,PR=18,BR=16;const goalTop=FY+(FH-GH)/2,goalBot=FY+(FH+GH)/2;let p={x:FX+FW*.22,y:FY+FH/2,vx:0,vy:0},ai={x:FX+FW*.78,y:FY+FH/2},ball={x:FX+FW/2,y:FY+FH/2,vx:rnd(-1,1),vy:rnd(-1,1)};let s1=0,s2=0,fr=0,kCD=0,gFlash=0,gTxt='';const kick=(from,pwr)=>{const dx=ball.x-from.x,dy=ball.y-from.y,d=Math.hypot(dx,dy)||1;ball.vx=(dx/d+rnd(-.1,.1))*pwr;ball.vy=(dy/d+rnd(-.1,.1))*pwr;};const reset2=()=>{ball.x=FX+FW/2;ball.y=FY+FH/2;ball.vx=rnd(-1.5,1.5);ball.vy=rnd(-1,1);p.x=FX+FW*.22;p.y=FY+FH/2;ai.x=FX+FW*.78;ai.y=FY+FH/2;};function loop(){rafId=requestAnimationFrame(loop);if(!gameActive)return;fr++;kCD=Math.max(0,kCD-1);const spr=K.b;if(K.up)p.vy-=1;if(K.dn)p.vy+=1;if(K.lt)p.vx-=1;if(K.rt)p.vx+=1;p.vx*=.78;p.vy*=.78;p.x=clamp(p.x+p.vx,FX+PR,FX+FW/2-PR);p.y=clamp(p.y+p.vy,FY+PR,FY+FH-PR);const ballDist=Math.hypot(ball.x-p.x,ball.y-p.y);if((TAP.a||K.a)&&kCD===0&&ballDist<PR+BR+24){kick(p,16);kCD=14;}else if(ballDist<PR+BR-4){kick(p,8);kCD=8;}clrT();const aiTX=ball.vx>0?Math.min(ball.x+40,FX+FW*.9):FX+FW*.72;ai.x=clamp(lerp(ai.x,aiTX,.07),FX+FW/2+PR,FX+FW-PR);ai.y=clamp(lerp(ai.y,ball.y,.065),FY+PR,FY+FH-PR);if(Math.hypot(ball.x-ai.x,ball.y-ai.y)<PR+BR+16)kick(ai,12);ball.vx*=.97;ball.vy*=.97;ball.x+=ball.vx;ball.y+=ball.vy;if(ball.y-BR<FY){ball.y=FY+BR;ball.vy=Math.abs(ball.vy)*.9;}if(ball.y+BR>FY+FH){ball.y=FY+FH-BR;ball.vy=-Math.abs(ball.vy)*.9;}if(ball.x-BR<FX-GW){if(ball.y>goalTop&&ball.y<goalBot){s2++;gFlash=90;gTxt='CPU MARCOU! 😅';reset2();}else{ball.x=FX-GW+BR;ball.vx=Math.abs(ball.vx)*.8;}}if(ball.x+BR>FX+FW+GW){if(ball.y>goalTop&&ball.y<goalBot){s1++;addPts(100);gFlash=90;gTxt='⚽ GOOOOOL!';reset2();}else{ball.x=FX+FW+GW-BR;ball.vx=-Math.abs(ball.vx)*.8;}}[p,ai].forEach(e=>{const d=Math.hypot(ball.x-e.x,ball.y-e.y);if(d<PR+BR){const nx=(ball.x-e.x)/d||1,ny=(ball.y-e.y)/d;ball.x=e.x+nx*(PR+BR+1);ball.y=e.y+ny*(PR+BR+1);ball.vx+=nx*1.5;ball.vy+=ny*1.5;}});ctx.fillStyle='#1a3a12';ctx.fillRect(0,0,W,H);for(let i=0;i<10;i++){ctx.fillStyle=i%2?'#1e4214':'#224816';ctx.fillRect(FX+i*FW/10,FY,FW/10,FH);}ctx.strokeStyle='rgba(255,255,255,.65)';ctx.lineWidth=2.5;ctx.strokeRect(FX,FY,FW,FH);ctx.beginPath();ctx.arc(FX+FW/2,FY+FH/2,FH*.2,0,7);ctx.stroke();ctx.beginPath();ctx.moveTo(FX+FW/2,FY);ctx.lineTo(FX+FW/2,FY+FH);ctx.stroke();ctx.fillStyle='rgba(255,255,80,.12)';ctx.fillRect(FX-GW,goalTop,GW,GH);ctx.strokeRect(FX-GW,goalTop,GW,GH);ctx.fillRect(FX+FW,goalTop,GW,GH);ctx.strokeRect(FX+FW,goalTop,GW,GH);ctx.fillStyle='rgba(255,255,0,.45)';ctx.font=`bold ${clamp(GW*.5,10,18)}px Orbitron`;ctx.textAlign='center';ctx.fillText('◀GOL',FX-GW/2,FY-8);ctx.fillText('GOL▶',FX+FW+GW/2,FY-8);ctx.shadowBlur=12;ctx.shadowColor='#00aaff';ctx.fillStyle='#2255cc';ctx.beginPath();ctx.arc(p.x,p.y,PR,0,7);ctx.fill();ctx.shadowBlur=0;ctx.font='18px sans-serif';ctx.textAlign='center';ctx.fillText('😊',p.x,p.y+7);if(spr){ctx.strokeStyle='rgba(0,242,255,.5)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,PR+6,0,7);ctx.stroke();}ctx.shadowBlur=12;ctx.shadowColor='#ff2244';ctx.fillStyle='#cc2233';ctx.beginPath();ctx.arc(ai.x,ai.y,PR,0,7);ctx.fill();ctx.shadowBlur=0;ctx.fillText('😈',ai.x,ai.y+7);ctx.shadowBlur=18;ctx.shadowColor='#fff';ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,BR,0,7);ctx.fill();ctx.shadowBlur=0;ctx.font=`${BR*1.5}px sans-serif`;ctx.fillText('⚽',ball.x-BR*.4,ball.y+BR*.55);if(gFlash>0){gFlash--;ctx.fillStyle=`rgba(255,215,0,${gFlash/150})`;ctx.fillRect(0,0,W,H);ctx.shadowBlur=20;ctx.shadowColor='#ffdd00';ctx.fillStyle='#fff';ctx.font=`bold ${clamp(W*.07,28,52)}px Orbitron`;ctx.textAlign='center';ctx.fillText(gTxt,W/2,H/2);ctx.shadowBlur=0;}ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(W/2-62,FY-34,124,26);ctx.font='bold 15px Orbitron';ctx.textAlign='center';ctx.fillStyle='#00aaff';ctx.fillText(s1,W/2-20,FY-15);ctx.fillStyle='#fff';ctx.fillText('-',W/2,FY-15);ctx.fillStyle='#ff3344';ctx.fillText(s2,W/2+20,FY-15);if(s1>=7){addPts(500);goWin();return;}if(s2>=7){goOver();return;}setHUD(`⚽ ${s1} - ${s2} ${kCD>0?'⏳':'🟢'}`);}requestAnimationFrame(loop);}

        // Iniciar o jogo
        gSoccer();
    </script>
</body>
</html>
