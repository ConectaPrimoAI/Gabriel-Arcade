
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>Piano Kids 🎹</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --key-white: #ffffff;
            --key-shadow: #e2e8f0;
            --accent: #f43f5e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Fredoka', sans-serif;
            display: flex;
            flex-direction: column;
        }

        #ui-header {
            height: 15vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            z-index: 10;
        }

        h1 {
            color: #fff;
            font-size: clamp(1.2rem, 5vw, 2.5rem);
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 5px;
        }

        .hint {
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
        }

        #piano-container {
            flex: 1;
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
        }

        #gc {
            width: 100%;
            height: 100%;
            touch-action: none;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: #1e293b;
        }

        #controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .btn-round {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<div id="controls">
    <div class="btn-round" onclick="location.reload()">↺</div>
</div>

<div id="ui-header">
    <h1>🎹 PIANO KIDS</h1>
    <p class="hint">Toca para ouvires as notas!</p>
</div>

<div id="piano-container">
    <canvas id="gc"></canvas>
</div>

<script>
    'use strict';

    // Configurações de Áudio
    let _ac = null;
    const getAC = () => {
        if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
        if (_ac.state === 'suspended') _ac.resume();
        return _ac;
    };

    const playNote = (freq) => {
        const ac = getAC();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        
        osc.type = 'triangle'; 
        osc.frequency.setValueAtTime(freq, ac.currentTime);
        
        gain.gain.setValueAtTime(0, ac.currentTime);
        gain.gain.linearRampToValueAtTime(0.4, ac.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 1);
        
        osc.connect(gain);
        gain.connect(ac.destination);
        
        osc.start();
        osc.stop(ac.currentTime + 1);
    };

    const NOTES = [
        { n: 'Dó', f: 261.63, c: '#FF4D4D' },
        { n: 'Ré', f: 293.66, c: '#FF944D' },
        { n: 'Mi', f: 329.63, c: '#FFDB4D' },
        { n: 'Fá', f: 349.23, c: '#4DFF4D' },
        { n: 'Sol', f: 392.00, c: '#4DFFFF' },
        { n: 'Lá', f: 440.00, c: '#4D4DFF' },
        { n: 'Si', f: 493.88, c: '#B34DFF' },
        { n: 'Dó²', f: 523.25, c: '#FF4DFF' }
    ];

    const canvas = document.getElementById('gc');
    const ctx = canvas.getContext('2d');
    let W, H, keyW, keyH, startX;
    let activePointers = new Map();
    let particles = [];

    // Função compatível para desenhar retângulos arredondados
    function drawRoundedRect(x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    function resize() {
        const dpr = window.devicePixelRatio || 1;
        W = canvas.clientWidth;
        H = canvas.clientHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        
        keyW = Math.min(W / NOTES.length, 120);
        keyH = H * 0.85;
        startX = (W - (keyW * NOTES.length)) / 2;
    }

    window.addEventListener('resize', resize);

    class Particle {
        constructor(x, y, col) {
            this.x = x;
            this.y = y;
            this.col = col;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = (Math.random() - 0.5) * 8 - 5;
            this.life = 1;
            this.r = Math.random() * 6 + 2;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += 0.2;
            this.life -= 0.02;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.col;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }

    function getKeyAt(x, y) {
        if (y < 0 || y > keyH) return -1;
        const index = Math.floor((x - startX) / keyW);
        if (index >= 0 && index < NOTES.length) return index;
        return -1;
    }

    const handlePointer = (e, isDown) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const keyIdx = getKeyAt(x, y);
        
        if (keyIdx !== -1) {
            if (isDown) {
                if (activePointers.get(e.pointerId) !== keyIdx) {
                    activePointers.set(e.pointerId, keyIdx);
                    playNote(NOTES[keyIdx].f);
                    for(let i=0; i<12; i++) particles.push(new Particle(x, y, NOTES[keyIdx].c));
                }
            } else {
                activePointers.delete(e.pointerId);
            }
        } else {
            activePointers.delete(e.pointerId);
        }
    };

    canvas.addEventListener('pointerdown', e => handlePointer(e, true));
    canvas.addEventListener('pointermove', e => {
        if (e.buttons > 0) handlePointer(e, true);
    });
    canvas.addEventListener('pointerup', e => activePointers.delete(e.pointerId));
    canvas.addEventListener('pointercancel', e => activePointers.delete(e.pointerId));
    canvas.addEventListener('pointerleave', e => activePointers.delete(e.pointerId));

    function animate() {
        ctx.clearRect(0, 0, W, H);
        
        const activeKeys = new Set(activePointers.values());

        // Desenhar teclas
        NOTES.forEach((note, i) => {
            const x = startX + i * keyW;
            const isActive = activeKeys.has(i);
            const radius = 15;
            
            ctx.save();
            
            // Sombra e Brilho
            ctx.shadowBlur = isActive ? 25 : 8;
            ctx.shadowColor = isActive ? note.c : 'rgba(0,0,0,0.3)';
            
            // Tecla
            const grad = ctx.createLinearGradient(x, 0, x, keyH);
            grad.addColorStop(0, isActive ? note.c : '#ffffff');
            grad.addColorStop(1, isActive ? '#ffffff' : '#e2e8f0');
            
            ctx.fillStyle = grad;
            drawRoundedRect(x + 4, isActive ? 20 : 5, keyW - 8, keyH - (isActive ? 20 : 5), radius);
            ctx.fill();

            // Texto
            ctx.shadowBlur = 0;
            ctx.fillStyle = isActive ? '#fff' : '#475569';
            ctx.font = 'bold 18px Fredoka';
            ctx.textAlign = 'center';
            ctx.fillText(note.n, x + keyW/2, keyH - 30);
            
            // Ponto colorido
            ctx.fillStyle = note.c;
            ctx.beginPath();
            ctx.arc(x + keyW/2, keyH - 60, 6, 0, Math.PI*2);
            ctx.fill();

            ctx.restore();
        });

        // Partículas
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => {
            p.update();
            p.draw();
        });

        requestAnimationFrame(animate);
    }

    // Inicialização segura
    window.onload = () => {
        resize();
        animate();
    };
</script>
</body>
</html>
