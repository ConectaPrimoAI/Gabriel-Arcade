<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Bear Adventure - Versão Fiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
        body { background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%); display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
        #gameCanvas { border: 4px solid #8B4513; border-radius: 12px; background: linear-gradient(180deg, #87CEEB 0%, #98FB98 100%); box-shadow: 0 0 25px rgba(0,0,0,0.3); }
        .ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: white; font-weight: bold; font-size: 20px; display: flex; gap: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .controles { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: white; font-size: 16px; background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="ui">
        <div>🍯 Moedas: <span id="moedas">0</span></div>
        <div>❤️ Vidas: <span id="vidas">3</span></div>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="controles">
        ← → mover | Espaço pular | ↑ interagir
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Configurações gerais
        const gravidade = 0.6;
        const atrito = 0.8;

        // 🔹 Personagem - Urso
        const urso = {
            x: 80, y: 350, largura: 40, altura: 50,
            velX: 0, velY: 0, velocidade: 5, forcaPulo: -14,
            noChao: false, virado: 1, cor: '#D2691E'
        };

        // 🔹 Teclas
        const teclas = { esquerda: false, direita: false, pular: false };

        // 🔹 Plataformas (fase fiel ao primeiro mapa)
        const plataformas = [
            {x:0,y:450,largura:800,altura:50,cor:'#228B22'},
            {x:120,y:380,largura:120,altura:20,cor:'#8B4513'},
            {x:300,y:320,largura:150,altura:20,cor:'#8B4513'},
            {x:520,y:260,largura:130,altura:20,cor:'#8B4513'},
            {x:200,y:200,largura:160,altura:20,cor:'#8B4513'},
            {x:650,y:150,largura:140,altura:20,cor:'#8B4513'},
            {x:50,y:130,largura:110,altura:20,cor:'#8B4513'}
        ];

        // 🔹 Moedas
        let moedasColetadas = 0;
        const moedas = [
            {x:160,y:350,raio:12,coletada:false},
            {x:360,y:290,raio:12,coletada:false},
            {x:570,y:230,raio:12,coletada:false},
            {x:260,y:170,raio:12,coletada:false},
            {x:710,y:120,raio:12,coletada:false},
            {x:90,y:100,raio:12,coletada:false}
        ];

        // 🔹 Inimigos
        let vidas = 3;
        const inimigos = [
            {x:350,y:290,largura:35,altura:35,vel:1.2,minX:300,maxX:430,cor:'#FF4500'},
            {x:680,y:115,largura:35,altura:35,vel:1.5,minX:650,maxX:760,cor:'#FF4500'}
        ];

        // 🔹 Árvore/Objetos decorativos
        const arvores = [ {x:40,y:390}, {x:450,y:395}, {x:720,y:390} ];

        // 🎹 Entrada do teclado
        document.addEventListener('keydown', e => {
            if(e.key === 'ArrowLeft') teclas.esquerda = true;
            if(e.key === 'ArrowRight') teclas.direita = true;
            if(e.key === ' ' && urso.noChao) teclas.pular = true;
        });
        document.addEventListener('keyup', e => {
            if(e.key === 'ArrowLeft') teclas.esquerda = false;
            if(e.key === 'ArrowRight') teclas.direita = false;
            if(e.key === ' ') teclas.pular = false;
        });

        // 🧠 Colisão retângulo
        function colisaoRet(a,b) { return a.x < b.x+b.largura && a.x+a.largura > b.x && a.y < b.y+b.altura && a.y+a.altura > b.y; }

        // 🔄 Loop principal
        function atualizar() {
            // Movimento
            if(teclas.esquerda) { urso.velX = -urso.velocidade; urso.virado = -1; }
            else if(teclas.direita) { urso.velX = urso.velocidade; urso.virado = 1; }
            else urso.velX *= atrito;

            if(teclas.pular) { urso.velY = urso.forcaPulo; urso.noChao = false; teclas.pular = false; }

            urso.velY += gravidade;
            urso.x += urso.velX;
            urso.y += urso.velY;

            // Limites da tela
            if(urso.x < 0) urso.x = 0;
            if(urso.x+urso.largura > canvas.width) urso.x = canvas.width - urso.largura;

            // Queda = perda de vida
            if(urso.y > canvas.height) { vidas--; urso.x=80; urso.y=350; urso.velX=0; urso.velY=0; document.getElementById('vidas').textContent = vidas; }

            // Colisão com plataformas
            urso.noChao = false;
            for(let plat of plataformas) {
                if(colisaoRet(urso, plat) && urso.velY >= 0 && urso.y+urso.altura - urso.velY <= plat.y) {
                    urso.y = plat.y - urso.altura;
                    urso.velY = 0;
                    urso.noChao = true;
                }
            }

            // Coletar moedas
            for(let moeda of moedas) {
                if(!moeda.coletada) {
                    let dist = Math.hypot(urso.x+urso.largura/2 - moeda.x, urso.y+urso.altura/2 - moeda.y);
                    if(dist < moeda.raio+20) { moeda.coletada=true; moedasColetadas++; document.getElementById('moedas').textContent=moedasColetadas; }
                }
            }

            // Movimento e colisão com inimigos
            for(let inim of inimigos) {
                inim.x += inim.vel;
                if(inim.x <= inim.minX || inim.x+inim.largura >= inim.maxX) inim.vel *= -1;

                if(colisaoRet(urso, inim)) { vidas--; urso.x=80; urso.y=350; urso.velX=0; urso.velY=0; document.getElementById('vidas').textContent = vidas; }
            }
        }

        // 🎨 Desenhar tudo
        function desenhar() {
            ctx.clearRect(0,0,canvas.width,canvas.height);

            // Fundo nuvens
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(150,80,25,0,Math.PI*2); ctx.arc(180,70,30,0,Math.PI*2); ctx.arc(210,80,22,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(550,100,22,0,Math.PI*2); ctx.arc(580,90,28,0,Math.PI*2); ctx.arc(610,100,20,0,Math.PI*2); ctx.fill();

            // Árvores
            for(let arv of arvores) {
                ctx.fillStyle='#8B4513'; ctx.fillRect(arv.x+15,arv.y,20,60);
                ctx.fillStyle='#2E8B57'; ctx.beginPath(); ctx.arc(arv.x+25,arv.y-10,35,0,Math.PI*2); ctx.fill();
            }

            // Plataformas
            for(let plat of plataformas) { ctx.fillStyle=plat.cor; ctx.fillRect(plat.x,plat.y,plat.largura,plat.altura); }

            // Moedas
            for(let moeda of moedas) {
                if(!moeda.coletada) {
                    ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(moeda.x,moeda.y,moeda.raio,0,Math.PI*2); ctx.fill();
                    ctx.strokeStyle='#DAA520'; ctx.lineWidth=2; ctx.stroke();
                }
            }

            // Inimigos
            for(let inim of inimigos) {
                ctx.fillStyle = inim.cor; ctx.fillRect(inim.x,inim.y,inim.largura,inim.altura);
                ctx.fillStyle='#000'; ctx.fillRect(inim.x+8,inim.y+8,5,5); ctx.fillRect(inim.x+22,inim.y+8,5,5);
            }

            // Urso com detalhes fiéis
            ctx.save(); ctx.translate(urso.x+urso.largura/2, urso.y+urso.altura/2); ctx.scale(urso.virado,1); ctx.translate(-urso.largura/2,-urso.altura/2);
            ctx.fillStyle=urso.cor; ctx.fillRect(0,0,urso.largura,urso.altura);
            // Orelhas
            ctx.beginPath(); ctx.arc(8,8,10,0,Math.PI*2); ctx.arc(32,8,10,0,Math.PI*2); ctx.fill();
            // Olhos e nariz
            ctx.fillStyle='#000'; ctx.fillRect(12,15,4,6); ctx.fillRect(24,15,4,6);
            ctx.fillStyle='#8B0000'; ctx.beginPath(); ctx.arc(20,28,6,0,Math.PI*2); ctx.fill();
            ctx.restore();
        }

        function loop() { atualizar(); desenhar(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
