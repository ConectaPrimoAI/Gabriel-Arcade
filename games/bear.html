<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Bear Adventure - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: #1e3a1e;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .title-font {
            font-family: 'Fredoka One', cursive;
            text-shadow: 3px 3px 0px #4a2c11, -1px -1px 0px #4a2c11, 1px -1px 0px #4a2c11, -1px 1px 0px #4a2c11;
        }
        .wood-board {
            background: linear-gradient(135deg, #8b5a2b 0%, #5c3818 100%);
            box-shadow: inset 0 4px 0 #b37d45, inset 0 -4px 0 #3d230d, 0 10px 20px rgba(0,0,0,0.4);
            border: 4px solid #3d230d;
        }
        @keyframes bear-breathing {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .anim-bear { animation: bear-breathing 3s ease-in-out infinite; }
        
        .play-btn {
            background: linear-gradient(180deg, #ff9e00 0%, #e85d04 100%);
            box-shadow: 0 5px 0 #bc3908, 0 10px 20px rgba(232, 93, 4, 0.3);
            transition: all 0.1s ease-in-out;
            font-family: 'Fredoka One', cursive;
            text-shadow: 1px 1px 0px #6a040f;
        }
        .play-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 #bc3908, 0 2px 5px rgba(232, 93, 4, 0.2);
        }
    </style>
</head>
<body class="relative min-h-screen flex flex-col justify-between p-4">

    <div class="absolute inset-0 bg-gradient-to-b from-[#4facfe] to-[#86f3b8] -z-20"></div>

    <div class="absolute inset-x-0 bottom-0 h-1/2 pointer-events-none -z-10 opacity-40">
        <svg class="absolute bottom-0 w-full h-48 text-[#136852] fill-current" preserveAspectRatio="none" viewBox="0 0 1440 320">
            <path d="M0,160L240,224L480,128L720,256L960,192L1200,288L1440,160L1440,320L1200,320L960,320L720,320L480,320L240,320L0,320Z"></path>
        </svg>
    </div>

    <header class="w-full pt-6 flex flex-col items-center z-10 text-center">
        <h1 class="title-font text-4xl md:text-6xl text-amber-100 uppercase tracking-wide drop-shadow">
            Super Bear<br>
            <span class="text-yellow-400 text-5xl md:text-7xl">Adventure</span>
        </h1>
    </header>

    <main class="w-full max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-center gap-8 z-20 my-auto">
        
        <div class="relative w-48 h-48 md:w-64 md:h-64 flex justify-center items-end anim-bear">
            <div class="absolute w-36 h-6 bg-black/20 rounded-full bottom-0 blur-sm"></div>
            <div class="relative w-44 h-44 flex flex-col items-center">
                <div class="absolute top-0 left-4 w-12 h-12 bg-[#633a17] rounded-full border-4 border-[#3d230d]"></div>
                <div class="absolute top-0 right-4 w-12 h-12 bg-[#633a17] rounded-full border-4 border-[#3d230d]"></div>
                <div class="absolute top-4 w-36 h-32 bg-[#7a491e] rounded-[35px] border-4 border-[#3d230d] flex flex-col items-center pt-6 shadow-md">
                    <div class="flex gap-6">
                        <div class="w-6 h-9 bg-white rounded-full border-2 border-black relative overflow-hidden">
                            <div class="absolute top-2 right-0.5 w-3 h-4 bg-black rounded-full"></div>
                        </div>
                        <div class="w-6 h-9 bg-white rounded-full border-2 border-black relative overflow-hidden">
                            <div class="absolute top-2 right-0.5 w-3 h-4 bg-black rounded-full"></div>
                        </div>
                    </div>
                    <div class="w-24 h-14 bg-[#cca370] rounded-[20px] border-2 border-[#3d230d] mt-1 flex flex-col items-center pt-1">
                        <div class="w-8 h-4 bg-black rounded-full"></div>
                        <div class="w-10 h-2 border-b-2 border-black rounded-b-full mt-1"></div>
                    </div>
                </div>
                <div class="absolute bottom-0 w-36 h-12 bg-[#633a17] rounded-t-[30px] border-x-4 border-t-4 border-[#3d230d]"></div>
            </div>
        </div>

        <div class="w-full max-w-sm flex flex-col items-center">
            <div class="wood-board w-full rounded-2xl p-6 text-center flex flex-col items-center gap-4">
                <div class="text-amber-100">
                    <span class="text-xs uppercase tracking-widest font-bold text-amber-200">Portal de Entrada</span>
                    <h2 class="title-font text-2xl mt-1 text-yellow-300">PRONTO PARA JOGAR?</h2>
                </div>

                <button onclick="openSuperBearApp()" class="play-btn w-full py-4 px-6 rounded-xl text-xl text-white font-extrabold uppercase tracking-wide cursor-pointer flex items-center justify-center gap-2">
                    <i class="fa-solid fa-gamepad"></i>
                    <span>ABRIR JOGO</span>
                </button>

                <div class="text-amber-200/80 text-[11px] font-semibold bg-[#3d230d]/40 w-full py-1.5 rounded-lg border border-amber-950">
                    <i class="fa-solid fa-mobile-screen-button mr-1"></i> Executa o app nativo
                </div>
            </div>
            <div class="w-8 h-10 bg-amber-950 border-x-4 border-[#3d230d] shadow-xl"></div>
        </div>
    </main>

    <footer class="w-full text-center text-amber-950 font-bold text-xs z-10 opacity-70">
        <p>© 2026 Super Bear Adventure Portal.</p>
    </footer>

    <script>
        function openSuperBearApp() {
            // ID oficial do pacote do Super Bear Adventure no Android
            const packageId = "com.Baury.SuperBearAdventure";
            
            // Monta a Intent específica para o ecossistema Android / Chrome.
            // Essa sintaxe força o celular a procurar o app instalado. 
            // Se encontrar, abre. Se não encontrar, o 'browser_fallback_url' joga para a página da Play Store automaticamente.
            const androidIntent = `intent://launch#Intent;scheme=android-app;package=${packageId};S.browser_fallback_url=https://play.google.com/store/apps/details?id=${packageId};end`;

            // Detecta se o usuário está acessando por um dispositivo iOS (iPhone/iPad)
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

            if (isIOS) {
                // Esquema de URL registrado pelo app no ecossistema da Apple
                window.location.href = "superbearadventure://";
                
                // Fallback para iOS caso não abra em 1.5 segundos
                setTimeout(() => {
                    window.location.href = "https://apps.apple.com/br/app/super-bear-adventure/id1439521876";
                }, 1500);
            } else {
                // Executa a Intent padrão do Android de abertura direta
                window.location.href = androidIntent;
            }
        }
    </script>
</body>
</html>
