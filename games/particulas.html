<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Partículas - Instalação Interativa</title>
    
    <!-- Three.js para renderização de partículas 3D de alta performance -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- SDKs Oficiais do MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --color-bg: #050505;
            --color-text: #ffffff;
            --color-sub: rgba(255, 255, 255, 0.5);
            --color-border: rgba(255, 255, 255, 0.15);
            --transition-smooth: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--color-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--color-text);
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #webcam {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        /* --- INTERFACE MINIMALISTA --- */
        
        .interactive-ui {
            opacity: 1;
            transition: var(--transition-smooth);
        }

        .interactive-ui.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* Cabeçalho Superior */
        .movement-header {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            text-align: center;
            pointer-events: none;
        }

        .movement-title {
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--color-text);
            margin-bottom: 4px;
        }

        .gesture-subtitle {
            font-size: 8px;
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--color-sub);
        }

        /* Avisos Temporários de Conexão */
        #notification-toast {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translate(-50%, -20px);
            z-index: 7;
            pointer-events: none;
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--color-text);
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            transition: var(--transition-smooth);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        #notification-toast.visible {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        /* Rodapé de Controles */
        .controls-footer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6;
            display: flex;
            gap: 40px;
        }

        .minimal-btn {
            background: none;
            border: none;
            color: var(--color-sub);
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            cursor: pointer;
            padding: 8px 0;
            transition: color 0.3s ease;
        }

        .minimal-btn:hover, .minimal-btn:active {
            color: var(--color-text);
        }

        /* --- TELA DE BOAS-VINDAS / TUTORIAL SIMPLIFICADO --- */
        #welcome-screen {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--color-bg);
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            padding: 24px;
        }

        .welcome-content {
            max-width: 380px;
            width: 100%;
            text-align: center;
        }

        .welcome-subtitle {
            font-size: 9px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--color-sub);
            margin-bottom: 8px;
        }

        .welcome-title {
            font-size: 26px;
            font-weight: 300;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--color-text);
            margin-bottom: 40px;
        }

        .guide-steps {
            display: flex;
            flex-direction: column;
            gap: 24px;
            text-align: left;
            margin-bottom: 48px;
        }

        .guide-item {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .guide-indicator {
            font-size: 22px;
            min-width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .guide-details {
            display: flex;
            flex-direction: column;
        }

        .guide-headline {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-text);
            margin-bottom: 2px;
        }

        .guide-body {
            font-size: 10px;
            color: var(--color-sub);
            line-height: 1.4;
        }

        .action-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 16px 32px;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .action-btn:hover {
            background: var(--color-sub);
            color: #000000;
        }
    </style>
</head>
<body>

    <!-- Onboarding / Tutorial Simplificado -->
    <div id="welcome-screen">
        <div class="welcome-content">
            <span class="welcome-subtitle">Instalação Sensorial</span>
            <h1 class="welcome-title">Partículas</h1>
            
            <div class="guide-steps">
                <div class="guide-item">
                    <span class="guide-indicator">✋</span>
                    <div class="guide-details">
                        <span class="guide-headline">Mão Aberta</span>
                        <span class="guide-body">Espalha as partículas e toca sons suaves de brisa.</span>
                    </div>
                </div>
                <div class="guide-item">
                    <span class="guide-indicator">✊</span>
                    <div class="guide-details">
                        <span class="guide-headline">Mão Fechada</span>
                        <span class="guide-body">Atrai e junta as partículas, abafando os sons.</span>
                    </div>
                </div>
                <div class="guide-item">
                    <span class="guide-indicator">☝️</span>
                    <div class="guide-details">
                        <span class="guide-headline">Apontar ou Tocar</span>
                        <span class="guide-body">Guia o fluxo estelar e toca notas de cristal.</span>
                    </div>
                </div>
            </div>

            <button class="action-btn" onclick="startMinimalExperience()">Entrar</button>
        </div>
    </div>

    <!-- HUD Superior Minimalista -->
    <div id="hud-top" class="movement-header interactive-ui">
        <div class="movement-title" id="movement-display-title">Fluxo I. Harmonia</div>
        <div class="gesture-subtitle" id="gesture-display-subtitle">Interação livre</div>
    </div>

    <!-- Avisos Temporários (Toast) -->
    <div id="notification-toast">Iniciando...</div>

    <!-- Controles Flutuantes Autohide -->
    <div class="controls-footer interactive-ui" id="hud-bottom">
        <button class="minimal-btn" onclick="nextSymphonyMovement()">Próximo Fluxo</button>
        <button class="minimal-btn" id="sound-toggle-btn" onclick="toggleSymphonySound()">Som: Alto</button>
    </div>

    <div id="canvas-container"></div>
    <video id="webcam" autoplay playsinline></video>

    <script>
        // --- PARÂMETROS E ESTADOS GERAIS ---
        let experienceStarted = false;
        let audioEnabled = true;
        let handScaleX = 13;
        let handScaleY = 9;

        // Três movimentos físicos das partículas (mantendo-as puramente brancas)
        let currentMovementIndex = 0;
        const movementsList = [
            { name: "Fluxo I. Harmonia", speed: 0.0007, size: 0.04 },
            { name: "Fluxo II. Gravidade", speed: 0.0014, size: 0.03 },
            { name: "Fluxo III. Outono", speed: 0.0010, size: 0.035 }
        ];

        // Referências DOM
        const welcomeScreen = document.getElementById('welcome-screen');
        const hudTop = document.getElementById('hud-top');
        const hudBottom = document.getElementById('hud-bottom');
        const soundBtn = document.getElementById('sound-toggle-btn');
        const movementDisplayTitle = document.getElementById('movement-display-title');
        const gestureDisplaySubtitle = document.getElementById('gesture-display-subtitle');
        const toast = document.getElementById('notification-toast');

        // Autohide inteligente dos controles da interface
        let uiTimeout = null;
        function resetUiInactivityTimer() {
            if (!experienceStarted) return;
            
            hudTop.classList.remove('hidden');
            hudBottom.classList.remove('hidden');
            
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(() => {
                hudTop.classList.add('hidden');
                hudBottom.classList.add('hidden');
            }, 3000);
        }

        window.addEventListener('mousemove', resetUiInactivityTimer);
        window.addEventListener('touchstart', resetUiInactivityTimer);

        // --- ENGENHARIA DE ÁUDIO MAIS ALTO & ACÚSTICO ---
        let audioCtx = null;
        let masterVolume = null;
        let dynamicCompressor = null;
        let acousticFilter = null;
        let backgroundDrone1 = null;
        let backgroundDrone2 = null;
        let expressiveSynthOsc = null;
        let expressiveSynthGain = null;

        // Escala Pentatônica de Fá Sustenido Maior (agradável e harmônica)
        const pureScale = [185.00, 207.65, 233.08, 277.18, 311.13, 369.99, 415.30, 466.16];

        async function initAcousticAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                // Volume mestre ampliado significativamente (de 0.18 para 0.45)
                masterVolume = audioCtx.createGain();
                masterVolume.gain.setValueAtTime(0.45, audioCtx.currentTime);

                // Compressor dinâmico profissional para evitar distorção e encorpar o áudio alto
                dynamicCompressor = audioCtx.createDynamicsCompressor();
                dynamicCompressor.threshold.setValueAtTime(-12, audioCtx.currentTime);
                dynamicCompressor.knee.setValueAtTime(30, audioCtx.currentTime);
                dynamicCompressor.ratio.setValueAtTime(4, audioCtx.currentTime);
                dynamicCompressor.attack.setValueAtTime(0.05, audioCtx.currentTime);
                dynamicCompressor.release.setValueAtTime(0.12, audioCtx.currentTime);

                // Filtro passa-baixa suave para frequências limpas
                acousticFilter = audioCtx.createBiquadFilter();
                acousticFilter.type = 'lowpass';
                acousticFilter.frequency.setValueAtTime(1000, audioCtx.currentTime);
                acousticFilter.Q.setValueAtTime(0.8, audioCtx.currentTime);

                acousticFilter.connect(dynamicCompressor);
                dynamicCompressor.connect(masterVolume);
                masterVolume.connect(audioCtx.destination);

                // Drones de fundo senoidais puros mais encorpados
                backgroundDrone1 = audioCtx.createOscillator();
                backgroundDrone2 = audioCtx.createOscillator();
                const droneGain = audioCtx.createGain();

                backgroundDrone1.type = 'sine';
                backgroundDrone1.frequency.setValueAtTime(92.50, audioCtx.currentTime); // F#2
                
                backgroundDrone2.type = 'sine';
                backgroundDrone2.frequency.setValueAtTime(185.20, audioCtx.currentTime); // F#3

                droneGain.gain.setValueAtTime(0.08, audioCtx.currentTime); // Drone mais presente

                backgroundDrone1.connect(droneGain);
                backgroundDrone2.connect(droneGain);
                droneGain.connect(acousticFilter);

                backgroundDrone1.start();
                backgroundDrone2.start();

                // Sintetizador interativo com ganho otimizado
                expressiveSynthOsc = audioCtx.createOscillator();
                expressiveSynthGain = audioCtx.createGain();

                expressiveSynthOsc.type = 'sine';
                expressiveSynthOsc.frequency.setValueAtTime(277.18, audioCtx.currentTime);
                expressiveSynthGain.gain.setValueAtTime(0, audioCtx.currentTime);

                expressiveSynthOsc.connect(expressiveSynthGain);
                expressiveSynthGain.connect(acousticFilter);
                expressiveSynthOsc.start();

                triggerSoftPluck(277.18, 0.08, 1.8);
            } catch (err) {
                console.warn("Falha ao inicializar o áudio:", err);
            }
        }

        function triggerSoftPluck(freq, vol = 0.08, duration = 2.2) {
            if (!audioCtx || !audioEnabled) return;
            const now = audioCtx.currentTime;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now);
            
            gain.gain.setValueAtTime(vol, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            
            osc.connect(gain);
            gain.connect(acousticFilter);
            
            osc.start(now);
            osc.stop(now + duration + 0.1);
        }

        function playSymphonySupernova() {
            if (!audioCtx || !audioEnabled) return;
            // Acorde estelar cristalino e encorpado
            const chord = [277.18, 369.99, 466.16, 554.37];
            chord.forEach((freq, i) => {
                setTimeout(() => {
                    triggerSoftPluck(freq, 0.05, 2.5);
                }, i * 140);
            });
        }

        function updateAudioModulations(gesture, handY, velocity) {
            if (!audioCtx || !audioEnabled) return;
            const now = audioCtx.currentTime;

            // Filtro reativo aos gestos
            if (gesture === 'FIST') {
                acousticFilter.frequency.setTargetAtTime(150, now, 0.25); // Som aconchegante e fechado
            } else if (gesture === 'OPEN_HAND') {
                acousticFilter.frequency.setTargetAtTime(1400, now, 0.3); // Amplo e límpido
            } else {
                acousticFilter.frequency.setTargetAtTime(650, now, 0.35);
            }

            if (handActive || isTouching) {
                const normY = Math.max(0, Math.min(1, (handY + 4.5) / 9));
                const targetFreq = 185.00 + (normY * 260);
                const targetVol = Math.min(0.02 + velocity * 0.06, 0.07); // Som expressivo mais presente

                expressiveSynthOsc.frequency.setTargetAtTime(targetFreq, now, 0.15);
                expressiveSynthGain.gain.setTargetAtTime(targetVol, now, 0.1);
            } else {
                expressiveSynthGain.gain.setTargetAtTime(0, now, 0.25);
            }
        }

        function toggleSymphonySound() {
            audioEnabled = !audioEnabled;
            if (audioEnabled) {
                masterVolume.gain.setTargetAtTime(0.45, audioCtx.currentTime, 0.1);
                soundBtn.innerText = "Som: Alto";
            } else {
                masterVolume.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                soundBtn.innerText = "Som: Muto";
            }
        }


        // --- ENGINE GRÁFICA DE PARTÍCULAS EM BRANCO PURO (THREE.JS) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.008);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.z = 7.5;

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);

        const spotLight = new THREE.PointLight(0xffffff, 1.5, 25);
        spotLight.position.set(0, 4, 3);
        scene.add(spotLight);

        // Textura suave circular difusa limpa
        function createAcousticParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            grad.addColorStop(0, 'rgba(255,255,255,0.95)');
            grad.addColorStop(0.3, 'rgba(255,255,255,0.4)');
            grad.addColorStop(0.8, 'rgba(255,255,255,0.06)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 16, 16);
            const tex = new THREE.Texture(canvas);
            tex.needsUpdate = true;
            return tex;
        }
        const cleanTexture = createAcousticParticleTexture();

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const particleCount = isMobile ? 3000 : 5500;

        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const originalPositions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        
        // Todas as partículas configuradas com o valor cromático 1.0 (Branco Puro #ffffff)
        const colors = new Float32Array(particleCount * 3);
        colors.fill(1.0); 

        for (let i = 0; i < particleCount * 3; i += 3) {
            const idx = i / 3;
            const phi = Math.acos(1 - 2 * (idx + 0.5) / particleCount);
            const theta = Math.PI * (1 + Math.sqrt(5)) * idx;
            const r = 2.0 + (Math.random() - 0.5) * 0.15;

            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);

            positions[i] = x;
            positions[i+1] = y;
            positions[i+2] = z;

            originalPositions[i] = x;
            originalPositions[i+1] = y;
            originalPositions[i+2] = z;

            velocities[i] = 0;
            velocities[i+1] = 0;
            velocities[i+2] = 0;
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const particleMaterial = new THREE.PointsMaterial({
            size: isMobile ? 0.07 : 0.045,
            map: cleanTexture,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending, // Mistura de luz branca para aumentar brilho natural nos clusters
            depthWrite: false
        });

        const hologramPoints = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(hologramPoints);


        // --- RASTREAMENTO ÓPTICO SUAVE E RESILIENTE ---
        let currentGesture = 'NONE';
        let previousGesture = 'NONE';
        
        let handPos = new THREE.Vector3(0, 0, 0);
        let targetHandPos = new THREE.Vector3(0, 0, 0);
        let handActive = false;

        let graceFrameCount = 0;
        const GRACE_MAX = 15;

        const gestureListHistory = [];
        const HIST_LEN = 5;

        function getSmoothedGesture(raw) {
            gestureListHistory.push(raw);
            if (gestureListHistory.length > HIST_LEN) {
                gestureListHistory.shift();
            }
            const counts = {};
            let maxCount = 0;
            let finalGesture = 'NONE';
            for (const g of gestureListHistory) {
                counts[g] = (counts[g] || 0) + 1;
                if (counts[g] > maxCount) {
                    maxCount = counts[g];
                    finalGesture = g;
                }
            }
            return finalGesture;
        }

        function updateSubtitleDisplay(gName) {
            let label = "Interação livre";
            if (gName === 'FIST') label = "Material condensado";
            if (gName === 'OPEN_HAND') label = "Expansão estelar";
            if (gName === 'POINTING') label = "Fluxo magnético";
            gestureDisplaySubtitle.innerText = label;
        }

        function showNotification(message) {
            toast.innerText = message;
            toast.classList.add('visible');
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 3000);
        }

        const webcamElement = document.getElementById('webcam');

        function initGestureTracking() {
            // Permissão prévia nativa robusta antes de carregar o MediaPipe
            navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } })
                .then((stream) => {
                    webcamElement.srcObject = stream;
                    setupMediaPipeHands();
                })
                .catch(() => {
                    console.log("Câmera indisponível ou permissão negada. Toque ativado.");
                    showNotification("Interação por toque ativa");
                });
        }

        function setupMediaPipeHands() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 0, // Máxima performance móvel
                minDetectionConfidence: 0.55,
                minTrackingConfidence: 0.55
            });

            hands.onResults(onHandResultCallback);

            const cameraHelper = new Camera(webcamElement, {
                onFrame: async () => {
                    if (experienceStarted) {
                        try {
                            await hands.send({ image: webcamElement });
                        } catch (e) {
                            // Erros de transmissão silenciados
                        }
                    }
                },
                width: isMobile ? 240 : 320,
                height: isMobile ? 180 : 240
            });
            
            cameraHelper.start()
                .then(() => showNotification("Câmera conectada"))
                .catch(() => showNotification("Interação por toque ativa"));
        }

        function onHandResultCallback(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const marks = results.multiHandLandmarks[0];
                graceFrameCount = GRACE_MAX;

                targetHandPos.x = (1 - marks[9].x - 0.5) * handScaleX;
                targetHandPos.y = -(marks[9].y - 0.5) * handScaleY;
                targetHandPos.z = -marks[9].z * 8;

                if (!handActive) {
                    handActive = true;
                }

                const getLengthRatio = (tip, knuckle) => {
                    const wrist = marks[0];
                    const distTip = Math.hypot(marks[tip].x - wrist.x, marks[tip].y - wrist.y);
                    const distKnuckle = Math.hypot(marks[knuckle].x - wrist.x, marks[knuckle].y - wrist.y);
                    return distTip / (distKnuckle + 0.001);
                };

                const isIndex = getLengthRatio(8, 5) > 1.25;
                const isMiddle = getLengthRatio(12, 9) > 1.25;
                const isRing = getLengthRatio(16, 13) > 1.25;
                const isPinky = getLengthRatio(20, 17) > 1.25;

                let rawDetected = 'NONE';

                if (!isIndex && !isMiddle && !isRing && !isPinky) {
                    rawDetected = 'FIST';
                } else if (isIndex && isMiddle && isRing && isPinky) {
                    rawDetected = 'OPEN_HAND';
                } else if (isIndex && !isMiddle && !isRing && !isPinky) {
                    rawDetected = 'POINTING';
                }

                const smoothed = getSmoothedGesture(rawDetected);

                // Gesto Rápido de Supernova (✊ -> ✋)
                if (previousGesture === 'FIST' && smoothed === 'OPEN_HAND') {
                    triggerCelestialExplosion();
                    playSymphonySupernova();
                }

                if (smoothed !== 'NONE') {
                    previousGesture = smoothed;
                    updateSubtitleDisplay(smoothed);
                }
                currentGesture = smoothed;
            } else {
                if (graceFrameCount > 0) {
                    graceFrameCount--;
                } else {
                    handActive = false;
                    currentGesture = 'NONE';
                    updateSubtitleDisplay('NONE');
                }
            }
        }

        // --- SISTEMA FÍSICO DE EXPULSÃO DE PARTÍCULAS ---
        function triggerCelestialExplosion() {
            const pos = hologramPoints.geometry.attributes.position.array;
            
            for (let i = 0; i < particleCount * 3; i += 3) {
                const x = pos[i];
                const y = pos[i+1];
                const z = pos[i+2];

                const distSq = x*x + y*y + z*z + 0.01;
                const invDist = 1 / Math.sqrt(distSq);
                const force = (2.2 + Math.random() * 1.6) * invDist;
                
                velocities[i] += x * invDist * force;
                velocities[i+1] += y * invDist * force;
                velocities[i+2] += z * invDist * force;
            }
        }


        // --- MANIPULAÇÃO POR TOQUE / CLIQUE (FALLBACK) ---
        let isTouching = false;

        window.addEventListener('mousedown', (e) => {
            if (!handActive && experienceStarted && e.target.tagName !== 'BUTTON') {
                isTouching = true;
                currentGesture = 'POINTING';
                updateSubtitleDisplay('POINTING');
                triggerSoftPluck(277.18, 0.06, 1.5);
            }
        });

        window.addEventListener('mouseup', () => {
            if (!handActive && experienceStarted) {
                if (currentGesture === 'FIST') {
                    currentGesture = 'OPEN_HAND';
                    updateSubtitleDisplay('OPEN_HAND');
                    triggerCelestialExplosion();
                    playSymphonySupernova();
                    setTimeout(() => { currentGesture = 'NONE'; updateSubtitleDisplay('NONE'); }, 300);
                } else {
                    currentGesture = 'NONE';
                    updateSubtitleDisplay('NONE');
                }
                isTouching = false;
            }
        });

        window.addEventListener('touchstart', (e) => {
            if (welcomeScreen.style.display === 'none' && e.target.tagName !== 'BUTTON') {
                isTouching = true;
                currentGesture = 'POINTING';
                updateSubtitleDisplay('POINTING');
                updateTouchPositions(e);
                triggerSoftPluck(277.18, 0.05, 1.5);
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (isTouching) {
                updateTouchPositions(e);
            }
        });

        window.addEventListener('touchend', () => {
            if (isTouching && !handActive) {
                currentGesture = 'NONE';
                updateSubtitleDisplay('NONE');
                isTouching = false;
            }
        });

        // Toque duplo rápido simula o pulso gravitacional de forma simples
        window.addEventListener('dblclick', (e) => {
            if (!handActive && experienceStarted && e.target.tagName !== 'BUTTON') {
                currentGesture = 'FIST';
                updateSubtitleDisplay('FIST');
                setTimeout(() => {
                    currentGesture = 'OPEN_HAND';
                    updateSubtitleDisplay('OPEN_HAND');
                    triggerCelestialExplosion();
                    playSymphonySupernova();
                    setTimeout(() => { currentGesture = 'NONE'; updateSubtitleDisplay('NONE'); }, 300);
                }, 350);
            }
        });

        function updateTouchPositions(e) {
            if (e.touches.length > 0) {
                targetHandPos.x = (e.touches[0].clientX / window.innerWidth - 0.5) * handScaleX;
                targetHandPos.y = -(e.touches[0].clientY / window.innerHeight - 0.5) * handScaleY;
            }
        }

        window.addEventListener('mousemove', (e) => {
            if (!handActive && experienceStarted) {
                targetHandPos.x = (e.clientX / window.innerWidth - 0.5) * handScaleX;
                targetHandPos.y = -(e.clientY / window.innerHeight - 0.5) * handScaleY;
            }
        });


        // --- CONTROLE DE MUDANÇA DOS MOVIMENTOS SINFÔNICOS ---
        function nextSymphonyMovement() {
            currentMovementIndex = (currentMovementIndex + 1) % movementsList.length;
            applyMovementDetails();
        }

        function applyMovementDetails() {
            const m = movementsList[currentMovementIndex];
            movementDisplayTitle.innerText = m.name;
            triggerSoftPluck(pureScale[currentMovementIndex % pureScale.length] * 2, 0.08, 2.2);
        }

        function startMinimalExperience() {
            if (experienceStarted) return;
            experienceStarted = true;

            welcomeScreen.style.opacity = '0';
            setTimeout(() => {
                welcomeScreen.style.display = 'none';
                resetUiInactivityTimer();
            }, 1200);

            initAcousticAudio();
            initGestureTracking();
        }


        // --- LOOP DE ATUALIZAÇÃO FÍSICA E FRAME LOOP ---
        const clock = new THREE.Clock();
        
        let dt = 0;
        let elapsed = 0;
        let pArray = null;
        let vArray = null;
        let prevX = 0, prevY = 0;
        let handVelocityFactor = 0;

        function animate() {
            requestAnimationFrame(animate);

            dt = Math.min(clock.getDelta(), 0.06); 
            elapsed = clock.getElapsedTime();
            
            if (handActive) {
                handVelocityFactor = Math.hypot(handPos.x - prevX, handPos.y - prevY);
                prevX = handPos.x;
                prevY = handPos.y;
            } else {
                handVelocityFactor *= 0.94;
            }

            handPos.lerp(targetHandPos, 0.08);

            pArray = hologramPoints.geometry.attributes.position.array;
            vArray = velocities;

            updateAudioModulations(currentGesture, handPos.y, handVelocityFactor);

            // Rotação sutil do holograma branco
            const m = movementsList[currentMovementIndex];
            hologramPoints.rotation.x = THREE.MathUtils.lerp(hologramPoints.rotation.x, 0, 0.05);
            hologramPoints.rotation.y += m.speed;

            // Escala de tamanho das partículas de acordo com os gestos ativos
            if (currentGesture === 'FIST') {
                particleMaterial.size = THREE.MathUtils.lerp(particleMaterial.size, m.size * 0.5, 0.12);
            } else if (currentGesture === 'OPEN_HAND') {
                particleMaterial.size = THREE.MathUtils.lerp(particleMaterial.size, m.size * 1.5, 0.12);
            } else {
                particleMaterial.size = THREE.MathUtils.lerp(particleMaterial.size, m.size, 0.12);
            }

            // Simulação física suave de massa gravitacional
            for (let i = 0; i < particleCount * 3; i += 3) {
                const xOrig = originalPositions[i];
                const yOrig = originalPositions[i+1];
                const zOrig = originalPositions[i+2];

                let x = pArray[i];
                let y = pArray[i+1];
                let z = pArray[i+2];

                let vx = vArray[i];
                let vy = vArray[i+1];
                let vz = vArray[i+2];

                const springK = 0.8; 
                let ax = (xOrig - x) * springK;
                let ay = (yOrig - y) * springK;
                let az = (zOrig - z) * springK;

                if (currentGesture === 'FIST') {
                    const pulse = 0.06 + Math.sin(elapsed * 10.0) * 0.01;
                    ax += (xOrig * pulse - x) * 2.8;
                    ay += (yOrig * pulse - y) * 2.8;
                    az += (zOrig * pulse - z) * 2.8;

                } else if (currentGesture === 'POINTING' || isTouching) {
                    const dx = handPos.x - x;
                    const dy = handPos.y - y;
                    const dz = handPos.z - z;
                    const dSq = dx*dx + dy*dy + dz*dz + 0.15;
                    const dist = Math.sqrt(dSq);

                    const pull = Math.min(1.8 / dSq, 1.6);
                    ax += (dx / dist) * pull;
                    ay += (dy / dist) * pull;
                    az += (dz / dist) * pull;

                } else if (currentGesture === 'OPEN_HAND') {
                    const wavePhase = (xOrig * 1.2 + yOrig * 1.2) + elapsed * 2.2;
                    const waveZ = Math.sin(wavePhase) * 0.35;
                    az += (waveZ - z) * 1.0;
                    
                    const expand = 1.35;
                    ax += (xOrig * expand - x) * 0.5;
                    ay += (yOrig * expand - y) * 0.5;
                }

                vx += ax * dt;
                vy += ay * dt;
                vz += az * dt;

                const drag = 0.92;
                vx *= drag;
                vy *= drag;
                vz *= drag;

                pArray[i] += vx * dt;
                pArray[i+1] += vy * dt;
                pArray[i+2] += vz * dt;

                vArray[i] = vx;
                vArray[i+1] = vy;
                vArray[i+2] = vz;
            }

            hologramPoints.geometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = function() {
            animate();
        };

    </script>
</body>
</html>
