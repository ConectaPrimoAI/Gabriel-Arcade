
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Holograma Orquestral Premium</title>
    <!-- Three.js para renderização gráfica 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe SDKs oficiais -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #webcam {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        
        /* Indicador óptico minimalista de detecção da mão */
        #hand-detector-status {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.1);
            transition: background-color 0.4s ease, box-shadow 0.4s ease;
        }
        .status-text {
            font-size: 8px;
            font-weight: 300;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.25);
            transition: color 0.4s ease;
        }
        #hand-detector-status.active .status-dot {
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }
        #hand-detector-status.active .status-text {
            color: rgba(255, 255, 255, 0.8);
        }

        /* Botão sutil para silenciar/ativar áudio com transição de fade-in */
        #audio-toggle {
            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 6;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.4);
            padding: 8px 16px;
            font-size: 8px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            border-radius: 20px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.3s ease, color 0.3s ease;
            font-weight: 300;
        }
        #audio-toggle.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #audio-toggle:hover {
            border-color: rgba(255, 255, 255, 0.5);
            color: rgba(255, 255, 255, 0.9);
        }

        /* Tela de introdução premium */
        #interactive-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000000;
            color: #ffffff;
            transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
        }
        .intro-title {
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 16px;
            transition: color 0.3s ease;
        }
        #interactive-overlay:hover .intro-title {
            color: #ffffff;
        }
        .intro-desc {
            font-size: 9px;
            font-weight: 300;
            letter-spacing: 0.18em;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
            max-width: 320px;
            line-height: 2;
        }
    </style>
</head>
<body>

    <div id="interactive-overlay" onclick="startExperience()">
        <div class="intro-title">Iniciar Orquestra</div>
        <div class="intro-desc">Mova-se diante da câmera ou deslize pela tela para reger as partículas e sons sintéticos.</div>
    </div>

    <div id="hand-detector-status">
        <div class="status-dot"></div>
        <div class="status-text">MÃO CONECTADA</div>
    </div>

    <button id="audio-toggle" onclick="toggleAudio()">ÁUDIO: ATIVO</button>

    <div id="canvas-container"></div>
    <video id="webcam" autoplay playsinline></video>

    <script>
        // --- CONFIGURAÇÃO GLOBAL ---
        let experienceStarted = false;
        let audioEnabled = true;
        let handScaleX = 16;
        let handScaleY = 12;

        const overlay = document.getElementById('interactive-overlay');
        const detectorStatus = document.getElementById('hand-detector-status');
        const audioBtn = document.getElementById('audio-toggle');

        // Referências para transições e rotação (evitando problemas de escopo)
        let targetRotation = { x: 0, y: 0 };
        let currentRotation = { x: 0, y: 0 };

        // --- SISTEMA DE SÍNTESE CINEMÁTICO (WEB AUDIO API) ---
        let audioCtx = null;
        let mainFilterNode = null;
        let masterGain = null;
        
        // Drone profundo de base
        let droneOsc1 = null;
        let droneOsc2 = null;
        
        // Sintetizador harmônico para movimentos (Vento espacial)
        let windOsc1 = null;
        let windGain = null;

        async function initAudio() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Desbloqueia explicitamente o áudio para iOS/Safari se estiver suspenso
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                // Controle de ganho mestre
                masterGain = audioCtx.createGain();
                masterGain.gain.setValueAtTime(0.12, audioCtx.currentTime);

                // Filtro passa-baixas dinâmico principal (controlado pelo gesto FIST)
                mainFilterNode = audioCtx.createBiquadFilter();
                mainFilterNode.type = 'lowpass';
                mainFilterNode.frequency.setValueAtTime(2000, audioCtx.currentTime);
                mainFilterNode.Q.setValueAtTime(1.0, audioCtx.currentTime);

                // Conexões básicas
                mainFilterNode.connect(masterGain);
                masterGain.connect(audioCtx.destination);

                // Geração de Drone Atmosférico (Notas harmônicas graves)
                droneOsc1 = audioCtx.createOscillator();
                droneOsc2 = audioCtx.createOscillator();
                const droneGain = audioCtx.createGain();

                droneOsc1.type = 'sine';
                droneOsc1.frequency.setValueAtTime(55, audioCtx.currentTime); // A1
                droneOsc2.type = 'triangle';
                droneOsc2.frequency.setValueAtTime(110.5, audioCtx.currentTime); // A2 levemente desafinado

                droneGain.gain.setValueAtTime(0.04, audioCtx.currentTime);

                droneOsc1.connect(droneGain);
                droneOsc2.connect(droneGain);
                droneGain.connect(mainFilterNode);

                droneOsc1.start();
                droneOsc2.start();

                // Sintetizador do vento dinâmico (segue o eixo Y da mão)
                windOsc1 = audioCtx.createOscillator();
                windGain = audioCtx.createGain();

                windOsc1.type = 'sine';
                windOsc1.frequency.setValueAtTime(220, audioCtx.currentTime);
                windGain.gain.setValueAtTime(0, audioCtx.currentTime); // Inicia silencioso

                windOsc1.connect(windGain);
                windGain.connect(mainFilterNode);
                windOsc1.start();

                // Exibe o controle de áudio com fade suave por classe CSS
                audioBtn.classList.add('visible');
            } catch (e) {
                console.warn("Web Audio API não pôde ser iniciada:", e);
            }
        }

        // Modulação do som baseado nas interações físicas do maestro
        function updateAudioSynthesis(gesture, handY, velocityFactor) {
            if (!audioCtx || !audioEnabled) return;

            const now = audioCtx.currentTime;

            // Filtro Passa-Baixas dinâmico conforme a compressão do punho
            if (gesture === 'FIST') {
                mainFilterNode.frequency.setTargetAtTime(120, now, 0.2);
            } else if (gesture === 'OPEN_HAND') {
                mainFilterNode.frequency.setTargetAtTime(3500, now, 0.3);
            } else {
                mainFilterNode.frequency.setTargetAtTime(1800, now, 0.4);
            }

            // Vento dinâmico reativo à altura Y da mão e sua velocidade geral
            if (handActive) {
                const targetFreq = 220 + (handY + 6) * 45; // Mapeia altura em frequência
                const targetVolume = Math.min(0.015 + velocityFactor * 0.02, 0.04);
                
                windOsc1.frequency.setTargetAtTime(targetFreq, now, 0.15);
                windGain.gain.setTargetAtTime(targetVolume, now, 0.1);
            } else {
                windGain.gain.setTargetAtTime(0, now, 0.4);
            }
        }

        // Disparo de gongo harmônico de cristal cristalino na supernova (✊ -> ✋)
        function playSupernovaChime() {
            if (!audioCtx || !audioEnabled) return;

            const now = audioCtx.currentTime;

            // Criação de acorde metálico sutil
            const frequencies = [220, 330, 440, 660, 880];
            frequencies.forEach((freq, idx) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);

                const startVol = 0.02 / (idx + 1);
                gain.gain.setValueAtTime(startVol, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.5);

                osc.connect(gain);
                gain.connect(mainFilterNode);

                osc.start(now);
                osc.stop(now + 3.8);
            });
        }

        function toggleAudio() {
            audioEnabled = !audioEnabled;
            if (audioEnabled) {
                masterGain.gain.setTargetAtTime(0.12, audioCtx.currentTime, 0.1);
                audioBtn.textContent = "ÁUDIO: ATIVO";
                audioBtn.style.borderColor = "rgba(255, 255, 255, 0.15)";
            } else {
                masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
                audioBtn.textContent = "ÁUDIO: MUTADO";
                audioBtn.style.borderColor = "rgba(255, 255, 255, 0.05)";
            }
        }

        function startExperience() {
            if (experienceStarted) return;
            experienceStarted = true;
            overlay.style.opacity = '0';
            
            // Aparecimento sutil do HUD detector
            detectorStatus.style.opacity = '1';
            
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 1500);

            initAudio();
            initGestureSensor();
        }

        // --- SISTEMA DINÂMICO DE ESCALA RESPONSIVA ---
        function updateMultipliers() {
            const aspect = window.innerWidth / window.innerHeight;
            if (aspect < 1) {
                handScaleX = aspect * 11;
                handScaleY = 11;
            } else {
                handScaleX = 14;
                handScaleY = 10;
            }
        }
        window.addEventListener('resize', updateMultipliers);
        updateMultipliers();


        // --- ENGINE GRÁFICA 3D (THREE.JS) ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.004);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8;

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Luzes neutras e esteticamente suaves
        const ambientLight = new THREE.AmbientLight(0x0b0b0b);
        scene.add(ambientLight);

        const light1 = new THREE.PointLight(0xffffff, 1.4, 40);
        light1.position.set(5, 5, 5);
        scene.add(light1);

        const light2 = new THREE.PointLight(0xffffff, 0.6, 40);
        light2.position.set(-5, -5, 5);
        scene.add(light2);

        // Textura da partícula procedural
        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(0.2, 'rgba(255,255,255,0.7)');
            grad.addColorStop(0.6, 'rgba(255,255,255,0.1)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 32, 32);
            const tex = new THREE.Texture(canvas);
            tex.needsUpdate = true;
            return tex;
        }
        const particleTexture = createParticleTexture();

        // --- ALOCAÇÃO DE FÍSICA GLOBAL (EVITA ACÚMULO DE LIXO DE MEMÓRIA) ---
        const particleCount = 12000;
        const particleGeometry = new THREE.BufferGeometry();
        
        const positions = new Float32Array(particleCount * 3);
        const originalPositions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const originalColors = new Float32Array(particleCount * 3);

        // Fibonacci esférico
        for (let i = 0; i < particleCount * 3; i += 3) {
            const idx = i / 3;
            const phi = Math.acos(1 - 2 * (idx + 0.5) / particleCount);
            const theta = Math.PI * (1 + Math.sqrt(5)) * idx;
            const r = 2.4 + (Math.random() - 0.5) * 0.12;

            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);

            positions[i] = x;
            positions[i+1] = y;
            positions[i+2] = z;

            originalPositions[i] = x;
            originalPositions[i+1] = y;
            originalPositions[i+2] = z;

            velocities[i] = 0;
            velocities[i+1] = 0;
            velocities[i+2] = 0;

            const shade = 0.85 + Math.random() * 0.15;
            colors[i] = shade;
            colors[i+1] = shade;
            colors[i+2] = shade;

            originalColors[i] = shade;
            originalColors[i+1] = shade;
            originalColors[i+2] = shade;
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const particleMaterial = new THREE.PointsMaterial({
            size: 0.05,
            map: particleTexture,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const hologramPoints = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(hologramPoints);


        // --- RASTREAMENTO ÓPTICO E AMORTECEDOR DE PERDA DE SINAL ---
        let currentGesture = 'NONE';
        let previousGesture = 'NONE';
        let activeMode = 'NORMAL'; 
        
        let handPos = new THREE.Vector3(0, 0, 0);
        let targetHandPos = new THREE.Vector3(0, 0, 0);
        let handActive = false;

        // Amortecedor/Tempo de carência ao perder o rastreamento da mão
        let trackingGraceCounter = 0;
        const MAX_GRACE_FRAMES = 24; // Cerca de 400ms de transição suave em caso de falha de leitura

        const webcam = document.getElementById('webcam');

        function initGestureSensor() {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.65,
                minTrackingConfidence: 0.65
            });

            hands.onResults(onHandResults);

            const cameraHelper = new Camera(webcam, {
                onFrame: async () => {
                    if (experienceStarted) {
                        await hands.send({ image: webcam });
                    }
                },
                width: 640,
                height: 480
            });
            
            cameraHelper.start().catch(() => {
                // Câmera inativa, usando backup manual por toque
            });
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];

                trackingGraceCounter = MAX_GRACE_FRAMES; // Reinicia o amortecedor de sinal

                targetHandPos.x = (1 - landmarks[9].x - 0.5) * handScaleX;
                targetHandPos.y = -(landmarks[9].y - 0.5) * handScaleY;
                targetHandPos.z = -landmarks[9].z * 10;
                
                if (!handActive) {
                    handActive = true;
                    detectorStatus.classList.add('active');
                }

                const distance = (p1, p2) => Math.hypot(
                    landmarks[p1].x - landmarks[p2].x,
                    landmarks[p1].y - landmarks[p2].y,
                    landmarks[p1].z - landmarks[p2].z
                );

                const isIndexExtended = landmarks[8].y < landmarks[6].y;
                const isMiddleExtended = landmarks[12].y < landmarks[10].y;
                const isRingExtended = landmarks[16].y < landmarks[14].y;
                const isPinkyExtended = landmarks[20].y < landmarks[18].y;

                let detected = 'NONE';

                if (isIndexExtended && isMiddleExtended && !isRingExtended && !isPinkyExtended) {
                    detected = 'PEACE'; 
                } else if (landmarks[4].y < landmarks[3].y && landmarks[4].y < landmarks[5].y && !isIndexExtended && !isMiddleExtended && !isRingExtended && !isPinkyExtended) {
                    detected = 'THUMB_UP'; 
                } else if (!isIndexExtended && !isMiddleExtended && !isRingExtended && !isPinkyExtended) {
                    detected = 'FIST'; 
                } else if (isIndexExtended && isMiddleExtended && isRingExtended && isPinkyExtended) {
                    detected = 'OPEN_HAND'; 
                } else if (isIndexExtended && !isMiddleExtended && !isRingExtended && !isPinkyExtended) {
                    detected = 'POINTING'; 
                }

                // Orquestração da Supernova (✊ -> ✋)
                if (previousGesture === 'FIST' && detected === 'OPEN_HAND') {
                    triggerSupernova();
                    playSupernovaChime();
                }

                if (detected === 'PEACE' && activeMode !== 'EXPLORER') {
                    activeMode = 'EXPLORER';
                } else if (detected === 'THUMB_UP' && activeMode !== 'NORMAL') {
                    activeMode = 'NORMAL';
                    resetOrientation();
                }

                if (detected !== 'NONE') {
                    previousGesture = detected;
                }
                currentGesture = detected;
            } else {
                // Aplica o amortecedor antes de resetar o sinal
                if (trackingGraceCounter > 0) {
                    trackingGraceCounter--;
                } else {
                    if (handActive) {
                        handActive = false;
                        detectorStatus.classList.remove('active');
                    }
                    currentGesture = 'NONE';
                }
            }
        }

        // --- EXPLOSÃO MATEMATICAMENTE OTIMIZADA (SUPERNOVA) ---
        function triggerSupernova() {
            const pos = hologramPoints.geometry.attributes.position.array;
            
            for (let i = 0; i < particleCount * 3; i += 3) {
                const x = pos[i];
                const y = pos[i+1];
                const z = pos[i+2];

                const distSq = x*x + y*y + z*z + 0.002;
                const invDist = 1 / Math.sqrt(distSq);
                
                // Força radial aleatória para maior distribuição das partículas
                const force = (2.4 + Math.random() * 1.8) * invDist;
                
                velocities[i] += x * invDist * force;
                velocities[i+1] += y * invDist * force;
                velocities[i+2] += z * invDist * force;
            }
        }

        function resetOrientation() {
            targetRotation.x = 0;
            targetRotation.y = 0;
        }


        // --- INTERATIVIDADE DE TOQUE (FALLBACK SEAMLESS) ---
        let isTouching = false;

        window.addEventListener('mousedown', () => {
            if (!handActive && experienceStarted) {
                isTouching = true;
                currentGesture = 'POINTING';
            }
        });

        window.addEventListener('mouseup', () => {
            if (!handActive && experienceStarted) {
                if (currentGesture === 'FIST') {
                    currentGesture = 'OPEN_HAND';
                    triggerSupernova();
                    playSupernovaChime();
                    setTimeout(() => { currentGesture = 'NONE'; }, 200);
                } else {
                    currentGesture = 'NONE';
                }
                isTouching = false;
            }
        });

        window.addEventListener('touchstart', (e) => {
            if (overlay.style.display === 'none') {
                isTouching = true;
                if (e.touches.length === 2) {
                    activeMode = activeMode === 'NORMAL' ? 'EXPLORER' : 'NORMAL';
                    if (activeMode === 'NORMAL') resetOrientation();
                } else {
                    currentGesture = 'POINTING';
                    updateTouchCoords(e);
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (isTouching) {
                updateTouchCoords(e);
            }
        });

        window.addEventListener('touchend', () => {
            if (isTouching && !handActive) {
                currentGesture = 'NONE';
                isTouching = false;
            }
        });

        window.addEventListener('dblclick', () => {
            if (!handActive && experienceStarted) {
                currentGesture = 'FIST';
                setTimeout(() => {
                    currentGesture = 'OPEN_HAND';
                    triggerSupernova();
                    playSupernovaChime();
                    setTimeout(() => { currentGesture = 'NONE'; }, 300);
                }, 400);
            }
        });

        function updateTouchCoords(e) {
            if (e.touches.length > 0) {
                targetHandPos.x = (e.touches[0].clientX / window.innerWidth - 0.5) * handScaleX;
                targetHandPos.y = -(e.touches[0].clientY / window.innerHeight - 0.5) * handScaleY;
            }
        }

        window.addEventListener('mousemove', (e) => {
            if (!handActive) {
                targetHandPos.x = (e.clientX / window.innerWidth - 0.5) * handScaleX;
                targetHandPos.y = -(e.clientY / window.innerHeight - 0.5) * handScaleY;
            }
        });


        // --- LAÇO DE COMPILAÇÃO E ATUALIZAÇÃO FÍSICA ---
        const clock = new THREE.Clock();
        
        // Declarações estáticas globais de processamento (Zero GC Allocation)
        let dt = 0;
        let elapsed = 0;
        let pArray = null;
        let vArray = null;
        let cArray = null;
        let prevX = 0, prevY = 0;
        let handVelocityFactor = 0;

        function animate() {
            requestAnimationFrame(animate);

            dt = Math.min(clock.getDelta(), 0.1); 
            elapsed = clock.getElapsedTime();
            
            // Medidor de velocidade e inércia do maestro para a síntese sonora
            if (handActive) {
                handVelocityFactor = Math.hypot(handPos.x - prevX, handPos.y - prevY);
                prevX = handPos.x;
                prevY = handPos.y;
            } else {
                handVelocityFactor *= 0.95;
            }

            // Interpolação de inércia fluida
            handPos.lerp(targetHandPos, 0.08);

            // Vinculação de referências otimizadas
            pArray = hologramPoints.geometry.attributes.position.array;
            vArray = velocities;
            cArray = hologramPoints.geometry.attributes.color.array;

            // Envio das informações físicas para a síntese Web Audio
            updateAudioSynthesis(currentGesture, handPos.y, handVelocityFactor);

            // Modos de orientação de conjunto
            if (activeMode === 'EXPLORER') {
                targetRotation.y = handPos.x * 0.35;
                targetRotation.x = -handPos.y * 0.35;
                
                currentRotation.x = THREE.MathUtils.lerp(currentRotation.x, targetRotation.x, 0.06);
                currentRotation.y = THREE.MathUtils.lerp(currentRotation.y, targetRotation.y, 0.06);

                hologramPoints.rotation.x = currentRotation.x;
                hologramPoints.rotation.y = currentRotation.y;
            } else {
                hologramPoints.rotation.x = THREE.MathUtils.lerp(hologramPoints.rotation.x, 0, 0.05);
                hologramPoints.rotation.y += 0.0015;
            }

            // Variação orgânica do brilho e tamanho com base na compressão ou expansão
            if (currentGesture === 'FIST') {
                light1.intensity = THREE.MathUtils.lerp(light1.intensity, 3.8, 0.1);
                particleMaterial.size = THREE.MathUtils.lerp(particleMaterial.size, 0.038, 0.1);
            } else if (currentGesture === 'OPEN_HAND') {
                light1.intensity = THREE.MathUtils.lerp(light1.intensity, 1.8, 0.1);
                particleMaterial.size = THREE.MathUtils.lerp(particleMaterial.size, 0.055, 0.1);
            } else {
                light1.intensity = THREE.MathUtils.lerp(light1.intensity, 1.4, 0.1);
                particleMaterial.size = THREE.MathUtils.lerp(particleMaterial.size, 0.05, 0.1);
            }

            // Loop de cálculo físico e modificador cromático dinâmico (CPU extremamente otimizada)
            for (let i = 0; i < particleCount * 3; i += 3) {
                const xOrig = originalPositions[i];
                const yOrig = originalPositions[i+1];
                const zOrig = originalPositions[i+2];

                let x = pArray[i];
                let y = pArray[i+1];
                let z = pArray[i+2];

                let vx = vArray[i];
                let vy = vArray[i+1];
                let vz = vArray[i+2];

                // Força de atração original elástica
                const springK = 0.82; 
                let ax = (xOrig - x) * springK;
                let ay = (yOrig - y) * springK;
                let az = (zOrig - z) * springK;

                if (currentGesture === 'FIST') {
                    // Colapso gravitacional com micro-vibrações
                    const pulse = 0.11 + Math.sin(elapsed * 15.0) * 0.015;
                    ax += (xOrig * pulse - x) * 2.8;
                    ay += (yOrig * pulse - y) * 2.8;
                    az += (zOrig * pulse - z) * 2.8;

                } else if (currentGesture === 'POINTING' || isTouching) {
                    // Atração centrípeta forte ao ponto
                    const dx = handPos.x - x;
                    const dy = handPos.y - y;
                    const dz = handPos.z - z;
                    const dSq = dx*dx + dy*dy + dz*dz + 0.1;
                    const dist = Math.sqrt(dSq);

                    const pull = Math.min(2.2 / dSq, 2.0);
                    ax += (dx / dist) * pull;
                    ay += (dy / dist) * pull;
                    az += (dz / dist) * pull;

                } else if (currentGesture === 'OPEN_HAND') {
                    // Ondulação harmônica
                    const wavePhase = (xOrig * 1.5 + yOrig * 1.5) + elapsed * 3.2;
                    const waveZ = Math.sin(wavePhase) * 0.5;
                    az += (waveZ - z) * 1.3;
                    
                    const expand = 1.4;
                    ax += (xOrig * expand - x) * 0.6;
                    ay += (yOrig * expand - y) * 0.6;
                }

                vx += ax * dt;
                vy += ay * dt;
                vz += az * dt;

                const drag = 0.925;
                vx *= drag;
                vy *= drag;
                vz *= drag;

                pArray[i] += vx * dt;
                pArray[i+1] += vy * dt;
                pArray[i+2] += vz * dt;

                vArray[i] = vx;
                vArray[i+1] = vy;
                vArray[i+2] = vz;

                // --- SISTEMA DE COLORAÇÃO DINÂMICA POR VELOCIDADE (COM CLAMPING DE SEGURANÇA) ---
                const speedSq = vx*vx + vy*vy + vz*vz;
                const origRed = originalColors[i];
                const origGreen = originalColors[i+1];
                const origBlue = originalColors[i+2];

                if (speedSq > 1.5) {
                    // Partículas rápidas ganham luminescência azul-ciano etérea
                    const glowFactor = Math.min((speedSq - 1.5) * 0.15, 0.9);
                    cArray[i] = Math.max(0.0, Math.min(1.0, THREE.MathUtils.lerp(cArray[i], origRed * 0.4, glowFactor)));
                    cArray[i+1] = Math.max(0.0, Math.min(1.0, THREE.MathUtils.lerp(cArray[i+1], origGreen * 0.85, glowFactor)));
                    cArray[i+2] = Math.max(0.0, Math.min(1.0, THREE.MathUtils.lerp(cArray[i+2], 1.0, glowFactor)));
                } else {
                    // Retorno suave às cores originais neutras (lerp lento de amortecimento)
                    cArray[i] = Math.max(0.0, Math.min(1.0, THREE.MathUtils.lerp(cArray[i], origRed, 0.05)));
                    cArray[i+1] = Math.max(0.0, Math.min(1.0, THREE.MathUtils.lerp(cArray[i+1], origGreen, 0.05)));
                    cArray[i+2] = Math.max(0.0, Math.min(1.0, THREE.MathUtils.lerp(cArray[i+2], origBlue, 0.05)));
                }
            }

            hologramPoints.geometry.attributes.position.needsUpdate = true;
            hologramPoints.geometry.attributes.color.needsUpdate = true;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

    </script>
</body>
</html>
