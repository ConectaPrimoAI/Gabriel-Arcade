
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>Flappy Bird Clássico - Edição Ampliada</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #111; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { 
            display: block; 
            background: #70c5ce; 
            box-shadow: 0 0 60px rgba(0,0,0,0.7);
            image-rendering: pixelated;
            max-width: 95vw;
            max-height: 90vh;
            border: 4px solid #000;
        }
        #ui {
            position: absolute;
            top: 10%;
            color: white;
            font-size: 80px;
            font-weight: 900;
            text-shadow: 4px 4px 0 #000, -4px -4px 0 #000, 4px -4px 0 #000, -4px 4px 0 #000;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="ui">0</div>
    <canvas id="birdCanvas"></canvas>

<script>
    const canvas = document.getElementById('birdCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('ui');

    // Dimensões Ampliadas (400x600 em vez de 320x480)
    const CW = 400;
    const CH = 600;
    canvas.width = CW;
    canvas.height = CH;

    // Estado do Jogo
    let frame = 0;
    let score = 0;
    let gameActive = false;
    let pipes = [];
    let flashOpacity = 0;
    
    // Pássaro ligeiramente maior para o ecrã maior
    const bird = {
        x: 80,
        y: 250,
        w: 42,
        h: 30,
        v: 0,
        gravity: 0.25,
        jump: -5.2,
        rot: 0
    };

    let floorX = 0;

    function resetGame() {
        bird.y = 250;
        bird.v = 0;
        bird.rot = 0;
        pipes = [];
        score = 0;
        frame = 0;
        scoreEl.innerText = score;
        gameActive = true;
        flashOpacity = 0;
    }

    function drawBird() {
        ctx.save();
        ctx.translate(bird.x, bird.y);
        
        // Rotação dinâmica
        if (bird.v < 0) {
            bird.rot = -0.4;
        } else if (bird.v > 3) {
            bird.rot = Math.min(Math.PI / 2, bird.rot + 0.12);
        }

        ctx.rotate(bird.rot);

        // Corpo
        ctx.fillStyle = '#f7d010';
        ctx.fillRect(-bird.w/2, -bird.h/2, bird.w, bird.h);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeRect(-bird.w/2, -bird.h/2, bird.w, bird.h);

        // Asa com animação
        const wingY = Math.sin(frame * 0.4) * 4;
        ctx.fillStyle = '#fff';
        ctx.fillRect(-18, -5 + wingY, 18, 12);
        ctx.strokeRect(-18, -5 + wingY, 18, 12);

        // Olho
        ctx.fillStyle = '#fff';
        ctx.fillRect(8, -12, 12, 12);
        ctx.strokeRect(8, -12, 12, 12);
        ctx.fillStyle = '#000';
        ctx.fillRect(15, -9, 4, 5);

        // Bico
        ctx.fillStyle = '#f75d10';
        ctx.fillRect(18, 0, 14, 12);
        ctx.strokeRect(18, 0, 14, 12);

        ctx.restore();
    }

    function drawBackground() {
        ctx.fillStyle = '#70c5ce';
        ctx.fillRect(0, 0, CW, CH);

        // Solo distante
        ctx.fillStyle = '#ded895';
        ctx.fillRect(0, CH - 140, CW, 140);
        
        // Arbustos decorativos
        ctx.fillStyle = '#95e183';
        for(let i=0; i<CW; i+=80) {
            ctx.fillRect(i, CH-165, 65, 25);
        }
    }

    function drawFloor() {
        if(gameActive) floorX = (floorX - 3) % 30;
        
        ctx.fillStyle = '#ded895';
        ctx.fillRect(0, CH - 100, CW, 100);
        
        ctx.fillStyle = '#73bf2e';
        ctx.fillRect(0, CH - 100, CW, 18);
        
        ctx.strokeStyle = '#543847';
        ctx.lineWidth = 4;
        for(let i = floorX; i < CW + 40; i += 30) {
            ctx.beginPath();
            ctx.moveTo(i, CH - 82);
            ctx.lineTo(i - 15, CH);
            ctx.stroke();
        }
    }

    function drawPipes() {
        pipes.forEach(p => {
            const pipeW = 65; // Canos mais largos
            const gap = 130; // Abertura maior para compensar o tamanho

            ctx.fillStyle = '#73bf2e';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;

            // Superior
            ctx.fillRect(p.x, 0, pipeW, p.top);
            ctx.strokeRect(p.x, -5, pipeW, p.top + 5);
            ctx.fillRect(p.x - 5, p.top - 30, pipeW + 10, 30);
            ctx.strokeRect(p.x - 5, p.top - 30, pipeW + 10, 30);

            // Inferior
            const bottomY = p.top + gap;
            const bottomH = CH - bottomY - 100;
            ctx.fillRect(p.x, bottomY, pipeW, bottomH);
            ctx.strokeRect(p.x, bottomY, pipeW, bottomH);
            ctx.fillRect(p.x - 5, bottomY, pipeW + 10, 30);
            ctx.strokeRect(p.x - 5, bottomY, pipeW + 10, 30);
            
            // Brilho lateral nos canos
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.fillRect(p.x + 10, 0, 12, p.top);
            ctx.fillRect(p.x + 10, bottomY, 12, bottomH);
        });
    }

    function update() {
        if (!gameActive) return;

        frame++;
        bird.v += bird.gravity;
        bird.y += bird.v;

        if (frame % 85 === 0) {
            const minH = 70;
            const maxH = 300;
            const h = Math.floor(Math.random() * (maxH - minH + 1) + minH);
            pipes.push({ x: CW, top: h, passed: false });
        }

        pipes.forEach(p => {
            p.x -= 3; // Velocidade ligeiramente maior

            // Colisão mais precisa
            if (bird.x + 18 > p.x && bird.x - 18 < p.x + 65) {
                if (bird.y - 12 < p.top || bird.y + 12 > p.top + 130) {
                    gameOver();
                }
            }

            if (!p.passed && p.x < bird.x) {
                p.passed = true;
                score++;
                scoreEl.innerText = score;
            }
        });

        pipes = pipes.filter(p => p.x > -120);

        if (bird.y + bird.h/2 >= CH - 100 || bird.y < 0) {
            gameOver();
        }
    }

    function gameOver() {
        if(!gameActive) return;
        gameActive = false;
        flashOpacity = 1;
        
        setTimeout(() => {
            resetGame();
            gameActive = false;
            frame = 0;
        }, 1200);
    }

    function draw() {
        drawBackground();
        drawPipes();
        drawFloor();
        drawBird();

        if (!gameActive && frame === 0) {
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0,0,CW,CH);
            ctx.fillStyle = 'white';
            ctx.font = '900 24px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('CLIQUE PARA COMECAR', CW/2, CH/2);
        }

        if (flashOpacity > 0) {
            ctx.fillStyle = `rgba(255,255,255,${flashOpacity})`;
            ctx.fillRect(0,0,CW,CH);
            flashOpacity -= 0.15;
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    const handleAction = (e) => {
        if(e) e.preventDefault();
        if (!gameActive && frame === 0) {
            resetGame();
        } else if (gameActive) {
            bird.v = bird.jump;
            bird.rot = -0.4;
        }
    };

    window.addEventListener('mousedown', handleAction);
    window.addEventListener('touchstart', handleAction, {passive: false});
    window.addEventListener('keydown', (e) => {
        if(e.code === 'Space' || e.code === 'ArrowUp') handleAction();
    });

    loop();

</script>
</body>
</html>
