    <!-- Três.js Biblioteca Gráfica -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // --- GERADOR DE SONS EM TEMPO REAL (WEB AUDIO API) ---
        let audioCtx, engineOsc, engineFilter, engineGain;
        let isAudioInitialized = false;

        function initAudio() {
            if (isAudioInitialized) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                engineOsc = audioCtx.createOscillator();
                engineFilter = audioCtx.createBiquadFilter();
                engineGain = audioCtx.createGain();

                engineOsc.type = 'sawtooth';
                engineOsc.frequency.setValueAtTime(45, audioCtx.currentTime);

                engineFilter.type = 'lowpass';
                engineFilter.frequency.setValueAtTime(180, audioCtx.currentTime);

                engineGain.gain.setValueAtTime(0.0, audioCtx.currentTime);

                engineOsc.connect(engineFilter);
                engineFilter.connect(engineGain);
                engineGain.connect(audioCtx.destination);

                engineOsc.start();
                isAudioInitialized = true;
            } catch (e) {
                console.warn("Áudio não suportado ou bloqueado.");
            }
        }

        function playEngineSound(speedVal) {
            if (!isAudioInitialized) return;
            const frequency = 45 + (speedVal * 220);
            const cutoff = 160 + (speedVal * 420);
            const volume = Math.min(0.16, 0.04 + (speedVal * 0.12));

            if (engineOsc && engineFilter && engineGain) {
                engineOsc.frequency.setTargetAtTime(frequency, audioCtx.currentTime, 0.1);
                engineFilter.frequency.setTargetAtTime(cutoff, audioCtx.currentTime, 0.1);
                engineGain.gain.setTargetAtTime(volume, audioCtx.currentTime, 0.1);
            }
        }

        function stopEngineSound() {
            if (engineGain) engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        }

        function playCrashSound() {
            if (!isAudioInitialized) return;
            try {
                const bufferSize = audioCtx.sampleRate * 0.5;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noiseNode = audioCtx.createBufferSource();
                noiseNode.buffer = buffer;

                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'lowpass';
                noiseFilter.frequency.setValueAtTime(1000, audioCtx.currentTime);
                noiseFilter.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.45);

                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);

                noiseNode.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noiseNode.start();
            } catch (e) {}
        }

        function playSlipSound() {
            if (!isAudioInitialized) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(360, audioCtx.currentTime + 0.3);

                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } catch (e) {}
        }

        // --- BASE DE DADOS DAS MOTAS ---
        const MOTOS_DATABASE = [
            {
                name: "Super Desportiva 1000R",
                desc: "Velocidade de Ponta, Carenagem Completa, Faróis Duplos e Escape de Carbono",
                type: 0
            },
            {
                name: "Cruiser Custom V-Twin",
                desc: "Garfo Cromado Estendido, Guiador Alto Ape-Hanger e Escapes Duplos",
                type: 1
            },
            {
                name: "Roadster Naked 650S",
                desc: "Quadro Vermelho em Treliça Exposta, Farol Redondo Clássico e Espelhos",
                type: 2
            },
            {
                name: "Scooter Bella Retro",
                desc: "Estilo Clássico Europeu, Assento de Pele, Farol Redondo e Frisos",
                type: 3
            },
            {
                name: "Hyper Trail Adventure",
                desc: "Suspensão de Longo Curso, Baús Rígidos de Alumínio e Protetor de Guiador",
                type: 4
            }
        ];

        let activeMotoIndex = 0;

        // --- SISTEMA E VARIÁVEIS THREE.JS ---
        let mainRenderer, mainScene, mainCamera;
        let previewRenderer, previewScene, previewCamera;
        let mainBike, previewBike;
        let road;
        let obstacles = [], cityBuildings = [];
        let score = 0, speed = 0.5, gameActive = false, showroomActive = true;
        let targetLane = 0;
        let spinTimer = 0;
        let gameTime = 0;
        const laneWidth = 4.2;
        let motoColor = "#e53935";

        // Materiais realistas polidos otimizados para telemóveis
        const matChrome = new THREE.MeshPhongMaterial({ color: 0xeeeeee, specular: 0xffffff, shininess: 95 });
        const matRubber = new THREE.MeshLambertMaterial({ color: 0x111111 });
        const matLeather = new THREE.MeshLambertMaterial({ color: 0x1d1d1d });
        const matGlass = new THREE.MeshPhongMaterial({ color: 0xdcf7fa, transparent: true, opacity: 0.65, shininess: 90 });
        const matYellow = new THREE.MeshPhongMaterial({ color: 0xffca28, shininess: 50 });
        const matChassisGrey = new THREE.MeshLambertMaterial({ color: 0x2a2a2a });
        const matEngineMetal = new THREE.MeshPhongMaterial({ color: 0x555555, specular: 0x888888, shininess: 60 });
        const matRedNeon = new THREE.MeshBasicMaterial({ color: 0xff0000 }); // Luz traseira

        // Construtor Geométrico Altamente Realista e Detalhado de Motas 3D
        function buildDetailedMotorcycle(type, customColor) {
            const bikeGroup = new THREE.Group();
            const matPaint = new THREE.MeshPhongMaterial({ color: new THREE.Color(customColor), specular: 0xffffff, shininess: 85 });

            // Rodas Realistas Avançadas com Discos de Travão Ventilados, Raios e Pneus Detalhados
            const createRealisticWheel = (radius, width) => {
                const wheelGroup = new THREE.Group();
                
                // Pneu de borracha
                const tyre = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, width, 24), matRubber);
                tyre.rotation.z = Math.PI / 2;
                wheelGroup.add(tyre);

                // Aro de liga metálica interior
                const rim = new THREE.Mesh(new THREE.CylinderGeometry(radius * 0.75, radius * 0.75, width + 0.02, 16), matChrome);
                rim.rotation.z = Math.PI / 2;
                wheelGroup.add(rim);

                // Raios/Raiados internos metálicos
                for (let i = 0; i < 5; i++) {
                    const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.04, radius * 1.4, 0.04), matChrome);
                    spoke.rotation.z = (i * Math.PI) / 5;
                    wheelGroup.add(spoke);
                }

                // Disco de travão ventilado
                const brakeDisc = new THREE.Mesh(new THREE.CylinderGeometry(radius * 0.52, radius * 0.52, 0.02, 12), matChrome);
                brakeDisc.rotation.z = Math.PI / 2;
                brakeDisc.position.x = width * 0.55;
                wheelGroup.add(brakeDisc);

                // Pinça de travão vermelha de alto desempenho
                const caliper = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.18, 0.08), new THREE.MeshPhongMaterial({ color: 0xd32f2f, shininess: 60 }));
                caliper.position.set(width * 0.65, radius * 0.4, 0);
                wheelGroup.add(caliper);

                return wheelGroup;
            };

            // Guiador Padrão Detalhado com Punhos e Espelhos Retrovisores
            const addHandlebarsAndMirrors = (heightOffset, widthOffset, angleX) => {
                const handlebarGroup = new THREE.Group();
                
                // Barra principal cromada
                const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.9, 12), matChrome);
                bar.rotation.z = Math.PI / 2;
                handlebarGroup.add(bar);

                // Punhos de borracha preta nas extremidades
                const gripL = new THREE.Mesh(new THREE.CylinderGeometry(0.032, 0.032, 0.18, 8), matRubber);
                gripL.rotation.z = Math.PI / 2;
                gripL.position.x = -0.38;
                handlebarGroup.add(gripL);

                const gripR = gripL.clone();
                gripR.position.x = 0.38;
                handlebarGroup.add(gripR);

                // Hastes e espelhos retrovisores ovais realistas
                const mirrorStalkL = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.25, 8), matChrome);
                mirrorStalkL.position.set(-0.3, 0.12, 0);
                mirrorStalkL.rotation.z = -0.3;
                handlebarGroup.add(mirrorStalkL);

                const mirrorGlassL = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.08, 0.03), matChrome);
                mirrorGlassL.position.set(-0.34, 0.24, 0);
                handlebarGroup.add(mirrorGlassL);

                const mirrorStalkR = mirrorStalkL.clone();
                mirrorStalkR.position.x = 0.3;
                mirrorStalkR.rotation.z = 0.3;
                handlebarGroup.add(mirrorStalkR);

                const mirrorGlassR = mirrorGlassL.clone();
                mirrorGlassR.position.x = 0.34;
                handlebarGroup.add(mirrorGlassR);

                handlebarGroup.position.set(0, heightOffset, widthOffset);
                handlebarGroup.rotation.x = angleX;
                bikeGroup.add(handlebarGroup);
            };

            // Lanterna de travão traseira vermelha (comum a todas)
            const tailLight = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.08, 0.06), matRedNeon);
            tailLight.position.set(0, 0.95, -0.92);
            bikeGroup.add(tailLight);

            if (type === 0) {
                // SUPER DESPORTIVA
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.75, 1.8), matPaint);
                body.position.y = 0.75;
                bikeGroup.add(body);

                // Bico aerodinâmico afunilado
                const front = new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.85, 4), matPaint);
                front.rotation.x = Math.PI / 2.3;
                front.position.set(0, 0.95, 0.75);
                bikeGroup.add(front);

                // Lentes duplas dos faróis dianteiros integradas
                const headlightL = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.1, 12), matGlass);
                headlightL.rotation.x = Math.PI / 2;
                headlightL.position.set(-0.12, 0.9, 1.12);
                bikeGroup.add(headlightL);

                const headlightR = headlightL.clone();
                headlightR.position.x = 0.12;
                bikeGroup.add(headlightR);

                // Rabeta desportiva empinada
                const tail = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.35, 0.75), matPaint);
                tail.position.set(0, 1.08, -0.72);
                tail.rotation.x = -Math.PI / 15;
                bikeGroup.add(tail);

                // Bolha/Vidro de proteção aerodinâmica
                const windShield = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.25, 0.45), matGlass);
                windShield.position.set(0, 1.25, 0.58);
                bikeGroup.add(windShield);

                // Assento antiderrapante desportivo
                const seat = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.08, 0.52), matLeather);
                seat.position.set(0, 0.96, -0.12);
                bikeGroup.add(seat);

                // Rodas desportivas aro 17 com discos
                const wheelF = createRealisticWheel(0.42, 0.32);
                wheelF.position.set(0, 0.42, 0.82);
                bikeGroup.add(wheelF);

                const wheelB = createRealisticWheel(0.42, 0.38);
                wheelB.position.set(0, 0.42, -0.82);
                bikeGroup.add(wheelB);

                // Escapamento Akrapovic de Carbono/Metal com ponteira dupla
                const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.78, 8), matChrome);
                pipe.rotation.x = Math.PI / 4.5;
                pipe.position.set(0.28, 0.55, -0.72);
                bikeGroup.add(pipe);

                // Adicionar Guiador Desportivo com espelhos
                addHandlebarsAndMirrors(1.15, 0.45, 0);

            } else if (type === 1) {
                // MODELO 1: CRUISER CUSTOM (Chopper)
                const tank = new THREE.Mesh(new THREE.SphereGeometry(0.38, 16, 16), matPaint);
                tank.scale.set(1.15, 1.0, 1.6);
                tank.position.set(0, 0.95, 0.1);
                bikeGroup.add(tank);

                // Assento de pele ultra-baixo e anatómico
                const seat = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.18, 0.68), matLeather);
                seat.position.set(0, 0.72, -0.48);
                bikeGroup.add(seat);

                // Garfos frontais cromados estendidos de longo alcance
                const forkL = new THREE.Mesh(new THREE.CylinderGeometry(0.045, 0.045, 1.5, 8), matChrome);
                forkL.rotation.x = Math.PI / 5.2;
                forkL.position.set(-0.16, 0.9, 0.76);
                bikeGroup.add(forkL);

                const forkR = forkL.clone();
                forkR.position.x = 0.16;
                bikeGroup.add(forkR);

                // Farol redondo cromado frontal proeminente
                const bigHeadlamp = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.22, 12), matGlass);
                bigHeadlamp.rotation.x = Math.PI / 2;
                bigHeadlamp.position.set(0, 1.05, 0.92);
                bikeGroup.add(bigHeadlamp);

                // Guiador alto cromado "Ape Hanger"
                addHandlebarsAndMirrors(1.36, 0.42, Math.PI / 15);

                // Bloco do Motor V-Twin altamente detalhado com aletas de refrigeração cromadas
                const engineBlock = new THREE.Group();
                const crankcase = new THREE.Mesh(new THREE.BoxGeometry(0.32, 0.42, 0.45), matEngineMetal);
                engineBlock.add(crankcase);

                // Dois cilindros em V inclinados
                const cyl1 = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.35, 10), matEngineMetal);
                cyl1.rotation.z = -0.35;
                cyl1.position.set(-0.08, 0.22, 0);
                engineBlock.add(cyl1);

                const cyl2 = cyl1.clone();
                cyl2.rotation.z = 0.35;
                cyl2.position.set(0.08, 0.22, 0);
                engineBlock.add(cyl2);

                engineBlock.position.set(0, 0.52, 0);
                bikeGroup.add(engineBlock);

                // Escapamento duplo longo cromado arrastando nas laterais
                const pipe1 = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.3, 8), matChrome);
                pipe1.rotation.x = Math.PI / 2;
                pipe1.position.set(0.26, 0.35, -0.6);
                bikeGroup.add(pipe1);

                const pipe2 = pipe1.clone();
                pipe2.position.set(0.26, 0.24, -0.5);
                bikeGroup.add(pipe2);

                // Rodas clássicas com travões
                const wheelF = createRealisticWheel(0.48, 0.18);
                wheelF.position.set(0, 0.48, 1.22);
                bikeGroup.add(wheelF);

                const wheelB = createRealisticWheel(0.38, 0.45);
                wheelB.position.set(0, 0.38, -0.92);
                bikeGroup.add(wheelB);

            } else if (type === 2) {
                // MODELO 2: ROADSTER NAKED
                const frameMat = new THREE.MeshPhongMaterial({ color: 0xd32f2f, specular: 0xffffff, shininess: 85 });
                
                // Depósito robusto e musculado com cavas de joelho
                const tank = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.52, 0.88), matPaint);
                tank.position.set(0, 0.95, 0.15);
                bikeGroup.add(tank);

                // Quadro em treliça tubular visível nas duas laterais
                const frameLeft = new THREE.Mesh(new THREE.TorusGeometry(0.32, 0.045, 8, 16), frameMat);
                frameLeft.position.set(-0.15, 0.72, -0.15);
                bikeGroup.add(frameLeft);

                const frameRight = frameLeft.clone();

                highBeak.rotation.x = Math.PI / 2;
                highBeak.position.set(0, 1.15, 0.82);

            // Aplicar sombra a todos os componentes
            bikeGroup.traverse(child => {

                    child.receiveShadow = true;
                }
            });

            return bikeGroup;
        }

        // --- INICIALIZAÇÃO DOS CONTEXTOS WEBGL INDEPENDENTES ---
        function initEngine() {
            const canvasGame = document.getElementById('gameCanvas');
            const canvasPreview = document.getElementById('previewCanvas');

            const width = window.innerWidth || 375;
            const height = window.innerHeight || 667;

            // 1. JOGO PRINCIPAL
            mainRenderer = new THREE.WebGLRenderer({ canvas: canvasGame, antialias: true, alpha: false });
            mainRenderer.setSize(width, height);
            mainRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
            mainRenderer.shadowMap.enabled = true;

            mainScene = new THREE.Scene();
            mainScene.background = new THREE.Color(0x04050a);
            mainScene.fog = new THREE.FogExp2(0x04050a, 0.01);

            mainCamera = new THREE.PerspectiveCamera(55, width / height, 0.1, 1000);
            adjustCameraFOV();
            mainCamera.position.set(2.8, 2.0, 5.0);
            mainCamera.lookAt(0, 0.7, 0);

            // Iluminação do Jogo
            const ambient = new THREE.AmbientLight(0x0f111a, 1.6);
            mainScene.add(ambient);

            const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.5);
            sunLight.position.set(30, 50, 15);
            sunLight.castShadow = true;
            mainScene.add(sunLight);

            const sideLight = new THREE.DirectionalLight(0x1e88e5, 1.4);
            sideLight.position.set(-20, 10, -5);
            mainScene.add(sideLight);

            buildRealisticHighway();

            for(let z = -250; z < 50; z += 12) {
                spawnCityBlock(z);
            }

            // 2. PREVIEW CIRCULAR DO MENU (FUNDO PRETO ABSOLUTO)
            previewRenderer = new THREE.WebGLRenderer({ canvas: canvasPreview, antialias: true, alpha: false });
            previewRenderer.setSize(160, 160);
            previewRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

            previewScene = new THREE.Scene();
            previewScene.background = new THREE.Color(0x000000); // Preto Absoluto

            previewCamera = new THREE.PerspectiveCamera(38, 1, 0.1, 10);
            previewCamera.position.set(2.4, 1.5, 3.1);
            previewCamera.lookAt(0, 0.6, 0);

            const previewLight1 = new THREE.DirectionalLight(0xffffff, 2.5);
            previewLight1.position.set(5, 5, 5);
            previewScene.add(previewLight1);

            const previewLight2 = new THREE.DirectionalLight(0x1e88e5, 1.8);
            previewLight2.position.set(-5, 2, -2);
            previewScene.add(previewLight2);

            // Luz suave focando a mota por baixo no preview
            const previewUnderLight = new THREE.PointLight(0xffffff, 1.2, 5);
            previewUnderLight.position.set(0, -0.5, 0);
            previewScene.add(previewUnderLight);

            updateActiveBikes();

            // Configurar botões de navegação
            document.getElementById('btn-prev').addEventListener('click', (e) => prevMoto(e));
            document.getElementById('btn-next').addEventListener('click', (e) => nextMoto(e));

            animate();
        }

        function adjustCameraFOV() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            if (width < height) {
                mainCamera.fov = 72;
            } else {
                mainCamera.fov = 52;
            }
            mainCamera.updateProjectionMatrix();
        }

        function buildRealisticHighway() {
            const roadGeo = new THREE.PlaneGeometry(16, 2000);
            
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#1a1c22';
            ctx.fillRect(0, 0, 256, 1024);
            
            for (let i = 0; i < 6000; i++) {
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.05})`;
                ctx.fillRect(Math.random() * 256, Math.random() * 1024, 1.5, 1.5);
            }

            ctx.fillStyle = '#ffb300';
            ctx.fillRect(124, 0, 3, 1024);
            ctx.fillRect(129, 0, 3, 1024);

            ctx.fillStyle = '#ffffff';
            for (let y = 0; y < 1024; y += 80) {
                ctx.fillRect(64, y, 4, 40);
                ctx.fillRect(192, y, 4, 40);
            }

            ctx.fillRect(8, 0, 5, 1024);
            ctx.fillRect(243, 0, 5, 1024);

            const roadTex = new THREE.CanvasTexture(canvas);
            roadTex.wrapS = THREE.RepeatWrapping;
            roadTex.wrapT = THREE.RepeatWrapping;
            roadTex.repeat.set(1, 45);

            const roadMat = new THREE.MeshPhongMaterial({
                map: roadTex,
                roughness: 0.88,
                metalness: 0.12
            });

            road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            mainScene.add(road);

            const barrierGeo = new THREE.BoxGeometry(0.6, 1.1, 2000);
            const barrierMat = new THREE.MeshLambertMaterial({ color: 0x333338 });
            
            const guardL = new THREE.Mesh(barrierGeo, barrierMat);
            guardL.position.set(-8.3, 0.55, 0);
            mainScene.add(guardL);

            const guardR = guardL.clone();
            guardR.position.x = 8.3;
            mainScene.add(guardR);
        }

        function spawnCityBlock(zPos) {
            const sides = [-1, 1];
            
            sides.forEach(side => {
                const distance = 14 + Math.random() * 8;
                const xPos = side * distance;

                const w = 7 + Math.random() * 8;
                const h = 25 + Math.random() * 45;
                const d = 7 + Math.random() * 8;

                const geo = new THREE.BoxGeometry(w, h, d);

                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 256;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#11131a';
                ctx.fillRect(0, 0, 128, 256);

                for (let y = 10; y < 256; y += 18) {
                    for (let x = 8; x < 128; x += 16) {
                        const randomLight = Math.random();
                        if (randomLight < 0.35) {
                            ctx.fillStyle = '#fff9c4';
                        } else if (randomLight < 0.55) {
                            ctx.fillStyle = '#b3e5fc';
                        } else {
                            ctx.fillStyle = '#06080e';
                        }
                        ctx.fillRect(x, y, 9, 11);
                    }
                }

                const tex = new THREE.CanvasTexture(canvas);
                tex.wrapS = THREE.RepeatWrapping;
                tex.wrapT = THREE.RepeatWrapping;

                const mat = new THREE.MeshLambertMaterial({
                    map: tex
                });

                const building = new THREE.Mesh(geo, mat);
                building.position.set(xPos, h / 2, zPos);
                mainScene.add(building);
                cityBuildings.push(building);
            });

            if (Math.random() < 0.35) {
                const post = new THREE.Group();
                const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.12, 6, 8), matChrome);
                pole.position.y = 3;
                post.add(pole);

                const arm = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.1, 0.1), matChrome);
                arm.position.set(0.6 * (Math.random() > 0.5 ? 1 : -1), 6, 0);
                post.add(arm);

                post.position.set(Math.random() > 0.5 ? -8.1 : 8.1, 0, zPos);
                mainScene.add(post);
                cityBuildings.push(post);
            }
        }

        // --- ATUALIZAÇÃO DA SELEÇÃO DE MOTAS ---
        function updateActiveBikes() {
            const currentType = MOTOS_DATABASE[activeMotoIndex].type;

            if (mainBike) mainScene.remove(mainBike);
            if (previewBike) previewScene.remove(previewBike);

            mainBike = buildDetailedMotorcycle(currentType, motoColor);
            mainScene.add(mainBike);

            // Mota no Showroom começa com rotação zero para girar no loop
            mainBike.position.set(0, 0, 0);
            mainBike.rotation.set(0, 0, 0);

            previewBike = buildDetailedMotorcycle(currentType, motoColor);
            previewScene.add(previewBike);

            previewBike.position.set(0, 0.15, 0);
            previewBike.rotation.set(0, 0, 0);

            document.getElementById('moto-name').innerText = MOTOS_DATABASE[activeMotoIndex].name;
            document.getElementById('moto-desc').innerText = MOTOS_DATABASE[activeMotoIndex].desc;
        }

        function nextMoto(event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            activeMotoIndex = (activeMotoIndex + 1) % MOTOS_DATABASE.length;
            updateActiveBikes();
            initAudio();
            playSlipSound();
        }

        function prevMoto(event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            activeMotoIndex = (activeMotoIndex - 1 + MOTOS_DATABASE.length) % MOTOS_DATABASE.length;
            updateActiveBikes();
            initAudio();
            playSlipSound();
        }

        function changeMotoColor(hexColor, btnEl, event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            motoColor = hexColor;

            const parent = btnEl.parentElement.children;
            for (let el of parent) {
                el.style.borderColor = 'transparent';
                el.style.transform = 'scale(1.0)';
            }
            btnEl.style.borderColor = '#ffffff';
            btnEl.style.transform = 'scale(1.1)';

            updateActiveBikes();
            initAudio();
        }

        // --- TRÁFEGO REALISTA ---
        function createTrafficObstacle() {
            const lane = Math.floor(Math.random() * 3) - 1;
            const randomVal = Math.random();
            const obstacleGroup = new THREE.Group();
            let obsType = "";

            if (randomVal < 0.55) {
                obsType = "car";
                const carColor = new THREE.Color().setHSL(Math.random(), 0.7, 0.4);
                const matCarPaint = new THREE.MeshPhongMaterial({ color: carColor, specular: 0xffffff, shininess: 70 });

                const chassis = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 3.8), matCarPaint);
                chassis.position.y = 0.45;
                obstacleGroup.add(chassis);

                const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.55, 0.55, 2.0), new THREE.MeshLambertMaterial({ color: 0x0a0a0f }));
                cabin.position.set(0, 1.0, -0.15);
                obstacleGroup.add(cabin);

                const lightGeo = new THREE.BoxGeometry(0.3, 0.12, 0.1);
                const l1 = new THREE.Mesh(lightGeo, new THREE.MeshBasicMaterial({ color: 0xfff9c4 }));
                l1.position.set(-0.7, 0.5, 1.91);
                obstacleGroup.add(l1);

                const l2 = l1.clone();
                l2.position.x = 0.7;
                obstacleGroup.add(l2);

                const tireGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.25, 16);
                const r1 = new THREE.Mesh(tireGeo, matRubber);
                r1.rotation.z = Math.PI / 2;
                r1.position.set(-0.92, 0.35, 1.1);
                obstacleGroup.add(r1);

                const r2 = r1.clone(); r2.position.x = 0.92; obstacleGroup.add(r2);
                const r3 = r1.clone(); r3.position.z = -1.1; obstacleGroup.add(r3);
                const r4 = r3.clone(); r4.position.x = 0.92; obstacleGroup.add(r4);

            } else if (randomVal < 0.8) {
                obsType = "cone";

                const base = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.08, 0.95), new THREE.MeshLambertMaterial({ color: 0x111111 }));
                base.position.y = 0.04;
                obstacleGroup.add(base);

                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.38, 1.6, 12), new THREE.MeshLambertMaterial({ color: 0xe65100 }));
                body.position.y = 0.85;
                obstacleGroup.add(body);

                const stripe = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.28, 0.45, 12), new THREE.MeshLambertMaterial({ color: 0xffffff }));
                stripe.position.y = 0.95;
                obstacleGroup.add(stripe);

            } else {
                obsType = "banana";
                const peelCore = new THREE.Mesh(new THREE.BoxGeometry(0.75, 0.04, 0.24), matYellow);
                peelCore.rotation.y = Math.PI / 4;
                obstacleGroup.add(peelCore);

                for (let i = 0; i < 3; i++) {
                    const petal = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.03, 0.16), matYellow);
                    petal.position.x = Math.sin((i * Math.PI * 2) / 3) * 0.38;
                    petal.position.z = Math.cos((i * Math.PI * 2) / 3) * 0.38;
                    petal.rotation.y = (i * Math.PI * 2) / 3;
                    obstacleGroup.add(petal);
                }
                obstacleGroup.position.y = 0.02;
            }

            obstacleGroup.position.set(lane * laneWidth, 0, -210);
            obstacleGroup.userData = { type: obsType, hit: false };

            mainScene.add(obstacleGroup);
            obstacles.push(obstacleGroup);
        }

        // --- CICLO DE JOGO, CONTROLOS E CORRIDA ---
        function startGame(event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            initAudio();

            document.getElementById('menu-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('menu-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                
                showroomActive = false;
                gameActive = true;
                
                // Força rotação Y em 180º (Math.PI) para virar a mota de costas para a câmara do jogador
                if (mainBike) {
                    mainBike.rotation.set(0, Math.PI, 0);
                }
                
                mainCamera.position.set(0, 3.2, 7.0);
                mainCamera.lookAt(0, 1.2, 0);
            }, 500);
        }

        function moveLane(dir) {
            if (!gameActive || spinTimer > 0) return;
            targetLane = Math.max(-1, Math.min(1, targetLane + dir));
            playSlipSound();
        }

        function handleKeyboard(e) {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                moveLane(-1);
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                moveLane(1);
            }
        }

        // Loop Unificado Estável e Otimizado
        function animate() {
            requestAnimationFrame(animate);
            gameTime += 0.01;

            try {
                // RENDERIZAR JOGO PRINCIPAL
                if (mainRenderer && mainScene && mainCamera) {
                    if (showroomActive) {
                        if (mainBike) {
                            mainBike.rotation.y = gameTime * 0.4;
                            mainBike.position.y = Math.sin(gameTime * 2) * 0.04;
                        }
                    }

                    if (gameActive) {
                        score += speed * 0.5;
                        document.getElementById('score-val').innerText = Math.floor(score) + " m";
                        
                        const speedKmh = Math.floor(speed * 290);
                        document.getElementById('speed-val').innerText = speedKmh + " km/h";

                        playEngineSound(speed);

                        if (spinTimer > 0) {
                            spinTimer--;
                            if (mainBike) {
                                mainBike.rotation.y += 0.42;
                                mainBike.position.x += Math.sin(spinTimer * 0.5) * 0.12;
                            }
                            if (spinTimer === 0) {
                                // Reseta para Math.PI (180 graus de costas para o jogador)
                                if (mainBike) mainBike.rotation.y = Math.PI;
                                document.getElementById('slip-alert').style.transform = 'scale(0)';
                            }
                        } else {
                            if (mainBike) {
                                mainBike.position.x += (targetLane * laneWidth - mainBike.position.x) * 0.16;
                                const lean = (mainBike.position.x - targetLane * laneWidth) * 0.14;
                                mainBike.rotation.z = lean;
                                // Mantém a orientação básica da mota em 180º (Math.PI) e adiciona a inclinação curva
                                mainBike.rotation.y = Math.PI - lean * 0.4;
                            }
                        }

                        if (mainBike) {
                            mainBike.position.y = Math.sin(gameTime * 20) * 0.02;
                            mainCamera.position.x += (mainBike.position.x * 0.85 - mainCamera.position.x) * 0.1;
                            mainCamera.lookAt(mainBike.position.x * 0.6, 1.2, 0);
                        }

                        if (road && road.material && road.material.map) {
                            road.material.map.offset.y -= speed * 0.065;
                        }

                        for (let i = cityBuildings.length - 1; i >= 0; i--) {
                            const block = cityBuildings[i];
                            block.position.z += speed;
                            if (block.position.z > 20) {
                                block.position.z = -230;
                            }
                        }

                        const spawnChance = Math.max(0.015, 0.03 - speed * 0.005);
                        if (Math.random() < spawnChance && (obstacles.length === 0 || obstacles[obstacles.length - 1].position.z > -55)) {
                            createTrafficObstacle();
                        }

                        for (let i = obstacles.length - 1; i >= 0; i--) {
                            const obs = obstacles[i];
                            obs.position.z += (obs.userData.type === "car") ? speed * 1.5 : speed;

                            if (mainBike) {
                                const bikeBox = new THREE.Box3().setFromObject(mainBike);
                                const obsBox = new THREE.Box3().setFromObject(obs);
                                bikeBox.expandByScalar(-0.16);

                                if (bikeBox.intersectsBox(obsBox) && !obs.userData.hit) {
                                    obs.userData.hit = true;
                                    if (obs.userData.type === "banana") {
                                        spinTimer = 45;
                                        speed = Math.max(0.4, speed - 0.2);
                                        playSlipSound();
                                        document.getElementById('slip-alert').style.transform = 'scale(1)';
                                        mainScene.remove(obs);
                                        obstacles.splice(i, 1);
                                        continue;
                                    } else {
                                        triggerCrash();
                                    }
                                }
                            }

                            if (obs.position.z > 20) {
                                mainScene.remove(obs);
                                obstacles.splice(i, 1);
                            }
                        }

                        speed += 0.00015;
                    }

                    mainRenderer.render(mainScene, mainCamera);
                }

                // RENDERIZAR PREVIEW ISOLADO DO MENU
                if (showroomActive && previewRenderer && previewScene && previewCamera) {
                    if (previewBike) {
                        previewBike.rotation.y = gameTime * 1.3; // Gira a mota suavemente no menu circular
                        previewBike.position.y = Math.sin(gameTime * 2.5) * 0.04 + 0.01;
                    }
                    previewRenderer.render(previewScene, previewCamera);
                }

            } catch (err) {
                console.warn("Recuperação de frame silenciosa: ", err);
            }
        }

        function triggerCrash() {
            gameActive = false;
            stopEngineSound();
            playCrashSound();

            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('final-stats').innerText = `${Math.floor(score)} m`;
        }

        function resetGame(event) {
            if (event) {
                event.stopPropagation();
                event.preventDefault();
            }
            obstacles.forEach(o => mainScene.remove(o));
            obstacles = [];

            score = 0;
            speed = 0.5;
            targetLane = 0;
            if (mainBike) {
                mainBike.position.set(0, 0, 0);
                mainBike.rotation.set(0, 0, 0); // Volta ao Showroom livre
            }

            document.getElementById('game-over-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
            document.getElementById('menu-screen').style.opacity = '1';

            showroomActive = true;
            mainCamera.position.set(2.8, 2.0, 5.0);
            mainCamera.lookAt(0, 0.7, 0);
        }

        function onWindowResize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            adjustCameraFOV();
            mainCamera.aspect = width / height;
            mainCamera.updateProjectionMatrix();
            mainRenderer.setSize(width, height);
        }

        window.addEventListener('load', () => {
            initEngine();
        });

        if (document.readyState === 'complete') {
            initEngine();
        }
    </script>
</body>
</html>
