<!DOCTYPE html>
<html lang='pt-br'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Dino Run - Arcade Supremo</title>
    <link rel='stylesheet' href='../assets/style.css'>
    <style>
        body { background: #000; margin: 0; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; }
        canvas { display: block; width: 100%; height: 100%; }
        .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px 20px;
            background: rgba(0, 242, 255, 0.2);
            color: #00f2ff;
            border: 1px solid #00f2ff;
            border-radius: 5px;
            cursor: pointer;
            z-index: 1000;
            font-family: 'Orbitron', sans-serif;
            text-decoration: none;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <a href='../index.html' class='back-btn'>⬅ VOLTAR</a>
    <div id='game-container'>
        <canvas id='gameCanvas'></canvas>
    </div>
    <script src='../scripts/core.js'></script>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let W = window.innerWidth;
        let H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;

        // Mock de funções globais necessárias
        window.gameActive = true;
        window.score = 0;
        window.rafId = null;
        
        function gDino(){showCtrl('PULAR','',false);document.getElementById('abA').textContent='⬆';document.getElementById('abA').style.fontSize='1.4rem';const GND=H-65,DX=W*.15,DW=50,DH=58;let dy=GND,dvy=0,onG=true,obs=[],spd=5,dist=0,fr=0,night=false,oT=80;const jump=()=>{if(onG){dvy=-17;onG=false;}};canvas.addEventListener('pointerdown',jump);document.getElementById('abA').addEventListener('pointerdown',e=>{e.preventDefault();jump();},{passive:false});function loop(){rafId=requestAnimationFrame(loop);if(!gameActive)return;fr++;dist+=spd*.012;spd=Math.min(16,5+dist*.014);setScore(Math.floor(dist));night=Math.floor(dist/80)%2===1;if(TAP.a||TAP.up)jump();const duck=K.dn;clrT();ctx.fillStyle=night?'#090912':'#f2f2f2';ctx.fillRect(0,0,W,H);if(night)for(let i=0;i<60;i++){ctx.fillStyle='rgba(255,255,255,.6)';ctx.fillRect((i*71+fr*.2)%W,(i*43)%(GND*.65),i%3===0?2:1,i%3===0?2:1);}ctx.shadowBlur=night?14:26;ctx.shadowColor=night?'#aaccff':'#ffdd44';ctx.fillStyle=night?'#ddeeff':'#ffe600';ctx.beginPath();ctx.arc(W*.9,H*.1,night?17:23,0,7);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle=night?'#1a1a28':'#d4d4d4';ctx.fillRect(0,GND,W,4);ctx.fillStyle=night?'#0c0c18':'#b2b2b2';ctx.fillRect(0,GND+4,W,H-GND);for(let x=(fr*spd*.6)%62;x<W;x+=62){ctx.fillStyle='rgba(0,0,0,.05)';ctx.fillRect(x,GND+5,32,H-GND);}for(let i=0;i<6;i++){const px=((i*157+fr*spd*.5)%W);ctx.fillStyle='rgba(0,0,0,.12)';ctx.fillRect(px,GND+4,3+i%3,2);}dvy+=.9;dy=Math.min(dy+dvy,GND);if(dy>=GND){dy=GND;dvy=0;onG=true;}const dh=duck?DH*.5:DH,dCol=night?'#88ccff':'#555';ctx.fillStyle='rgba(0,0,0,.15)';ctx.beginPath();ctx.ellipse(DX+DW*.4,GND+3,DW*.45,5,0,0,7);ctx.fill();ctx.fillStyle=dCol;ctx.beginPath();ctx.roundRect(DX,dy-dh,DW*.88,dh*.64,6);ctx.fill();ctx.beginPath();ctx.roundRect(DX+DW*.36,dy-dh*1.3,DW*.62,dh*.38,6);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(DX+DW*.78,dy-dh*1.22,6,0,7);ctx.fill();ctx.fillStyle='#111';ctx.beginPath();ctx.arc(DX+DW*.8,dy-dh*1.21,3,0,7);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(DX+DW*.81,dy-dh*1.23,1.4,0,7);ctx.fill();ctx.strokeStyle=night?'#66aaff':'#333';ctx.lineWidth=2;ctx.beginPath();ctx.arc(DX+DW*.68,dy-dh*.95,DW*.14,.1,.9);ctx.stroke();if(!duck){const la=onG?Math.sin(fr*.22)*9:0;ctx.fillStyle=dCol;ctx.fillRect(DX+DW*.1,dy-dh*.2+la,11,dh*.22-Math.max(0,la));ctx.fillRect(DX+DW*.4,dy-dh*.2-la,11,dh*.22+Math.min(0,-la));}if(!duck)for(let i=0;i<3;i++){ctx.fillStyle=night?'#66aaee':'#333';ctx.beginPath();ctx.moveTo(DX+DW*(.12+i*.22),dy-dh);ctx.lineTo(DX+DW*(.05+i*.22),dy-dh-8-i*3);ctx.lineTo(DX+DW*(.19+i*.22),dy-dh-5-i*2);ctx.fill();}ctx.beginPath();ctx.moveTo(DX,dy-dh*.72);ctx.quadraticCurveTo(DX-DW*.52,dy-dh*.42,DX-DW*.1,dy-dh*.15);ctx.lineWidth=9;ctx.strokeStyle=dCol;ctx.stroke();oT-=spd*.14;if(oT<=0){oT=rnd(50,88);if(Math.random()<.38&&dist>30)obs.push({x:W+20,t:'bird',y:GND-rnd(80,120),w:38,h:26,fr:0,ft:0});else{const n=rndI(1,3);obs.push({x:W+20,t:'cact',n,w:12+n*11,h:rnd(42,68)});}}obs=obs.filter(o=>{o.x-=spd;if(o.t==='cact'){ctx.fillStyle=night?'#33aa44':'#2a6820';for(let i=0;i<o.n;i++){ctx.fillRect(o.x+i*12,GND-(o.h+(i===1?14:0)),12,o.h+(i===1?14:0));if(i===0)ctx.fillRect(o.x-8,GND-o.h*.55,10,12);if(i===o.n-1)ctx.fillRect(o.x+o.n*12,GND-o.h*.55,10,12);}if(DX+DW*.88>o.x+4&&DX+8<o.x+o.w-4&&dy-dh*1.05<GND-o.h+o.h&&dy>GND-o.h){goOver();return false;}}else{o.ft++;if(o.ft>10){o.fr=1-o.fr;o.ft=0;}ctx.font='30px sans-serif';ctx.textAlign='center';ctx.fillText(o.fr?'🦅':'🕊️',o.x+19,o.y+12);if(DX+DW*.88>o.x+5&&DX+8<o.x+o.w-5&&dy-dh*1.05<o.y+o.h&&dy-dh*.55>o.y){goOver();return false;}}return o.x>-80;});setHUD(`🦕 ${Math.floor(dist)}m ${night?'🌙':'☀️'}`);}requestAnimationFrame(loop);}

        // Iniciar o jogo
        gDino();
    </script>
</body>
</html>
