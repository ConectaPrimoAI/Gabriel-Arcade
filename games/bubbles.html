
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Show de Balões 🎈</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Bangers&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #121212;
    --console-body: #333333;
    --screen-border: #1a1a1a;
    --curtain: #b30000;
}

* {
    margin: 0; padding: 0; box-sizing: border-box;
    -webkit-tap-highlight-color: transparent; user-select: none;
}

body {
    height: 100dvh; width: 100vw; overflow: hidden;
    background: var(--bg); font-family: 'Fredoka', sans-serif;
    display: flex; align-items: center; justify-content: center;
}

/* --- CONSOLE CINZA TRADICIONAL --- */
#console-case {
    width: 95vw; max-width: 420px; height: 90dvh;
    background: var(--console-body); border-radius: 40px;
    border: 4px solid #444; box-shadow: 0 30px 60px rgba(0,0,0,0.9);
    display: flex; flex-direction: column; padding: 20px;
}

/* --- TELA --- */
#screen-wrap {
    width: 100%; aspect-ratio: 1.1/1;
    background: #000; border-radius: 10px;
    border: 12px solid var(--screen-border); overflow: hidden; position: relative;
    box-shadow: inset 0 0 20px #000;
}

canvas { width: 100%; height: 100%; display: block; }

/* --- CORTINAS --- */
.curtain {
    position: absolute; top: 0; width: 51%; height: 100%;
    background: var(--curtain); z-index: 15;
    transition: transform 0.7s ease-in-out;
    background-image: repeating-linear-gradient(90deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 15px, transparent 15px, transparent 30px);
}
#curtain-l { left: 0; }
#curtain-r { right: 0; }
.open #curtain-l { transform: translateX(-100%); }
.open #curtain-r { transform: translateX(100%); }

/* --- CONTROLES LADO A LADO --- */
#controls-area {
    flex: 1; display: flex; align-items: center; justify-content: space-between;
    padding: 0 10px;
}

/* D-PAD na Esquerda */
.d-pad {
    display: grid; grid-template-columns: repeat(3, 45px);
    grid-template-rows: repeat(3, 45px);
}
.d-btn {
    background: #222; border: 1px solid #111; color: #666;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; box-shadow: 0 4px 0 #000;
}
.d-up { grid-column: 2; border-radius: 5px 5px 0 0; }
.d-down { grid-column: 2; grid-row: 3; border-radius: 0 0 5px 5px; }
.d-left { grid-row: 2; grid-column: 1; border-radius: 5px 0 0 5px; }
.d-right { grid-row: 2; grid-column: 3; border-radius: 0 5px 5px 0; }
.d-center { grid-row: 2; grid-column: 2; background: #222; border: none; box-shadow: none; }

/* Botão de Estourar na Direita */
#action-area {
    display: flex; align-items: center; justify-content: center;
}
.fire-btn {
    width: 80px; height: 80px; background: #c0392b; border-radius: 50%;
    border: 5px solid #a93226; color: #fff; font-family: 'Bangers';
    font-size: 18px; box-shadow: 0 6px 0 #7b241c; cursor: pointer;
}
.fire-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #7b241c; }
.d-btn.active { background: #444; color: #fff; transform: scale(0.95); }

/* UI */
#overlay {
    position: absolute; inset: 0; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; color: #fff; text-align: center;
}
.start-btn {
    padding: 10px 25px; background: #ffd700; border: none;
    font-family: 'Bangers'; font-size: 1.5rem; border-radius: 5px; cursor: pointer;
}
</style>
</head>
<body>

<div id="console-case">
    <div id="screen-wrap">
        <div id="curtain-l" class="curtain"></div>
        <div id="curtain-r" class="curtain"></div>
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1 id="title" style="font-family: 'Bangers'; font-size: 2.5rem; color: #ffd700; margin-bottom:10px;">TIRO AO ALVO</h1>
            <button id="main-btn" class="start-btn" onclick="initGame()">INICIAR</button>
        </div>
    </div>

    <div id="controls-area">
        <div class="d-pad">
            <div class="d-btn d-up" id="btn-up">▲</div>
            <div class="d-btn d-left" id="btn-left">◀</div>
            <div class="d-btn d-center"></div>
            <div class="d-btn d-right" id="btn-right">▶</div>
            <div class="d-btn d-down" id="btn-down">▼</div>
        </div>

        <div id="action-area">
            <button class="fire-btn" id="btn-fire">ESTOURAR</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const screen = document.getElementById('screen-wrap');
const mainBtn = document.getElementById('main-btn');
const title = document.getElementById('title');

let W, H, running = false, isTransitioning = false;
let score = 0;
let balloons = [], particles = [];
let crosshair = { x: 0, y: 0 };
const input = { up: false, down: false, left: false, right: false };

function resize() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    crosshair.x = W/2;
    crosshair.y = H/2;
}

const bind = (id, key) => {
    const el = document.getElementById(id);
    el.addEventListener('pointerdown', (e) => { e.preventDefault(); input[key] = true; el.classList.add('active'); });
    el.addEventListener('pointerup', () => { input[key] = false; el.classList.remove('active'); });
    el.addEventListener('pointerleave', () => { input[key] = false; el.classList.remove('active'); });
};

bind('btn-up', 'up'); bind('btn-down', 'down');
bind('btn-left', 'left'); bind('btn-right', 'right');

document.getElementById('btn-fire').addEventListener('pointerdown', (e) => {
    e.preventDefault();
    shoot();
});

function spawnRound() {
    balloons = [];
    const colors = ['#ff4757', '#2e97ff', '#ffa502', '#2ed573', '#e056fd', '#feca57'];
    // 6 Balões em duas fileiras de 3
    for(let i=0; i<6; i++) {
        const col = i % 3;
        const row = Math.floor(i / 3);
        balloons.push({
            x: (W/4) * (col + 1),
            y: 80 + (row * 100),
            r: 30,
            color: colors[i],
            active: true
        });
    }
}

function shoot() {
    if(!running || isTransitioning) return;
    let hitSomething = false;
    balloons.forEach(b => {
        if(!b.active) return;
        const dist = Math.hypot(crosshair.x - b.x, crosshair.y - b.y);
        if(dist < b.r + 10) {
            b.active = false;
            score += 10;
            hitSomething = true;
            createExplosion(b.x, b.y, b.color);
        }
    });

    if (balloons.every(b => !b.active)) {
        setTimeout(nextRound, 500);
    }
}

function createExplosion(x, y, color) {
    for(let i=0; i<15; i++) {
        particles.push({
            x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
            life: 1, color
        });
    }
}

function nextRound() {
    if (isTransitioning) return;
    isTransitioning = true;
    screen.classList.remove('open');
    setTimeout(() => {
        spawnRound();
        screen.classList.add('open');
        isTransitioning = false;
    }, 1000);
}

function initGame() {
    score = 0;
    mainBtn.style.display = 'none';
    title.style.display = 'none';
    spawnRound();
    screen.classList.add('open');
    running = true;
}

function update() {
    if(!running || isTransitioning) return;
    const speed = 6;
    if(input.up && crosshair.y > 30) crosshair.y -= speed;
    if(input.down && crosshair.y < H - 30) crosshair.y += speed;
    if(input.left && crosshair.x > 30) crosshair.x -= speed;
    if(input.right && crosshair.x < W - 30) crosshair.x += speed;

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.04;
        if(p.life <= 0) particles.splice(i, 1);
    });
}

function draw() {
    ctx.clearRect(0, 0, W, H);
    
    // Fundo da Tela (Cenário do Jogo)
    ctx.fillStyle = '#222';
    ctx.fillRect(0,0,W,H);
    
    // Tábua/Suporte dos Balões (Normal como você pediu)
    ctx.fillStyle = '#444';
    ctx.fillRect(20, 60, W-40, 10);
    ctx.fillRect(20, 160, W-40, 10);

    if(running) {
        balloons.forEach(b => {
            if(!b.active) return;
            // Balão
            ctx.fillStyle = b.color;
            ctx.beginPath();
            ctx.ellipse(b.x, b.y, b.r*0.9, b.r, 0, 0, Math.PI*2);
            ctx.fill();
            // Brilho
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.ellipse(b.x-10, b.y-10, 5, 10, 0.5, 0, Math.PI*2);
            ctx.fill();
        });

        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, 7); ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Mira
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(crosshair.x, crosshair.y, 20, 0, 7);
        ctx.moveTo(crosshair.x - 30, crosshair.y); ctx.lineTo(crosshair.x + 30, crosshair.y);
        ctx.moveTo(crosshair.x, crosshair.y - 30); ctx.lineTo(crosshair.x, crosshair.y + 30);
        ctx.stroke();
        
        ctx.fillStyle = '#ffd700';
        ctx.font = '20px Bangers';
        ctx.textAlign = 'center';
        ctx.fillText(`PONTOS: ${score}`, W/2, 30);
    }

    update();
    requestAnimationFrame(draw);
}

window.onload = () => { resize(); draw(); };
</script>
</body>
</html>
