
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>O Meu Estúdio de Arte 🎨</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --bg-ui: #F7FFF7;
            --canvas-shadow: rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #FFD93D; /* Fundo amarelo vibrante */
            background-image: radial-gradient(#FF6B6B 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Fredoka', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* Topo com Botões Grandes */
        #header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2D3436;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 4px 0 #FAB1A0;
        }

        .action-btn {
            padding: 10px 15px;
            background: #FF7675;
            color: white;
            border-radius: 15px;
            font-weight: 700;
            border: 3px solid white;
            box-shadow: 0 4px 0 #D63031;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent;
        }

        /* Área do Papel de Desenho */
        #paint-area {
            flex: 1;
            position: relative;
            margin: 0 15px;
            background: white;
            border: 8px solid white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 25px var(--canvas-shadow);
        }

        canvas {
            display: block;
            touch-action: none;
            background: white;
        }

        /* Paleta de Cores e Ferramentas */
        #toolbar {
            background: white;
            margin: 15px;
            padding: 15px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }

        .tool-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #636E72;
            margin-bottom: -5px;
        }

        .tool-row {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow-x: auto;
            padding: 5px 2px;
            scrollbar-width: none;
        }

        .tool-row::-webkit-scrollbar { display: none; }

        .color-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 4px solid #F1F2F6;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .color-btn.active {
            transform: scale(1.2) translateY(-5px);
            border-color: #2D3436;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .brush-btn {
            width: 55px;
            height: 45px;
            background: #F1F2F6;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: none;
            cursor: pointer;
        }

        .brush-btn.active {
            background: #4ECDC4;
            color: white;
        }

        .brush-circle {
            background: currentColor;
            border-radius: 50%;
        }

        /* Efeito de arco-íris para o botão especial */
        .rainbow {
            background: linear-gradient(45deg, #f06, #f90, #ff0, #0f9, #0cf, #c0f, #f06);
            background-size: 400% 400%;
            animation: rainbowFlow 5s linear infinite;
        }
        @keyframes rainbowFlow { 0% {background-position: 0% 50%} 50% {background-position: 100% 50%} 100% {background-position: 0% 50%} }

    </style>
</head>
<body>

<div id="header">
    <div class="logo">O Meu Desenho 🎨</div>
    <button class="action-btn" id="clear-btn">Limpar 🧹</button>
</div>

<div id="paint-area">
    <canvas id="main-canvas"></canvas>
</div>

<div id="toolbar">
    <div class="tool-label">Tamanhos:</div>
    <div class="tool-row" id="size-row">
        <button class="brush-btn" data-size="8"><div class="brush-circle" style="width:8px;height:8px;color:#2D3436"></div></button>
        <button class="brush-btn active" data-size="16"><div class="brush-circle" style="width:16px;height:16px;color:#2D3436"></div></button>
        <button class="brush-btn" data-size="30"><div class="brush-circle" style="width:24px;height:24px;color:#2D3436"></div></button>
        <button class="brush-btn" data-size="55"><div class="brush-circle" style="width:34px;height:34px;color:#2D3436"></div></button>
    </div>
    
    <div class="tool-label">Cores Mágicas:</div>
    <div class="tool-row" id="color-row">
        <!-- Cores inseridas via JS -->
    </div>
</div>

<script>
    'use strict';

    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d', { desynchronized: true });
    
    // Paleta de cores alegre
    const colors = [
        '#FF6B6B', '#FF9F43', '#FFE66D', '#1DD1A1', 
        '#48DBFB', '#54A0FF', '#5F27CD', '#FF9FF3', 
        '#2D3436', '#FFFFFF'
    ];
    
    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let brushColor = colors[0];
    let brushSize = 16;

    // Configurar Cores
    const colorRow = document.getElementById('color-row');
    colors.forEach((col, i) => {
        const btn = document.createElement('div');
        btn.className = `color-btn ${i === 0 ? 'active' : ''}`;
        btn.style.backgroundColor = col;
        if(col === '#FFFFFF') btn.innerHTML = "🧽"; // Borracha
        btn.style.display = 'flex';
        btn.style.alignItems = 'center';
        btn.style.justifyContent = 'center';
        btn.style.fontSize = '20px';

        btn.onclick = () => {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            brushColor = col;
        };
        colorRow.appendChild(btn);
    });

    // Configurar Tamanhos
    document.querySelectorAll('.brush-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.brush-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            brushSize = parseInt(btn.dataset.size);
        };
    });

    // Função de desenho corrigida para compatibilidade total
    function drawCircle(x, y) {
        ctx.fillStyle = brushColor;
        ctx.beginPath();
        ctx.arc(x, y, brushSize / 2, 0, Math.PI * 2);
        ctx.fill();
    }

    function resize() {
        const parent = canvas.parentElement;
        const dpr = window.devicePixelRatio || 1;
        
        // Guardar o desenho antes de redimensionar
        const tempData = canvas.toDataURL();

        canvas.width = parent.clientWidth * dpr;
        canvas.height = parent.clientHeight * dpr;
        canvas.style.width = parent.clientWidth + 'px';
        canvas.style.height = parent.clientHeight + 'px';
        
        ctx.scale(dpr, dpr);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Fundo branco inicial
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, parent.clientWidth, parent.clientHeight);

        // Restaurar o desenho
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0, parent.clientWidth, parent.clientHeight);
        img.src = tempData;
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function startDrawing(e) {
        isDrawing = true;
        const pos = getPos(e);
        lastX = pos.x;
        lastY = pos.y;
        drawCircle(pos.x, pos.y);
    }

    function draw(e) {
        if (!isDrawing) return;
        if (e.cancelable) e.preventDefault();

        const pos = getPos(e);

        ctx.beginPath();
        ctx.strokeStyle = brushColor;
        ctx.lineWidth = brushSize;
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();

        lastX = pos.x;
        lastY = pos.y;
    }

    function stopDrawing() {
        isDrawing = false;
    }

    // Eventos
    canvas.addEventListener('mousedown', startDrawing);
    window.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDrawing);

    canvas.addEventListener('touchstart', startDrawing, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    window.addEventListener('touchend', stopDrawing);

    // Limpar
    document.getElementById('clear-btn').onclick = () => {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    };

    window.onload = () => {
        resize();
        window.addEventListener('resize', resize);
    };

</script>
</body>
</html>
