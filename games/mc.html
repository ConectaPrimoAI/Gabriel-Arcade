<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Web Interface</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-ia" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Minecraft', sans-serif;
            overflow: hidden;
        }

        /* Fundo com o site e efeito Blur */
        .background-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            filter: blur(10px) brightness(0.3); /* Blur mais intenso no início */
            transition: filter 0.6s ease;
        }

        /* Tela de Início */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
        }

        .logo {
            width: 90%;
            max-width: 500px;
            margin-bottom: 40px;
            /* Filtro para garantir que a logo apareça bem se o link falhar */
            drop-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Botão Estilo Minecraft */
        .mc-button {
            background-color: #484848;
            border: 4px solid #000;
            box-shadow: inset -4px -4px #212121, inset 4px 4px #8b8b8b;
            color: #E0E0E0;
            padding: 16px 40px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            text-shadow: 2px 2px #000;
            transition: all 0.1s;
            text-transform: uppercase;
        }

        .mc-button:hover {
            background-color: #5a8eaf;
            color: #fff;
            box-shadow: inset -4px -4px #2e4a5d, inset 4px 4px #a0d4f5;
        }

        /* Esconde a UI quando estiver em tela cheia */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="background-container" id="container">
        <iframe 
            id="gameFrame"
            src="https://minecraftclone.on.websim.com/?v=1" 
            allow="fullscreen; autoplay; pointer-lock">
        </iframe>
    </div>

    <div class="overlay" id="uiOverlay">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Minecraft_logo.png" 
             alt="Minecraft Logo" 
             class="logo"
             onerror="this.src='https://minecraft.net/static/theme/img/minecraft-logo.png'">
        
        <button class="mc-button" onclick="launchGame()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
            </svg>
            Entrar no Mundo
        </button>
    </div>

    <script>
        const container = document.getElementById('container');
        const overlay = document.getElementById('uiOverlay');
        const frame = document.getElementById('gameFrame');

        function launchGame() {
            // Tenta entrar em tela cheia
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            }

            // Tenta travar a tela na horizontal (mobile)
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(() => {});
            }

            overlay.classList.add('hidden');
            frame.style.filter = 'blur(0) brightness(1)';
            frame.focus();
        }

        // Se sair da tela cheia, o menu volta
        const exitHandler = () => {
            if (!document.fullscreenElement && !document.webkitIsFullScreen) {
                overlay.classList.remove('hidden');
                frame.style.filter = 'blur(10px) brightness(0.3)';
            }
        };

        document.addEventListener('fullscreenchange', exitHandler);
        document.addEventListener('webkitfullscreenchange', exitHandler);
    </script>
</body>
</html>
