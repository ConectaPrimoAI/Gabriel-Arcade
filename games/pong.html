
<!DOCTYPE html>
<html lang="pt-pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Breakout  🏓</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
    :root { --primary: #00f2ff; --bg: #02020a; }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
    body, html { height: 100%; width: 100%; overflow: hidden; background: var(--bg); font-family: sans-serif; }

    #game-container { position: relative; width: 100vw; height: 100vh; background: #000; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }

    /* HUD */
    #hud {
        position: absolute; top: 20px; right: 20px; text-align: right;
        color: var(--primary); font-family: 'Orbitron', sans-serif; pointer-events: none;
    }
    .label { font-size: 10px; opacity: 0.7; letter-spacing: 1px; }
    .value { font-size: 20px; display: block; margin-bottom: 5px; }

    /* Mensagem Inicial */
    #tap-msg {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        color: #fff; font-family: 'Orbitron'; font-size: 12px; text-align: center;
        letter-spacing: 2px; pointer-events: none; animation: blink 1s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Overlays */
    .overlay {
        display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.85);
        flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        backdrop-filter: blur(5px); color: #fff; font-family: 'Orbitron';
    }
    .overlay h2 { font-size: 40px; color: #ff3366; margin-bottom: 10px; }
    .score-txt { font-size: 24px; color: #ffe600; margin-bottom: 30px; }
    
    .btn {
        padding: 15px 40px; border-radius: 50px; border: none; background: var(--primary);
        color: #000; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
        font-size: 14px; box-shadow: 0 0 20px rgba(0,242,255,0.4);
    }
    .btn:active { transform: scale(0.95); }
</style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <span class="label">PONTOS</span>
        <span class="value" id="ui-score">0000</span>
        <span class="label">NÍVEL</span>
        <span class="value" id="ui-level">1</span>
    </div>

    <div id="tap-msg">TOCA PARA LANÇAR</div>

    <!-- Ecrã de Game Over -->
    <div id="game-over" class="overlay">
        <h2>FIM DE JOGO</h2>
        <div class="score-txt" id="final-score">⭐ 0</div>
        <button class="btn" onclick="resetGame()">TENTAR DE NOVO</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Variáveis de Estado
    let score = 0;
    let level = 1;
    let running = false;
    let ballLaunched = false;
    let gameLoopId = null;
    let w, h;

    // Configurações dos Objetos
    const paddle = { w: 100, h: 12, x: 0, y: 0, targetX: 0 };
    const ball = { x: 0, y: 0, r: 7, vx: 0, vy: 0, speed: 5 };
    let bricks = [];
    const colors = ['#FF3366', '#FF6600', '#FFCC00', '#00CC66', '#00AAFF'];

    function setupCanvas() {
        w = window.innerWidth;
        h = window.innerHeight;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        ctx.scale(dpr, dpr);
        
        paddle.w = Math.min(w * 0.3, 120);
        paddle.y = h - 80;
        if (!ballLaunched) {
            paddle.x = w / 2 - paddle.w / 2;
            paddle.targetX = paddle.x;
        }
    }

    function createBricks() {
        bricks = [];
        const rows = 3 + Math.min(level, 4);
        const cols = 6;
        const padding = 10;
        const brickW = (w - (padding * (cols + 1))) / cols;
        const brickH = 20;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                bricks.push({
                    x: padding + c * (brickW + padding),
                    y: 100 + r * (brickH + padding),
                    w: brickW,
                    h: brickH,
                    color: colors[r % colors.length],
                    active: true
                });
            }
        }
    }

    function launchBall() {
        if (ballLaunched || !running) return;
        ballLaunched = true;
        document.getElementById('tap-msg').style.display = 'none';
        ball.vx = (Math.random() - 0.5) * ball.speed;
        ball.vy = -ball.speed;
    }

    function resetGame() {
        // Limpar tudo
        if (gameLoopId) cancelAnimationFrame(gameLoopId);
        document.getElementById('game-over').style.display = 'none';
        document.getElementById('tap-msg').style.display = 'block';
        
        score = 0;
        level = 1;
        ballLaunched = false;
        running = true;
        
        updateUI();
        setupCanvas();
        createBricks();
        
        // Iniciar loop
        gameLoop();
    }

    function updateUI() {
        document.getElementById('ui-score').textContent = score.toString().padStart(4, '0');
        document.getElementById('ui-level').textContent = level;
    }

    function gameLoop() {
        if (!running) return;

        // Limpar ecrã
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, w, h);

        // Movimento da Raquete (Suave)
        paddle.x += (paddle.targetX - paddle.x) * 0.2;

        if (!ballLaunched) {
            ball.x = paddle.x + paddle.w / 2;
            ball.y = paddle.y - ball.r - 2;
        } else {
            ball.x += ball.vx;
            ball.y += ball.vy;

            // Colisões Paredes
            if (ball.x < ball.r || ball.x > w - ball.r) {
                ball.vx *= -1;
                ball.x = ball.x < ball.r ? ball.r : w - ball.r;
            }
            if (ball.y < ball.r) {
                ball.vy *= -1;
                ball.y = ball.r;
            }

            // Fim de Jogo
            if (ball.y > h) {
                running = false;
                document.getElementById('final-score').textContent = `⭐ ${score}`;
                document.getElementById('game-over').style.display = 'flex';
                return;
            }

            // Colisão Raquete
            if (ball.vy > 0 && ball.y + ball.r > paddle.y && ball.y - ball.r < paddle.y + paddle.h &&
                ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                
                let hitPoint = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
                ball.vx = hitPoint * ball.speed;
                ball.vy = -Math.sqrt(Math.max(2, ball.speed ** 2 - ball.vx ** 2));
                ball.y = paddle.y - ball.r;
            }

            // Colisão Blocos
            bricks.forEach(b => {
                if (!b.active) return;
                if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
                    ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
                    
                    b.active = false;
                    score += 10;
                    updateUI();

                    // Determinar lado da colisão
                    let overlapX = Math.min(ball.x + ball.r - b.x, b.x + b.w - (ball.x - ball.r));
                    let overlapY = Math.min(ball.y + ball.r - b.y, b.y + b.h - (ball.y - ball.r));

                    if (overlapX < overlapY) ball.vx *= -1; else ball.vy *= -1;

                    // Verificar Vitória do Nível
                    if (bricks.every(br => !br.active)) {
                        level++;
                        ballLaunched = false;
                        ball.speed += 0.5;
                        updateUI();
                        createBricks();
                        document.getElementById('tap-msg').style.display = 'block';
                    }
                }
            });
        }

        // Desenhar Elementos
        draw();
        gameLoopId = requestAnimationFrame(gameLoop);
    }

    function draw() {
        // Blocos
        bricks.forEach(b => {
            if (!b.active) return;
            ctx.fillStyle = b.color;
            ctx.beginPath();
            ctx.roundRect(b.x, b.y, b.w, b.h, 4);
            ctx.fill();
        });

        // Raquete
        ctx.fillStyle = varColor('--primary', '#00f2ff');
        ctx.beginPath();
        ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
        ctx.fill();

        // Bola
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
        ctx.fill();
    }

    function varColor(name, fallback) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || fallback;
    }

    // Input Control
    const inputHandler = (e) => {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        paddle.targetX = Math.max(0, Math.min(w - paddle.w, clientX - paddle.w / 2));
    };

    window.addEventListener('mousemove', inputHandler);
    window.addEventListener('touchmove', (e) => { e.preventDefault(); inputHandler(e); }, { passive: false });
    window.addEventListener('mousedown', launchBall);
    window.addEventListener('touchstart', (e) => { launchBall(); }, { passive: true });
    window.addEventListener('resize', setupCanvas);

    // Início Automático
    window.onload = resetGame;

</script>
</body>
</html>
