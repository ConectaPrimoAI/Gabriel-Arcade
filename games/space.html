```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>Space Wars</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00fff2;
            --bg: #020205;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            height: 100dvh;
        }

        #game-wrap { position: relative; width: 100vw; height: 100dvh; }
        canvas { display: block; width: 100%; height: 100%; }

        /* HUD Clean e Grande */
        #hud {
            position: absolute; top: 20px; left: 0; width: 100%; padding: 0 30px;
            display: none; justify-content: space-between; pointer-events: none; z-index: 10;
        }
        .stat { font-size: 14px; letter-spacing: 1px; font-weight: 400; }
        .stat b { display: block; font-size: 28px; font-weight: 900; color: var(--accent); }

        /* Hangar de Personalização */
        #hangar {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #0a0a12, #020205);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 50;
            padding: 20px;
        }
        .ship-preview { width: 180px; height: 180px; margin-bottom: 30px; }
        .custom-panel { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 320px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; }
        .opt-group { display: flex; justify-content: space-between; align-items: center; }
        
        .color-dot { width: 35px; height: 35px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: #fff; box-shadow: 0 0 15px currentColor; }
        
        .start-btn {
            margin-top: 30px; padding: 18px 60px; background: var(--accent); color: #000;
            font-weight: 900; border: none; border-radius: 10px; cursor: pointer;
            letter-spacing: 2px; font-size: 18px;
        }

        /* Controles Ergonômicos */
        #controls {
            position: absolute; bottom: 30px; width: 100%;
            display: none; justify-content: space-between; align-items: center; padding: 0 30px; z-index: 20;
        }
        .mini-joy { 
            width: 90px; height: 90px; border: 2px solid rgba(255,255,255,0.1); 
            border-radius: 50%; position: relative; background: rgba(0,0,0,0.3);
        }
        .knob {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; background: #fff; border-radius: 50%; opacity: 0.6;
        }
        .btn-fire {
            width: 85px; height: 85px; background: rgba(255,255,255,0.1);
            border: 2px solid var(--accent); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px;
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-wrap">
    <!-- Hangar de Início -->
    <div id="hangar">
        <h1 style="margin-bottom: 5px; font-weight: 900; letter-spacing: 3px; font-size: 32px;">GABRIEL N-1</h1>
        <p style="margin-bottom: 25px; font-size: 14px; opacity: 0.6;">SISTEMA DE CUSTOMIZAÇÃO</p>
        
        <div class="ship-preview">
            <canvas id="shipPreview" width="180" height="180"></canvas>
        </div>

        <div class="custom-panel">
            <div class="opt-group">
                <span>ESTILO DO NÚCLEO</span>
                <div style="display: flex; gap: 15px;">
                    <div class="color-dot active" style="background: #00fff2; color: #00fff2;" data-color="#00fff2"></div>
                    <div class="color-dot" style="background: #ff0055; color: #ff0055;" data-color="#ff0055"></div>
                    <div class="color-dot" style="background: #ffcc00; color: #ffcc00;" data-color="#ffcc00"></div>
                </div>
            </div>
            <div class="opt-group">
                <span>ASA</span>
                <select id="wing-type" style="background: #222; color: #fff; border: none; padding: 8px; border-radius: 5px; font-weight: bold;">
                    <option value="standard">INTERCEPTOR</option>
                    <option value="wide">DEFENDER</option>
                    <option value="forward">STRIKER</option>
                </select>
            </div>
        </div>

        <button class="start-btn" id="start-game">LANÇAR NAVE</button>
    </div>

    <!-- Interface HUD -->
    <div id="hud">
        <div class="stat">CASCO<b id="hp-txt">100%</b></div>
        <div class="stat" style="text-align: right;">PONTUAÇÃO<b id="score-txt">00000</b></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Painel de Comando -->
    <div id="controls">
        <div class="mini-joy" id="joy">
            <div class="knob" id="knob"></div>
        </div>
        <div class="btn-fire" id="fire">🔫 </div>
    </div>
</div>

<div class="overlay" id="screen-over">
    <h1 style="font-weight: 900; margin-bottom: 10px; color: #ff0055;">SISTEMA OFFLINE</h1>
    <p id="final-score" style="margin-bottom: 30px; opacity: 0.7;">PONTOS RECUPERADOS: 0</p>
    <button class="start-btn" onclick="location.reload()">REINICIAR</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const previewCanvas = document.getElementById('shipPreview');
const pCtx = previewCanvas.getContext('2d');

let W, H;
let shipConfig = { color: '#00fff2', wings: 'standard' };

function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
}
window.addEventListener('resize', resize);
resize();

// --- DESENHO DA NAVE (MODELO REFINADO) ---
function drawDetailedShip(context, x, y, size, config, angle = 0, isFiring = false) {
    context.save();
    context.translate(x, y);
    context.rotate(angle);
    
    const s = size / 60;

    // 1. Motores Duplos (Chamas)
    const flameSize = 15 + Math.random() * 10;
    context.shadowBlur = 15;
    context.shadowColor = config.color;
    context.fillStyle = config.color;
    // Motor Esquerdo
    context.fillRect(-14 * s, 10 * s, 4 * s, flameSize * s);
    // Motor Direito
    context.fillRect(10 * s, 10 * s, 4 * s, flameSize * s);
    context.shadowBlur = 0;

    // 2. Fuselagem Principal (Corpo)
    context.fillStyle = '#2a2a35';
    context.strokeStyle = '#444';
    context.lineWidth = 2;
    
    context.beginPath();
    context.moveTo(0, -35 * s); // Ponta
    context.lineTo(15 * s, 10 * s);
    context.lineTo(10 * s, 15 * s);
    context.lineTo(-10 * s, 15 * s);
    context.lineTo(-15 * s, 10 * s);
    context.closePath();
    context.fill();
    context.stroke();

    // 3. Asas de Combate
    context.fillStyle = '#1c1c22';
    context.beginPath();
    if(config.wings === 'standard') {
        // Interceptor
        context.moveTo(-15 * s, 0); context.lineTo(-40 * s, 25 * s); context.lineTo(-15 * s, 15 * s);
        context.moveTo(15 * s, 0); context.lineTo(40 * s, 25 * s); context.lineTo(15 * s, 15 * s);
    } else if(config.wings === 'wide') {
        // Defender
        context.moveTo(-12 * s, 5 * s); context.lineTo(-50 * s, 15 * s); context.lineTo(-12 * s, 20 * s);
        context.moveTo(12 * s, 5 * s); context.lineTo(50 * s, 15 * s); context.lineTo(12 * s, 20 * s);
    } else {
        // Striker
        context.moveTo(-12 * s, -15 * s); context.lineTo(-35 * s, -30 * s); context.lineTo(-12 * s, 10 * s);
        context.moveTo(12 * s, -15 * s); context.lineTo(35 * s, -30 * s); context.lineTo(12 * s, 10 * s);
    }
    context.fill();
    context.stroke();

    // 4. Cockpit (Janela)
    context.fillStyle = 'rgba(100, 200, 255, 0.6)';
    context.beginPath();
    context.ellipse(0, -8 * s, 6 * s, 12 * s, 0, 0, Math.PI * 2);
    context.fill();
    context.strokeStyle = '#fff';
    context.stroke();

    // 5. Linhas de detalhe Neon
    context.strokeStyle = config.color;
    context.lineWidth = 2;
    context.beginPath();
    context.moveTo(-10 * s, 5 * s); context.lineTo(-30 * s, 15 * s);
    context.moveTo(10 * s, 5 * s); context.lineTo(30 * s, 15 * s);
    context.stroke();

    context.restore();
}

// --- HANGAR ---
document.querySelectorAll('.color-dot').forEach(dot => {
    dot.onclick = () => {
        document.querySelector('.color-dot.active').classList.remove('active');
        dot.classList.add('active');
        shipConfig.color = dot.dataset.color;
        updatePreview();
    };
});

document.getElementById('wing-type').onchange = (e) => {
    shipConfig.wings = e.target.value;
    updatePreview();
};

function updatePreview() {
    pCtx.clearRect(0,0,180,180);
    drawDetailedShip(pCtx, 90, 90, 100, shipConfig, 0, false);
}
updatePreview();

// --- ENGINE ---
const state = {
    p: { x: 0, y: 0, vx: 0, vy: 0, hp: 100, rot: 0 },
    enemies: [], bullets: [], stars: [], score: 0, active: false,
    input: { x:0, y:0, fire: false }
};

document.getElementById('start-game').onclick = () => {
    document.getElementById('hangar').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('controls').style.display = 'flex';
    state.active = true;
    state.p.x = W/2;
    state.p.y = H - 200;
    initStars();
    update();
};

function initStars() {
    for(let i=0; i<80; i++) {
        state.stars.push({ x: Math.random()*W, y: Math.random()*H, s: Math.random()*3, v: Math.random()*2 + 1 });
    }
}

// --- CONTROLES MELHORADOS ---
const joy = document.getElementById('joy');
const knob = document.getElementById('knob');
joy.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    const r = joy.getBoundingClientRect();
    const dx = t.clientX - (r.left + r.width/2);
    const dy = t.clientY - (r.top + r.height/2);
    const dist = Math.min(35, Math.hypot(dx, dy));
    const ang = Math.atan2(dy, dx);
    const kx = Math.cos(ang) * dist;
    const ky = Math.sin(ang) * dist;
    knob.style.transform = `translate(calc(-50% + ${kx}px), calc(-50% + ${ky}px))`;
    state.input.x = kx / 35;
    state.input.y = ky / 35;
});
joy.addEventListener('touchend', () => {
    knob.style.transform = 'translate(-50%, -50%)';
    state.input.x = 0; state.input.y = 0;
});
document.getElementById('fire').ontouchstart = (e) => { e.preventDefault(); state.input.fire = true; };
document.getElementById('fire').ontouchend = () => state.input.fire = false;

// --- LOOP PRINCIPAL ---
function update() {
    if(!state.active) return;

    const p = state.p;
    p.vx += state.input.x * 1.2;
    p.vy += state.input.y * 1.2;
    p.vx *= 0.9; p.vy *= 0.9;
    p.x += p.vx; p.y += p.vy;
    p.rot = p.vx * 0.05;

    p.x = Math.max(40, Math.min(W-40, p.x));
    p.y = Math.max(60, Math.min(H-120, p.y));

    // Tiro mais robusto
    if(state.input.fire && Date.now() % 180 < 30) {
        state.bullets.push({ x: p.x - 15, y: p.y - 10, v: -18 });
        state.bullets.push({ x: p.x + 15, y: p.y - 10, v: -18 });
        navigator.vibrate?.(15);
    }

    state.stars.forEach(s => {
        s.y += s.v; if(s.y > H) s.y = -10;
    });

    // Spawn controlado: Menos inimigos para menos confusão
    if(state.enemies.length < 4) {
        state.enemies.push({
            x: 50 + Math.random() * (W - 100), y: -100, hp: 3, v: 1.5 + Math.random() * 2,
            type: Math.floor(Math.random() * 3)
        });
    }

    state.enemies.forEach(en => {
        en.y += en.v;
        // Colisão aumentada para objetos maiores
        if(Math.hypot(en.x - p.x, en.y - p.y) < 60) { p.hp -= 20; en.hp = 0; }
    });
    
    state.bullets = state.bullets.filter(b => {
        b.y += b.v;
        let hit = false;
        state.enemies.forEach(en => {
            if(Math.hypot(b.x - en.x, b.y - en.y) < 45) {
                en.hp--; hit = true;
                if(en.hp <= 0) state.score += 250;
            }
        });
        return !hit && b.y > -50;
    });

    state.enemies = state.enemies.filter(en => en.hp > 0 && en.y < H + 100);

    if(p.hp <= 0) {
        state.active = false;
        document.getElementById('final-score').innerText = `PONTOS RECUPERADOS: ${state.score}`;
        document.getElementById('screen-over').style.display = 'flex';
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0,0,W,H);
    
    // Estrelas
    state.stars.forEach(s => {
        ctx.fillStyle = `rgba(255,255,255,${s.s/3})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.s, 0, 7);
        ctx.fill();
    });

    // Tiros Maiores
    state.bullets.forEach(b => {
        ctx.fillStyle = shipConfig.color;
        ctx.shadowBlur = 15; ctx.shadowColor = shipConfig.color;
        ctx.fillRect(b.x - 2, b.y, 4, 25);
    });
    ctx.shadowBlur = 0;

    // Inimigos Detalhados (Emojis Maiores)
    state.enemies.forEach(en => {
        ctx.font = "60px Arial"; // Emoji Gigante
        ctx.textAlign = "center";
        const visual = ['🛸', '👾',👽 '][en.type];
        ctx.fillText(visual, en.x, en.y);
    });

    // Nave do Gabriel (Grande)
    drawDetailedShip(ctx, state.p.x, state.p.y, 80, shipConfig, state.p.rot, state.input.fire);

    // Update HUD
    document.getElementById('hp-txt').innerText = Math.max(0, state.p.hp) + '%';
    document.getElementById('score-txt').innerText = state.score.toString().padStart(5, '0');
}
</script>
</body>
</html>
